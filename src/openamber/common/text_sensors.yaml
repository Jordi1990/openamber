- platform: opentherm_slave
  opentherm_slave_id: ot_hub
  type: status
  id: opentherm_status_key
  internal: true
  on_value:
    then:
      - text_sensor.template.publish:
          id: opentherm_status
          state: !lambda |-
            if (x == "protocol_error") return std::string("Protocolfout");
            if (x == "timeout") return std::string("Timeout");
            if (x == "timer_error") return std::string("Timerfout");
            if (x == "connected") return std::string("Verbonden");
            if (x == "connection_lost") return std::string("Verbinding verloren");
            if (x == "listening") return std::string("Luistert");
            return std::string("Wachten op thermostaat");

- platform: template
  id: opentherm_status
  name: "OpenTherm status"
  icon: "mdi:connection"
  entity_category: diagnostic
  update_interval: never

- platform: opentherm_slave
  opentherm_slave_id: ot_hub
  type: last_error
  id: opentherm_last_error_key
  internal: true
  on_value:
    then:
      - text_sensor.template.publish:
          id: opentherm_last_error
          state: !lambda |-
            if (x == "no_transition") return std::string("Geen overgang");
            if (x == "invalid_stop_bit") return std::string("Ongeldige stopbit");
            if (x == "parity_error") return std::string("Pariteitsfout");
            if (x == "no_change_too_long") return std::string("Geen verandering te lang");
            if (x == "invalid_message") return std::string("Ongeldig bericht");
            if (x == "unknown") return std::string("Onbekend");
            return std::string("Geen fout");

- platform: template
  id: opentherm_last_error
  name: "OpenTherm laatste fout"
  icon: "mdi:alert-circle-outline"
  entity_category: diagnostic
  update_interval: never