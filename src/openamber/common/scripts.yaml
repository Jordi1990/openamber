          root["vp"] = id(expansion_valve_position).state;
          root["vq"] = id(pump_p0_current_pwm_sensor).state;

          {
            auto idx = id(working_mode_switch).active_index();
            root["vr"] = idx.has_value() ? idx.value() : -1;
          }

- id: send_analytics
  then:
    - lambda: |-
        id(analytics_batch_timestamp) = id(my_time).timestamp_now();
    - script.execute: send_device_info
    - delay: 150ms
    - script.execute: send_config_1
    - delay: 150ms
    - script.execute: send_config_2
    - delay: 150ms
    - script.execute: send_config_3
    - delay: 150ms
    - script.execute: send_modes
    - delay: 150ms
    - script.execute: send_telemetry_1
    - delay: 150ms
    - script.execute: send_telemetry_2
    - delay: 150ms
    - script.execute: send_telemetry_3
    - delay: 150ms
    - script.execute: fetch_analytics_device_id
