- id: update_heat_curve_chart
  then:
    - lambda: |-
        float vals[5] = {
          id(heat_curve_m10).state,
          id(heat_curve_0).state,
          id(heat_curve_p5).state,
          id(heat_curve_p10).state,
          id(heat_curve_p15).state,
        };
        // Fallback to initial values if any state is NaN
        float defaults[5] = {35.0f, 30.0f, 28.0f, 27.0f, 25.0f};
        for (int i = 0; i < 5; i++) {
          if (isnan(vals[i])) vals[i] = defaults[i];
        }
        float vmin = vals[0], vmax = vals[0];
        for (int i = 1; i < 5; i++) {
          if (vals[i] < vmin) vmin = vals[i];
          if (vals[i] > vmax) vmax = vals[i];
        }
        if (vmax < 1.0f && vmin < 1.0f) { vmin = 25.0f; vmax = 35.0f; }
        float range = vmax - vmin;
        if (range < 0.5f) range = 0.5f;
        int *ys[5] = {&id(hc_y_m10), &id(hc_y_0), &id(hc_y_p5), &id(hc_y_p10), &id(hc_y_p15)};
        for (int i = 0; i < 5; i++) {
          float y = 114.0f - ((vals[i] - vmin) / range) * 108.0f;
          if (y < 6.0f) y = 6.0f;
          if (y > 114.0f) y = 114.0f;
          *ys[i] = (int)y;
        }
    - lvgl.line.update:
        id: heat_curve_line
        points:
          - x: 0
            y: !lambda 'return (lv_coord_t)id(hc_y_m10);'
          - x: 155
            y: !lambda 'return (lv_coord_t)id(hc_y_0);'
          - x: 310
            y: !lambda 'return (lv_coord_t)id(hc_y_p5);'
          - x: 465
            y: !lambda 'return (lv_coord_t)id(hc_y_p10);'
          - x: 620
            y: !lambda 'return (lv_coord_t)id(hc_y_p15);'
    - lvgl.widget.update:
        id: heat_dot_m10
        y: !lambda 'return (lv_coord_t)(id(hc_y_m10) - 5);'
    - lvgl.widget.update:
        id: heat_dot_0
        y: !lambda 'return (lv_coord_t)(id(hc_y_0) - 5);'
    - lvgl.widget.update:
        id: heat_dot_p5
        y: !lambda 'return (lv_coord_t)(id(hc_y_p5) - 5);'
    - lvgl.widget.update:
        id: heat_dot_p10
        y: !lambda 'return (lv_coord_t)(id(hc_y_p10) - 5);'
    - lvgl.widget.update:
        id: heat_dot_p15
        y: !lambda 'return (lv_coord_t)(id(hc_y_p15) - 5);'
    - lvgl.label.update:
        id: set_hc_m10_val
        text:
          format: "%.0f°C"
          args: ['id(heat_curve_m10).state']
    - lvgl.label.update:
        id: set_hc_0_val
        text:
          format: "%.0f°C"
          args: ['id(heat_curve_0).state']
    - lvgl.label.update:
        id: set_hc_p5_val
        text:
          format: "%.0f°C"
          args: ['id(heat_curve_p5).state']
    - lvgl.label.update:
        id: set_hc_p10_val
        text:
          format: "%.0f°C"
          args: ['id(heat_curve_p10).state']
    - lvgl.label.update:
        id: set_hc_p15_val
        text:
          format: "%.0f°C"
          args: ['id(heat_curve_p15).state']

- id: wifi_scan_networks
  then:
    - lambda: |-
        lv_dropdown_set_options(id(wifi_network_dd)->obj, "Zoeken...");
    - lambda: wifi::global_wifi_component->start_scanning();

- id: wifi_scan_networks_if_empty
  then:
    - lambda: |-
        uint16_t count = lv_dropdown_get_option_cnt(id(wifi_network_dd)->obj);
        if (count <= 1) {
          lv_dropdown_set_options(id(wifi_network_dd)->obj, "Zoeken...");
          wifi::global_wifi_component->start_scanning();
        }

- id: wifi_connect_selected
  then:
    - lambda: |-
        // Verborgen SSID heeft voorrang als "Handmatig..." geselecteerd
        char dd_buf[64];
        lv_dropdown_get_selected_str(id(wifi_network_dd)->obj, dd_buf, sizeof(dd_buf));
        std::string ssid;
        if (std::string(dd_buf) == "Handmatig...") {
          ssid = lv_textarea_get_text(id(wifi_hidden_ssid_ta));
        } else {
          ssid = dd_buf;
        }
        if (ssid.empty() || ssid == "Geen netwerken gevonden" || ssid == "Zoeken..." || ssid == "Kies netwerk...") return;
        std::string password = lv_textarea_get_text(id(wifi_password_ta));
        wifi::global_wifi_component->save_wifi_sta(ssid, password);

- id: wifi_disconnect
  then:
    - lambda: |-
        wifi::global_wifi_component->save_wifi_sta("", "");
        wifi::global_wifi_component->clear_sta();
    - lvgl.label.update: { id: wifi_status_label, text: "Niet verbonden" }
    - lvgl.widget.update: { id: wifi_status_label, text_color: 0xEF4444 }
    - lvgl.label.update: { id: wifi_ssid_label, text: "-" }
    - lvgl.label.update: { id: wifi_ip_label, text: "-" }
    - lvgl.label.update: { id: wifi_signal_label, text: "-" }
    - lvgl.label.update: { id: nav_status_wifi_icon, text: "\U000F092E" }
    - lvgl.widget.update: { id: nav_status_wifi_icon, text_color: 0x9CA3AF }
    - lvgl.widget.hide: { id: wifi_connected_section }
    - lvgl.widget.show: { id: wifi_disconnected_section }
