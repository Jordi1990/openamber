          root["de"] = id(dhw_enabled_switch).state;
          root["lg"] = id(legio_enabled_switch).state;

          root["fa"] = id(frost_protection_stage_1_temp_ta).state;
          root["fb"] = id(frost_protection_stage_2_temp_ta).state;
          root["fc"] = id(frost_protection_stage_2_temp_tui).state;

          root["ca"] = id(compressor_start_delta).state;
          root["cb"] = id(compressor_stop_delta).state;

