- id: send_modes
  then:
    - mqtt.publish_json:
        topic: !lambda |-
          return "openamber/" + id(mac_address).state;
        qos: 0
        retain: true
        payload: |-
          root["ts"] = id(analytics_batch_timestamp);
          {
            auto idx = id(heat_compressor_mode).active_index();
            root["mh"] = idx.has_value() ? idx.value() : -1;
          }
          {
            auto idx = id(cool_compressor_mode).active_index();
            root["mc"] = idx.has_value() ? idx.value() : -1;
          }
          {
            auto idx = id(dhw_compressor_mode).active_index();
            root["md"] = idx.has_value() ? idx.value() : -1;
          }
          {
            auto idx = id(dhw_compressor_mode_max).active_index();
            root["mx"] = idx.has_value() ? idx.value() : -1;
          }

          {
            auto idx = id(dhw_pump_start_mode_select).active_index();
            root["mp"] = idx.has_value() ? idx.value() : -1;
          }

          {
            auto idx = id(heat_mode_select).active_index();
            root["me"] = idx.has_value() ? idx.value() : -1;
          }
          {
            auto idx = id(cool_mode_select).active_index();
            root["mf"] = idx.has_value() ? idx.value() : -1;
          }

          {
            auto idx = id(thermostat_mode_select).active_index();
            root["mt"] = idx.has_value() ? idx.value() : -1;
          }
          {
            auto idx = id(sg_ready_mode_select).active_index();
            root["mg"] = idx.has_value() ? idx.value() : -1;
          }

          root["wh"] = id(heat_demand_switch).state;
          root["wc"] = id(cool_demand_switch).state;

          root["ws"] = id(dhw_schedule_enabled_switch).state;
          root["wp"] = id(pump_p1_enabled).state;

