- id: fetch_analytics_device_id
  then:
    - if:
        condition:
          lambda: return id(analytics_device_id).state.empty() && id(mac_address).has_state() && !id(mac_address).state.empty();
        then:
          - http_request.get:
              url: !lambda |-
                return "https://openamber.nl/api/devices/by-mac/" + id(mac_address).state + "/device-id";
              capture_response: true
              on_response:
                then:
                  - if:
                      condition:
                        lambda: return response->status_code == 200 && !body.empty();
                      then:
                        - lambda: |-
                            id(analytics_device_id).publish_state(body);

- id: apply_pid_settings
  then:
    - climate.pid.set_control_parameters:
        id: pid_heat_temperature_control
        kp: !lambda 'return id(pid_heat_kp).state;'
        ki: !lambda 'return id(pid_heat_ki).state;'
        kd: !lambda 'return id(pid_heat_kd).state;'
    - climate.pid.set_control_parameters:
        id: pid_cool_temperature_control
        kp: !lambda 'return id(pid_cool_kp).state;'
        ki: !lambda 'return id(pid_cool_ki).state;'
        kd: !lambda 'return id(pid_cool_kd).state;'

- id: send_device_info
  then:
    - mqtt.publish_json:
        topic: !lambda |-
          return "openamber/" + id(mac_address).state;
        qos: 0
        retain: true
        payload: |-
          root["ts"] = id(analytics_batch_timestamp);
          root["fw"] = ESPHOME_PROJECT_VERSION;

          root["a1"] = id(model_identification_1).state;
          root["a2"] = id(model_identification_2).state;
          root["a3"] = id(model_identification_3).state;

          root["hn"] = id(outside_unit_hardware_item_number).state;

          root["ev"] = id(outside_unit_eeprom_version).state;
          root["e1"] = id(outside_unit_eeprom_version_part1).state;
          root["e2"] = id(outside_unit_eeprom_version_part2).state;

          root["pv"] = id(outside_unit_program_version).state;

