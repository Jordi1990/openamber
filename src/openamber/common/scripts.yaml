- id: fetch_analytics_device_id
  then:
    - if:
        condition:
          lambda: return id(analytics_device_id).state.empty() && id(mac_address).has_state() && !id(mac_address).state.empty();
        then:
          - http_request.get:
              url: !lambda |-
                return "https://openamber.nl/api/devices/by-mac/" + id(mac_address).state + "/device-id";
              capture_response: true
              on_response:
                then:
                  - if:
                      condition:
                        lambda: return response->status_code == 200 && !body.empty();
                      then:
                        - lambda: |-
                            id(analytics_device_id).publish_state(body);

- id: send_analytics
  then:
    - mqtt.publish_json:
        topic: !lambda |-
          return "openamber/" + id(mac_address).state;
        qos: 0
        retain: true
        payload: |-
          root["device_id"] = id(mac_address).state;
          root["model_identification_1"] = id(model_identification_1).state;
          root["model_identification_2"] = id(model_identification_2).state;
          root["model_identification_3"] = id(model_identification_3).state;
          root["timestamp"] = id(my_time).timestamp_now();
          root["firmware"] = ESPHOME_PROJECT_VERSION;
          root["hardware_item_number"] = id(outside_unit_hardware_item_number).state;
          root["eeprom_version"] = id(outside_unit_eeprom_version).state;
