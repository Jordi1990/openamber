number:
  - platform: template
    id: maintenance_pump_control_pwm_proxy
    name: "Pomp PWM (Maintenance)"
    min_value: 0
    max_value: 1000
    step: 1
    mode: box
    lambda: |-
      return id(pump_control_pwm_number).state;
    set_action:
      - if:
          condition:
            lambda: 'return id(amber_ctrl).is_maintenance_state();'
          then:
            - number.set:
                id: pump_control_pwm_number
                value: !lambda 'return x;'
    disabled_by_default: true
    entity_category: config
    web_server:
      sorting_group_id: manual_control

