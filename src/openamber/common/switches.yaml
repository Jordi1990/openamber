- platform: template
  optimistic: True
  id: backup_heater_relay
  name: "Backup verwarmingselement"
  internal: True
  on_state: 
    then:
    - switch.control:
        id: backup_heater_stage_1
        state: !lambda return x;
    - switch.control:
        id: backup_heater_stage_2
        state: !lambda return x;

