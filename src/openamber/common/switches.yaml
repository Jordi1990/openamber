- platform: template
  id: reset_start_timeout_errors_switch
  name: "Reset systeem timeout fouten"
  optimistic: true
  restore_mode: ALWAYS_OFF
  entity_category: diagnostic
  web_server:
    sorting_group_id: error_codes
  turn_on_action:
    - lambda: |-
        id(error_pump_start_timeout).publish_state(false);
        id(error_compressor_start_timeout).publish_state(false);
        id(error_pump_stop_timeout).publish_state(false);
    - switch.turn_off: reset_start_timeout_errors_switch

