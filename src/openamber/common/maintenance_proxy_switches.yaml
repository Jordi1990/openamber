switch:
  - platform: template
    id: maintenance_service_mode_proxy
    name: "Onderhoudsmodus (Maintenance)"
    lambda: |-
      return id(service_mode_enabled).state;
    turn_on_action:
      - switch.turn_on: service_mode_enabled
    turn_off_action:
      - switch.turn_off: service_mode_enabled
    disabled_by_default: true
    entity_category: config
    web_server:
      sorting_group_id: manual_control

  - platform: template
    id: maintenance_bottom_plate_heater_manual_proxy
    name: "Bodemplaat verwarming handmatig (Maintenance)"
    lambda: |-
      return id(bottom_plate_heater_manual_switch).state;
    turn_on_action:
      - if:
          condition:
            lambda: 'return id(amber_ctrl).is_maintenance_state();'
          then:
            - switch.turn_on: bottom_plate_heater_manual_switch
    turn_off_action:
      - if:
          condition:
            lambda: 'return id(amber_ctrl).is_maintenance_state();'
          then:
            - switch.turn_off: bottom_plate_heater_manual_switch
    disabled_by_default: true
