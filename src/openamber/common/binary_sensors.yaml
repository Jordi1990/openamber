- platform: template
  id: dhw_schedule_active_sensor
  internal: True
  lambda: |-
    if(!id(dhw_schedule_enabled_switch).state)
    {
      return true;
    }

    int weekday = id(my_time).now().day_of_week;
    if(!((weekday == 2 && id(dhw_schedule_monday_enabled_switch).state) ||
         (weekday == 3 && id(dhw_schedule_tuesday_enabled_switch).state) ||
         (weekday == 4 && id(dhw_schedule_wednesday_enabled_switch).state) ||
         (weekday == 5 && id(dhw_schedule_thursday_enabled_switch).state) ||
         (weekday == 6 && id(dhw_schedule_friday_enabled_switch).state) ||
         (weekday == 7 && id(dhw_schedule_saturday_enabled_switch).state) ||
         (weekday == 1 && id(dhw_schedule_sunday_enabled_switch).state)))
    {
      return false;
    }

    auto now = id(my_time).now();
    if(!id(dhw_start_time).has_state() || !id(dhw_end_time).has_state())
    {
      return false;
    }

    const int now_min   = now.hour * 60 + now.minute;
    const int start_min = id(dhw_start_time).hour * 60 + id(dhw_start_time).minute;
    const int end_min   = id(dhw_end_time).hour * 60 + id(dhw_end_time).minute;

    bool in_window = false;
    if (start_min <= end_min) {
      // same day (e.g. 06:00-22:00)
      in_window = (now_min >= start_min && now_min <= end_min);
    } else {
      // overnight (e.g. 22:00-06:00)
      in_window = (now_min >= start_min || now_min <= end_min);
    }

    if (!in_window) {
      return false;
    }

    return true;

- platform: template
  name: "Tapwater vraag"
  id: dhw_demand_active_sensor
  device_class: running
  lambda: |-
      float tw = id(dhw_temperature_tw_sensor).state;
      float setpoint = id(current_dhw_setpoint_sensor).state;
      bool dhw_enabled = id(dhw_enabled_switch).state;
      float delta_restart = id(dhw_restart_dhw_delta).state;
      if(id(sg_ready_block_mode_active_sensor).state
      || !dhw_enabled)
      {
        return false;
      }

      if(id(error_active).state)
      {
        return false;
      }

      if(id(dhw_legionella_run_active_sensor).state)
      {
        return true;
      }

      if(!id(dhw_schedule_active_sensor).state)
      {
         return false;
      }

      if(tw >= setpoint)
      {
        return false;
      }

      if(id(dhw_active).state)
      {
        return true;
      }

      return tw < setpoint - delta_restart;
  web_server: 
    sorting_group_id: overview

- platform: template
  id: dhw_active

- platform: template
  name: "Legionellacyclus actief"
  id: dhw_legionella_run_active_sensor
  device_class: running
  web_server: 
    sorting_group_id: diagnostic
  on_state:
    - component.update: current_dhw_setpoint_sensor

- platform: template
  name: "Warmtevraag"
  id: heat_demand_active_sensor
  device_class: running
  lambda: |-
    if(id(sg_ready_block_mode_active_sensor).state)
    {
      return false;
    }

    if(id(error_active).state)
    {
      return false;
    }

    if (id(thermostat_mode_select).current_option() == "Intern")
    {
      return id(climate_controller).action == climate::CLIMATE_ACTION_HEATING;
    }
    else
    {
      return id(external_heat_demand_wired).state || id(heat_demand_switch).state;
    }
  web_server: 
    sorting_group_id: overview

- platform: template
  name: "Koudevraag"
  id: cool_demand_active_sensor
  device_class: running
  lambda: |-
    if(id(sg_ready_block_mode_active_sensor).state)
    {
      return false;
    }

    if(id(error_active).state)
    {
      return false;
    }

    if(id(heat_demand_active_sensor).state)
    {
      return false;
    }

    if (id(thermostat_mode_select).current_option() == "Intern")
    {
      return id(climate_controller).action == climate::CLIMATE_ACTION_COOLING;
    }
    else
    {
      return id(external_cool_demand_wired).state || id(cool_demand_switch).state;
    }
  on_state:
    - component.update : current_setpoint
  web_server: 
    sorting_group_id: overview

- platform: template
  name: "Vorstbescherming 1e trap"
  id: frost_protection_stage1_active
  filters:
    - delayed_on_off: 300s
  lambda: |-
    return id(temperature_outside_ta).state < id(frost_protection_stage_1_temp_ta).state;
  on_press: 
    then:
      - logger.log:
          format: "Pump interval reset due to pump required for frost protection."
          level: INFO
      - lambda: |-
          id(amber_ctrl).reset_pump_interval();
  web_server: 
    sorting_group_id: overview

- platform: template
  name: "Vorstbescherming 2e trap"
  id: frost_protection_stage2_active
  filters:
    - delayed_on_off: 300s
  lambda: |-
    return id(temperature_outside_ta).state < id(frost_protection_stage_2_temp_ta).state &&
            id(inlet_temperature_tui).state < id(frost_protection_stage_2_temp_tui).state;
  on_press: 
    then:
      - logger.log:
          format: "Pump interval reset due to pump required for frost protection."
          level: INFO
      - lambda: |-
          id(amber_ctrl).reset_pump_interval();
  web_server: 
    sorting_group_id: overview

