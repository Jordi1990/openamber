# ══════════════════════════════════════════════════════════════
# Number → LVGL UI bindings (event-driven via !extend)
# These extend numbers defined in common/numbers.yaml to add
# on_value callbacks that update settings LVGL labels on change.
# ══════════════════════════════════════════════════════════════

# ── Vorstbescherming ──
- id: !extend frost_protection_stage_1_temp_ta
  on_value:
    then:
      - lvgl.label.update:
          id: set_frost1_val
          text:
            format: "%.1f°C"
            args: ['x']

- id: !extend frost_protection_stage_2_temp_ta
