# ══════════════════════════════════════════════════════════════
# Number → LVGL UI bindings (event-driven via !extend)
# These extend numbers defined in common/numbers.yaml to add
# on_value callbacks that update settings LVGL labels on change.
# ══════════════════════════════════════════════════════════════

# ── Sensor kalibratie ──
- id: !extend tr_offset
  on_value:
    then:
      - lvgl.label.update:
          id: set_tr_offset_val
          text:
            format: "%.1f°C"
            args: ['x']

