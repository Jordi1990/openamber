# ══════════════════════════════════════════════════════════════
# Sensor → LVGL UI bindings (event-driven via !extend)
# These extend sensors defined in common/sensors.yaml to add
# on_value callbacks that update LVGL widgets on change.
# ══════════════════════════════════════════════════════════════

# ── Home page: Water temperatures ──
- id: !extend outlet_temperature_tuo
  on_value:
    then:
      - lvgl.label.update:
          id: water_aanvoer_value
          text:
            format: "%.1f°C"
            args: ['x']
      - script.execute: update_water_mode_temperature_display

- id: !extend inlet_temperature_tui
  on_value:
    then:
      - lvgl.label.update:
          id: water_retour_value
          text:
            format: "%.1f°C"
            args: ['x']
      - script.execute: update_water_mode_temperature_display

- id: !extend heat_exchanger_delta_t
  on_value:
    then:
      - lvgl.label.update:
          id: water_delta_value
          text:
            format: "%.1f°C"
            args: ['x']

# ── Home page: Tiles ──
- id: !extend fan_rpm_sensor
  on_value:
    then:
      - lvgl.widget.update:
          id: tile_fan
          bg_color: !lambda |-
            if (x > 0) return lv_color_hex(0xF5F8FC);
            return lv_color_hex(0x919191);
      - lvgl.label.update:
          id: tile_fan_value
          text:
            format: "%.0f RPM"
            args: ['x']

- id: !extend pump_p0_current_pwm_sensor
  on_value:
    then:
      - lvgl.widget.update:
          id: tile_pump
          bg_color: !lambda |-
            if (x > 0) return lv_color_hex(0xF5F8FC);
            return lv_color_hex(0x919191);
      - lvgl.label.update:
          id: tile_pump_state
          text: !lambda |-
            int pwm = x;
            if (pwm > 0) return str_snprintf("%d%%", 16, pwm);
            return std::string("UIT");

- id: !extend current_compressor_frequency
  on_value:
    then:
      - lvgl.widget.update:
          id: tile_compressor
          bg_color: !lambda |-
            if (x > 0) return lv_color_hex(0xF5F8FC);
            return lv_color_hex(0x919191);
      - lvgl.label.update:
          id: tile_compressor_value
          text:
            format: "%.0f Hz"
            args: ['x']

# ── Home page: Outdoor temperature ──
- id: !extend temperature_outside_ta
  on_value:
    then:
      - lvgl.label.update:
          id: header_outdoor
          text: !lambda |-
            if (isnan(x)) return std::string("Buiten -.-°C");
            return str_snprintf("Buiten %.1f°C", 16, x);

# ── Home page: Mode temperature values ──
- id: !extend dhw_temperature_tw_sensor
  on_value:
    then:
      - script.execute: update_water_mode_temperature_display

- id: !extend heat_cool_temperature_tc
