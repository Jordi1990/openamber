# ── Nav bar: WiFi icon + Settings WiFi panel ──
- id: !extend wifi_signal_db
  on_value:
    then:
      - lvgl.label.update:
          id: nav_status_wifi_icon
          text: !lambda |-
            if (isnan(x)) return (std::string) "\U000F092E";
            if (x >= -60.0f) return (std::string) "\U000F0928";
            if (x >= -70.0f) return (std::string) "\U000F0925";
            if (x >= -80.0f) return (std::string) "\U000F0922";
            return (std::string) "\U000F091F";
      - lvgl.widget.update:
          id: nav_status_wifi_icon
          text_color: !lambda |-
            if (isnan(x)) return lv_color_hex(0x9CA3AF);
            if (x >= -70.0f) return lv_color_hex(0xD1D5DB);
            if (x >= -80.0f) return lv_color_hex(0xF59E0B);
            return lv_color_hex(0xEF4444);
      - lvgl.label.update:
          id: wifi_signal_label
          text: !lambda |-
            if (isnan(x)) return std::string("Geen signaal");
            char buf[32];
            snprintf(buf, sizeof(buf), "%.0f dBm", x);
            return std::string(buf);
      - lvgl.label.update:
          id: wifi_status_label
          text: !lambda |-
            if (isnan(x)) return std::string("Niet verbonden");
            return std::string("Verbonden");
      - lvgl.widget.update:
          id: wifi_status_label
          text_color: !lambda |-
            if (isnan(x)) return lv_color_hex(0xEF4444);
            return lv_color_hex(0x16A34A);
      - if:
          condition:
            lambda: 'return isnan(x);'
          then:
            - lvgl.widget.hide: { id: wifi_connected_section }
            - lvgl.widget.show: { id: wifi_disconnected_section }
          else:
            - lvgl.widget.show: { id: wifi_connected_section }
            - lvgl.widget.hide: { id: wifi_disconnected_section }
