# ══════════════════════════════════════════════════════════════
# Text Sensor → LVGL UI bindings (event-driven via !extend)
# These extend text sensors defined in common/text_sensors.yaml
# to add on_value callbacks that update LVGL widgets on change.
# ══════════════════════════════════════════════════════════════

# ── Home page: Mode temperature display depends on state ──
- id: !extend state_machine_state_main
  on_value:
    then:
      - script.execute: update_water_mode_temperature_display
      - script.execute: update_water_mode_efficiency_display
      - script.execute: update_service_mode_ui
      - script.execute: update_system_diagnostics_ui

- id: !extend state_machine_state_heat_cool
  on_value:
    then:
      - script.execute: update_service_diag_summary_ui
      - script.execute: update_system_diagnostics_ui

- id: !extend state_machine_state_dhw
  on_value:
    then:
      - script.execute: update_service_diag_summary_ui
      - script.execute: update_system_diagnostics_ui

# ── Settings page: Analytics device ID ──
- id: !extend analytics_device_id
  on_value:
    then:
      - if:
          condition:
            lambda: 'return !x.empty();'
          then:
            - lvgl.label.update:
                id: set_analytics_id_value
                text:
                  format: "%s"
                  args: ['x.c_str()']
          else:
            - lvgl.label.update:
                id: set_analytics_id_value
                text: "Onbekend"

# ── Settings page: WiFi info ──
- id: !extend wifi_mac_ui
  on_value:
    then:
      - script.execute: update_wifi_connected_summary_ui
      - script.execute: update_system_diagnostics_ui

- id: !extend wifi_ssid_ui
  on_value:
    then:
      - script.execute: update_wifi_connected_summary_ui
      - script.execute: update_system_diagnostics_ui

- id: !extend wifi_ip_ui
  on_value:
    then:
      - script.execute: update_wifi_connected_summary_ui
      - script.execute: update_system_diagnostics_ui

- id: !extend wifi_scan_results_ui
  on_value:
    then:
      - lambda: |-
          std::string result = x;
          std::string options;
          options.reserve(result.size() + 24);
          std::string seen;
          seen.reserve(result.size() + 2);
          seen.push_back('\n');
          size_t pos = 0;
          while (pos < result.size()) {
            size_t end = result.find('\n', pos);
            if (end == std::string::npos) end = result.size();
            std::string line = result.substr(pos, end - pos);
            size_t paren = line.rfind(" (");
            std::string ssid = (paren != std::string::npos) ? line.substr(0, paren) : line;
            if (!ssid.empty()) {
              std::string needle;
              needle.reserve(ssid.size() + 2);
              needle.push_back('\n');
              needle += ssid;
              needle.push_back('\n');
              if (seen.find(needle) == std::string::npos) {
                if (!options.empty()) options += "\n";
                options += ssid;
                seen += ssid;
                seen.push_back('\n');
              }
            }
            pos = end + 1;
          }
          if (!options.empty()) {
            options += "\nHandmatig...";
          } else {
            options = "Geen netwerken gevonden\nHandmatig...";
          }
          const char *current_options = lv_dropdown_get_options(id(wifi_network_dd)->obj);
          if (current_options != nullptr && options == current_options) {
            return;
          }
          lv_dropdown_set_options(id(wifi_network_dd)->obj, options.c_str());
