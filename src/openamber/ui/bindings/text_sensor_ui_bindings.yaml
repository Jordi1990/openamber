# ══════════════════════════════════════════════════════════════
# Text Sensor → LVGL UI bindings (event-driven via !extend)
# These extend text sensors defined in common/text_sensors.yaml
# to add on_value callbacks that update LVGL widgets on change.
# ══════════════════════════════════════════════════════════════

# ── Home page: Mode temperature display depends on state ──
- id: !extend state_machine_state_main
  on_value:
    then:
      - script.execute: update_water_mode_temperature_display

# ── Settings page: Analytics device ID ──
- id: !extend analytics_device_id
  on_value:
    then:
      - lvgl.label.update:
          id: set_analytics_id_value
          text: !lambda |-
            if (x.empty()) return std::string("Onbekend");
            return x;

# ── Settings page: WiFi info ──
- id: !extend wifi_mac_ui
  on_value:
    then:
      - lvgl.label.update:
          id: wifi_mac_label
          text: !lambda |-
            if (x.empty()) return std::string("-");
            return x;

- id: !extend wifi_ssid_ui
  on_value:
    then:
      - lvgl.label.update:
          id: wifi_ssid_label
          text: !lambda |-
            if (x.empty()) return std::string("-");
            return x;

- id: !extend wifi_ip_ui
  on_value:
    then:
      - lvgl.label.update:
          id: wifi_ip_label
          text: !lambda |-
            if (x.empty()) return std::string("-");
            return x;

- id: !extend wifi_scan_results_ui
  on_value:
    then:
      - lambda: |-
          std::string result = x;
          std::string options;
          size_t pos = 0;
          while (pos < result.size()) {
            size_t end = result.find('\n', pos);
            if (end == std::string::npos) end = result.size();
            std::string line = result.substr(pos, end - pos);
            size_t paren = line.rfind(" (");
            std::string ssid = (paren != std::string::npos) ? line.substr(0, paren) : line;
            if (!ssid.empty()) {
              std::string check = "\n" + options + "\n";
              if (check.find("\n" + ssid + "\n") == std::string::npos) {
                if (!options.empty()) options += "\n";
                options += ssid;
              }
            }
            pos = end + 1;
          }
          if (!options.empty()) {
            options += "\nHandmatig...";
          } else {
            options = "Geen netwerken gevonden\nHandmatig...";
          }
          lv_dropdown_set_options(id(wifi_network_dd)->obj, options.c_str());
