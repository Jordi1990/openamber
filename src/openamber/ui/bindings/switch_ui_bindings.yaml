# ══════════════════════════════════════════════════════════════
# Switch → LVGL UI bindings (event-driven via !extend)
# These extend switches defined in common/switches.yaml to add
# on_state callbacks that update LVGL widgets on change.
# ══════════════════════════════════════════════════════════════

# ── Settings page: Analytics toggle ──
- id: !extend analytics_enabled_switch
  on_state:
    then:
      - lvgl.widget.update:
          id: set_analytics_enabled_switch_ui
          state:
            checked: !lambda 'return x;'
      - if:
          condition:
            lambda: 'return x;'
          then:
            - lvgl.widget.show: { id: set_analytics_id_row }
          else:
            - lvgl.widget.hide: { id: set_analytics_id_row }

# ── Settings: Pump P1 toggle ──
- id: !extend pump_p1_enabled
  on_state:
    then:
      - lvgl.widget.update:
          id: set_pump_p1_switch
          state:
            checked: !lambda 'return x;'

# ── Settings: DHW enabled toggle ──
- id: !extend dhw_enabled_switch
  on_state:
    then:
      - lvgl.widget.update:
          id: set_dhw_enabled_switch_ui
          state:
            checked: !lambda 'return x;'
      - if:
          condition:
            lambda: 'return x;'
          then:
            - lvgl.widget.show: { id: stab_dhw }
          else:
            - lvgl.widget.hide: { id: stab_dhw }

