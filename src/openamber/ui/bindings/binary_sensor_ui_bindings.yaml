# ── Boot screen: Hide when both modbus units online ──
- id: !extend modbus_inside_online
  on_state:
    then:
      - lvgl.label.update:
          id: service_diag_modbus_inside_value
          text:
            format: "%s"
            args: ['x ? "Online" : "Offline"']
      - lvgl.label.update:
          id: service_diag_modbus_outside_value
          text:
            format: "%s"
            args: ['id(modbus_outside_online).state ? "Online" : "Offline"']
      - if:
          condition:
            - binary_sensor.is_on: modbus_inside_online
            - binary_sensor.is_on: modbus_outside_online
          then:
            - lvgl.widget.hide:
                id: boot_screen
            - lvgl.label.update:
                id: header_title
                text:
                  format: "OpenAmber %s"
                  args: ['ESPHOME_PROJECT_VERSION']

- id: !extend modbus_outside_online
  on_state:
    then:
      - lvgl.label.update:
          id: service_diag_modbus_outside_value
          text:
            format: "%s"
            args: ['x ? "Online" : "Offline"']
      - lvgl.label.update:
          id: service_diag_modbus_inside_value
          text:
            format: "%s"
            args: ['id(modbus_inside_online).state ? "Online" : "Offline"']
      - if:
          condition:
            - binary_sensor.is_on: modbus_inside_online
            - binary_sensor.is_on: modbus_outside_online
          then:
            - lvgl.widget.hide:
                id: boot_screen
            - lvgl.label.update:
                id: header_title
                text:
                  format: "OpenAmber %s"
                  args: ['ESPHOME_PROJECT_VERSION']
