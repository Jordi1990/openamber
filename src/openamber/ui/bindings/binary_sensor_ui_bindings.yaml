# ══════════════════════════════════════════════════════════════
# Binary Sensor → LVGL UI bindings (event-driven via !extend)
# These extend binary sensors defined in common/binary_sensors.yaml
# to add on_state callbacks that update LVGL widgets on change.
# ══════════════════════════════════════════════════════════════

# ── Home page: Tiles ──
- id: !extend defrost_active_sensor
  on_state:
    then:
      - lvgl.widget.update:
          id: tile_defrost
          bg_color: !lambda |-
            if (x) return lv_color_hex(0xF5F8FC);
            return lv_color_hex(0x919191);
      - lvgl.label.update:
          id: tile_defrost_state
          text: !lambda |-
            if (x) return "AAN";
            return "UIT";
      - lvgl.label.update:
          id: service_diag_defrost_bottom_value
          text:
            format: "%s / %s"
            args: ['x ? "AAN" : "UIT"', 'id(bottom_heater_active_sensor).state ? "AAN" : "UIT"']

- id: !extend backup_heater_active_sensor
  on_state:
    then:
      - lvgl.widget.update:
          id: tile_backup_heater
          bg_color: !lambda |-
            if (x) return lv_color_hex(0xF5F8FC);
            return lv_color_hex(0x919191);
      - lvgl.label.update:
          id: tile_backup_state
          text: !lambda |-
            if (x) return "AAN";
            return "UIT";

- id: !extend bottom_heater_active_sensor
  on_state:
    then:
      - lvgl.widget.update:
          id: tile_baseplate
          bg_color: !lambda |-
            if (x) return lv_color_hex(0xF5F8FC);
            return lv_color_hex(0x919191);
      - lvgl.label.update:
          id: tile_baseplate_state
          text: !lambda |-
            if (x) return "AAN";
            return "UIT";
      - lvgl.label.update:
          id: service_diag_defrost_bottom_value
          text:
            format: "%s / %s"
            args: ['id(defrost_active_sensor).state ? "AAN" : "UIT"', 'x ? "AAN" : "UIT"']

# ── Nav bar: Demand icons ──
- id: !extend heat_demand_active_sensor
  on_state:
    then:
      - lvgl.widget.update:
          id: nav_status_heat_icon
          hidden: !lambda 'return !x;'

- id: !extend cool_demand_active_sensor
  on_state:
    then:
      - lvgl.widget.update:
          id: nav_status_cool_icon
          hidden: !lambda 'return !x;'

- id: !extend dhw_demand_active_sensor
  on_state:
    then:
      - lvgl.widget.update:
          id: nav_status_dhw_icon
          hidden: !lambda 'return !x;'

# ── Home page: DHW pump active → circulation animation ──
- id: !extend dhw_pump_active_sensor
  on_state:
    then:
      - lvgl.widget.update:
          id: dhw_circulation_spinner
          hidden: !lambda 'return !x;'
      - lvgl.widget.update:
          id: dhw_flow_arrow_up
          hidden: !lambda 'return !x;'
      - lvgl.widget.update:
          id: dhw_flow_arrow_down
          hidden: !lambda 'return !x;'
      - lvgl.label.update:
          id: dhw_pump_state_label
          text: !lambda |-
            if (x) return "AAN";
            return "UIT";
      - lvgl.widget.update:
          id: dhw_pump_icon
          text_color: !lambda |-
            if (x) return lv_color_hex(0x22D3EE);
            return lv_color_hex(0x919191);
      - lvgl.widget.update:
          id: dhw_pump_state_label
          text_color: !lambda |-
            if (x) return lv_color_hex(0x22D3EE);
            return lv_color_hex(0x919191);

