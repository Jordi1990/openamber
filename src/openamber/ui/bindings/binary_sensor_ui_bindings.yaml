# ══════════════════════════════════════════════════════════════
# Binary Sensor → LVGL UI bindings (event-driven via !extend)
# These extend binary sensors defined in common/binary_sensors.yaml
# to add on_state callbacks that update LVGL widgets on change.
# ══════════════════════════════════════════════════════════════

# ── Home page: Tiles ──
- id: !extend defrost_active_sensor
  on_state:
    then:
      - lvgl.widget.update:
          id: tile_defrost
          bg_color: !lambda |-
            if (x) return lv_color_hex(0xF5F8FC);
            return lv_color_hex(0x919191);
      - lvgl.label.update:
          id: tile_defrost_state
          text: !lambda |-
            if (x) return "AAN";
            return "UIT";

- id: !extend backup_heater_active_sensor
  on_state:
    then:
      - lvgl.widget.update:
          id: tile_backup_heater
          bg_color: !lambda |-
            if (x) return lv_color_hex(0xF5F8FC);
            return lv_color_hex(0x919191);
      - lvgl.label.update:
