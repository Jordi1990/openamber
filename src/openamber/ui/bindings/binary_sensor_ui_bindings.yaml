# ── Nav bar: Demand icons ──
- id: !extend heat_demand_active_sensor
  on_state:
    then:
      - lvgl.widget.update:
          id: nav_status_heat_icon
          hidden: !lambda 'return !x;'

- id: !extend cool_demand_active_sensor
  on_state:
    then:
      - lvgl.widget.update:
          id: nav_status_cool_icon
          hidden: !lambda 'return !x;'

- id: !extend dhw_demand_active_sensor
  on_state:
    then:
      - lvgl.widget.update:
          id: nav_status_dhw_icon
          hidden: !lambda 'return !x;'

# ── Home page: DHW pump active → circulation animation ──
- id: !extend dhw_pump_active_sensor
  on_state:
    then:
      - lvgl.widget.update:
          id: dhw_circulation_spinner
          hidden: !lambda 'return !x;'
      - lvgl.widget.update:
          id: dhw_flow_arrow_up
          hidden: !lambda 'return !x;'
      - lvgl.widget.update:
          id: dhw_flow_arrow_down
          hidden: !lambda 'return !x;'
      - lvgl.label.update:
          id: dhw_pump_state_label
          text: !lambda |-
            if (x) return "AAN";
            return "UIT";
      - lvgl.widget.update:
          id: dhw_pump_icon
          text_color: !lambda |-
            if (x) return lv_color_hex(0x22D3EE);
            return lv_color_hex(0x919191);
      - lvgl.widget.update:
          id: dhw_pump_state_label
          text_color: !lambda |-
            if (x) return lv_color_hex(0x22D3EE);
            return lv_color_hex(0x919191);

- id: !extend sg_ready_a_active_sensor
  on_state:
    then:
