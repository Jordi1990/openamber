# ── Nav bar: Demand icons ──
- id: !extend heat_demand_active_sensor
  on_state:
    then:
      - lvgl.widget.update:
          id: nav_status_heat_icon
          hidden: !lambda 'return !x;'

- id: !extend cool_demand_active_sensor
  on_state:
    then:
      - lvgl.widget.update:
          id: nav_status_cool_icon
          hidden: !lambda 'return !x;'

- id: !extend dhw_demand_active_sensor
  on_state:
    then:
      - lvgl.widget.update:
          id: nav_status_dhw_icon
          hidden: !lambda 'return !x;'

# ── Settings: OpenTherm diagnostics ──
- id: !extend opentherm_link_online
  on_state:
    then:
      - lvgl.widget.update:
          id: set_ot_status_value
          text_color: !lambda |-
            return x ? lv_color_hex(0x16A34A) : lv_color_hex(0xEF4444);

# ── Boot screen: Hide when both modbus units online ──
- id: !extend modbus_inside_online
  on_state:
    then:
      - if:
          condition:
            - binary_sensor.is_on: modbus_inside_online
            - binary_sensor.is_on: modbus_outside_online
          then:
            - lvgl.widget.hide:
                id: boot_screen
            - lvgl.label.update:
                id: header_title
                text: !lambda |-
                  return std::string("OpenAmber ") + ESPHOME_PROJECT_VERSION;

- id: !extend modbus_outside_online
  on_state:
    then:
      - if:
          condition:
            - binary_sensor.is_on: modbus_inside_online
            - binary_sensor.is_on: modbus_outside_online
          then:
            - lvgl.widget.hide:
                id: boot_screen
            - lvgl.label.update:
                id: header_title
                text: !lambda |-
                  return std::string("OpenAmber ") + ESPHOME_PROJECT_VERSION;
