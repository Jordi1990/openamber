- id: update_dhw_schedule_ui
  mode: restart
  then:
    - lvgl.widget.update:
        id: set_dhw_day_mon
        bg_color: !lambda |-
          if (!id(dhw_schedule_enabled_switch).state) return lv_color_hex(0xE5E7EB);
          return id(dhw_schedule_monday_enabled_switch).state ? lv_color_hex(0x1F3B68) : lv_color_hex(0xCBD5E1);
    - lvgl.widget.update:
        id: set_dhw_day_mon_lbl
        text_color: !lambda |-
          if (!id(dhw_schedule_enabled_switch).state) return lv_color_hex(0x9CA3AF);
