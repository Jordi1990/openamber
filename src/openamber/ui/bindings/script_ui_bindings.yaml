- id: toggle_header_alert_blink
  mode: restart
  then:
    - if:
        condition:
          lambda: 'return id(error_active).state || id(warning_active).state;'
        then:
          - globals.set:
              id: header_alert_blink_phase
              value: !lambda 'return !id(header_alert_blink_phase);'
          - script.execute: update_header_alert_icons

- id: update_service_diag_summary_ui
  mode: restart
  then:
    - lvgl.label.update:
        id: service_diag_status_values
        text: !lambda |-
          std::string main_state = id(state_machine_state_main).state;
          std::string heat_cool_state = id(state_machine_state_heat_cool).state;
          std::string dhw_state = id(state_machine_state_dhw).state;
          if (main_state.empty()) main_state = "-";
          if (heat_cool_state.empty()) heat_cool_state = "-";
          if (dhw_state.empty()) dhw_state = "-";
          return main_state + "\n" + heat_cool_state + "\n" + dhw_state;
    - lvgl.label.update:
        id: service_diag_temp_values
        text: !lambda |-
          auto format_temp = [](float value) -> std::string {
            if (isnan(value)) return "-";
            char buffer[24];
            snprintf(buffer, sizeof(buffer), "%.1f°C", value);
            return std::string(buffer);
          };
          auto format_pressure = [](float value) -> std::string {
            if (isnan(value)) return "-";
            char buffer[24];
            snprintf(buffer, sizeof(buffer), "%.1f", value);
            return std::string(buffer);
          };
          return format_temp(id(temperature_outside_ta).state) + " / " + format_temp(id(heat_cool_temperature_tc).state) + "\n"
            + format_temp(id(outlet_temperature_tuo).state) + " / " + format_temp(id(inlet_temperature_tui).state) + "\n"
            + format_pressure(id(suction_pressure_ps).state) + " / " + format_pressure(id(discharge_pressure_pd).state) + " bar";
    - lvgl.label.update:
        id: service_diag_control_values
        text: !lambda |-
          auto format_hz = [](float value) -> std::string {
            if (isnan(value)) return "- Hz";
            char buffer[24];
            snprintf(buffer, sizeof(buffer), "%.0f Hz", value);
            return std::string(buffer);
          };
          auto format_pct = [](float value) -> std::string {
            if (isnan(value)) return "- %";
            char buffer[24];
            snprintf(buffer, sizeof(buffer), "%.0f %%", value);
            return std::string(buffer);
          };
          auto format_rpm = [](float value) -> std::string {
            if (isnan(value)) return "- rpm";
            char buffer[24];
            snprintf(buffer, sizeof(buffer), "%.0f rpm", value);
            return std::string(buffer);
          };
          return format_hz(id(current_compressor_frequency).state) + "\n"
            + format_pct(id(pump_p0_current_pwm_sensor).state) + "\n"
            + format_rpm(id(fan_rpm_sensor).state) + "\n"
            + format_pct(id(expansion_valve_position).state);
    - lvgl.label.update:
        id: service_diag_system_values
        text: !lambda |-
          return std::string(id(defrost_active_sensor).state ? "AAN" : "UIT") + " / "
            + (id(bottom_heater_active_sensor).state ? "AAN" : "UIT") + "\n"
            + (id(modbus_inside_online).state ? "Online" : "Offline") + "\n"
            + (id(modbus_outside_online).state ? "Online" : "Offline") + "\n"
            + (id(sg_ready_a_active_sensor).state ? "AAN" : "UIT") + " / "
            + (id(sg_ready_b_active_sensor).state ? "AAN" : "UIT") + "\n"
            + (id(external_heat_demand_wired).state ? "AAN" : "UIT") + " / "
            + (id(external_cool_demand_wired).state ? "AAN" : "UIT");

- id: update_system_diagnostics_ui
  mode: restart
  then:
    - lvgl.label.update:
        id: system_diag_runtime_values
        text: !lambda |-
          char uptime_buf[24];
          if (id(sensor_uptime).has_state()) {
            snprintf(uptime_buf, sizeof(uptime_buf), "%.0f min", id(sensor_uptime).state / 60.0f);
          } else {
            snprintf(uptime_buf, sizeof(uptime_buf), "-");
          }
          char value_buf[96];
          snprintf(value_buf, sizeof(value_buf), "%s\n%s", ESPHOME_VERSION, uptime_buf);
          return std::string(value_buf);
    - lvgl.label.update:
        id: system_diag_memory_values
        text: !lambda |-
          char heap_free_buf[20];
          char heap_frag_buf[20];
          char heap_block_buf[20];
          char psram_buf[20];
          if (id(system_heap_free).has_state()) {
            snprintf(heap_free_buf, sizeof(heap_free_buf), "%.0f kB", id(system_heap_free).state / 1024.0f);
          } else {
            snprintf(heap_free_buf, sizeof(heap_free_buf), "-");
          }
          if (id(system_heap_fragmentation).has_state()) {
            snprintf(heap_frag_buf, sizeof(heap_frag_buf), "%.0f %%", id(system_heap_fragmentation).state);
          } else {
            snprintf(heap_frag_buf, sizeof(heap_frag_buf), "-");
          }
          if (id(system_heap_max_block).has_state()) {
            snprintf(heap_block_buf, sizeof(heap_block_buf), "%.0f kB", id(system_heap_max_block).state / 1024.0f);
          } else {
            snprintf(heap_block_buf, sizeof(heap_block_buf), "-");
          }
          if (id(system_psram_free).has_state()) {
            snprintf(psram_buf, sizeof(psram_buf), "%.0f kB", id(system_psram_free).state / 1024.0f);
          } else {
            snprintf(psram_buf, sizeof(psram_buf), "-");
          }
          return std::string(heap_free_buf) + "\n" + heap_frag_buf + "\n" + heap_block_buf + "\n" + psram_buf;
    - lvgl.label.update:
        id: system_diag_esp_values
        text: !lambda |-
          auto trim_copy = [](std::string s) -> std::string {
            size_t start = s.find_first_not_of(" \t\r\n");
            if (start == std::string::npos) return std::string("");
            size_t end = s.find_last_not_of(" \t\r\n");
            return s.substr(start, end - start + 1);
          };
          auto extract_section = [&](const std::string &source, const std::string &marker) -> std::string {
            size_t begin = source.find(marker);
            if (begin == std::string::npos) return std::string("");
            begin += marker.size();
            size_t end = source.find('|', begin);
            if (end == std::string::npos) return trim_copy(source.substr(begin));
            return trim_copy(source.substr(begin, end - begin));
          };

          std::string chip = "-";
          if (id(system_debug_device_info).has_state()) {
            std::string info = id(system_debug_device_info).state;
            std::string chip_section = extract_section(info, "|Chip:");
            if (chip_section.empty()) {
              chip_section = extract_section(info, "Chip:");
            }
            if (!chip_section.empty()) {
              size_t features_pos = chip_section.find(" Features:");
              if (features_pos != std::string::npos) {
                chip_section = trim_copy(chip_section.substr(0, features_pos));
              }
              if (!chip_section.empty()) {
                chip = chip_section;
              }
            }
          }

          std::string reset_reason = "-";
          if (id(system_debug_reset_reason).has_state()) {
            std::string raw = trim_copy(id(system_debug_reset_reason).state);
            if (!raw.empty()) {
              reset_reason = raw;
            }
          }

          return chip + "\n" + reset_reason;

- id: update_service_errors_ui
  mode: restart
  then:
    - lambda: |-
        if (id(service_errors_status) == nullptr ||
            id(service_errors_code_title) == nullptr ||
            id(service_errors_explanation_value) == nullptr ||
            id(service_errors_reset_timeout_btn) == nullptr ||
