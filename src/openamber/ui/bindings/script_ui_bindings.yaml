                - lvgl.label.update: { id: general_stab_systeem_lbl, text_color: 0x4B5563 }
                - lvgl.widget.update: { id: general_stab_noodbedrijf, bg_color: 0x1F3B68 }
                - lvgl.label.update: { id: general_stab_noodbedrijf_lbl, text_color: 0xFFFFFF }
                - lvgl.widget.update: { id: general_stab_sensor_kalibratie, bg_color: 0xCBD5E1 }
                - lvgl.label.update: { id: general_stab_sensor_kalibratie_lbl, text_color: 0x4B5563 }
              else:
                - lvgl.widget.hide: { id: panel_general_page_systeem }
                - lvgl.widget.hide: { id: panel_general_page_noodbedrijf }
                - lvgl.widget.show: { id: panel_general_page_sensor_kalibratie }
                - lvgl.widget.update: { id: general_stab_systeem, bg_color: 0xCBD5E1 }
                - lvgl.label.update: { id: general_stab_systeem_lbl, text_color: 0x4B5563 }
                - lvgl.widget.update: { id: general_stab_noodbedrijf, bg_color: 0xCBD5E1 }
                - lvgl.label.update: { id: general_stab_noodbedrijf_lbl, text_color: 0x4B5563 }
                - lvgl.widget.update: { id: general_stab_sensor_kalibratie, bg_color: 0x1F3B68 }
                - lvgl.label.update: { id: general_stab_sensor_kalibratie_lbl, text_color: 0xFFFFFF }
    - script.execute: update_emergency_mode_ui

- id: update_header_mode_badge
  mode: restart
  then:
    - if:
        condition:
          lambda: 'return id(service_mode_enabled).state && id(state_machine_state_main).state == "Maintenance";'
        then:
          - lvgl.widget.show: { id: header_maintenance_badge }
          - lvgl.widget.hide: { id: header_emergency_badge }
        else:
          - if:
              condition:
                switch.is_on: emergency_mode_enabled
              then:
                - lvgl.widget.hide: { id: header_maintenance_badge }
                - lvgl.widget.show: { id: header_emergency_badge }
              else:
                - lvgl.widget.hide: { id: header_maintenance_badge }
                - lvgl.widget.hide: { id: header_emergency_badge }

- id: update_emergency_mode_ui
  mode: restart
  then:
    - lvgl.widget.update:
        id: set_emergency_mode_switch_ui
        state:
          checked: !lambda 'return id(emergency_mode_enabled).state;'
    - script.execute: update_header_mode_badge

- id: update_bottomplate_mode_ui
  mode: restart
  then:
    - if:
        condition:
          lambda: |-
            return lv_dropdown_get_selected(id(set_bottomplate_mode_dd)->obj) == 1;
        then:
          - lvgl.widget.update:
              id: set_general_bodemplaat_start_row
              state:
                disabled: false
          - lvgl.widget.update:
              id: set_general_bodemplaat_hysteresis_row
              state:
                disabled: false
          - lvgl.widget.update:
              id: set_general_bodemplaat_start_row
              opa: 100%
          - lvgl.widget.update:
              id: set_general_bodemplaat_hysteresis_row
              opa: 100%
        else:
          - lvgl.widget.update:
              id: set_general_bodemplaat_start_row
              state:
                disabled: true
          - lvgl.widget.update:
              id: set_general_bodemplaat_hysteresis_row
              state:
                disabled: true
          - lvgl.widget.update:
              id: set_general_bodemplaat_start_row
              opa: 40%
          - lvgl.widget.update:
              id: set_general_bodemplaat_hysteresis_row
              opa: 40%

