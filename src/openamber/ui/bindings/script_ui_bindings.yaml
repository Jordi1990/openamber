- id: update_home_pump_tile_state
  mode: restart
  then:
    - lvgl.label.update:
        id: tile_pump_state
        text: !lambda |-
          const int pwm = (int) id(pump_p0_current_pwm_sensor).state;
          const bool pump_running = pwm > 0;
          if (!id(flow_sensor_enabled).state) {
            return pump_running ? str_sprintf("%d%%", pwm) : std::string("UIT");
          }

          std::string pwm_line = pump_running ? str_sprintf("%d%%", pwm) : std::string("UIT");
          float flow_lpm = id(water_flow_rate).state;
          if (isnan(flow_lpm)) {
            return pwm_line + "\n- l/u";
          }
          return pwm_line + "\n" + str_sprintf("%.0f l/u", flow_lpm * 60.0f);

