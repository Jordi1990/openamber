# ══════════════════════════════════════════════════════════════
# UI helper scripts used by event-driven bindings
# ══════════════════════════════════════════════════════════════

- id: update_water_mode_temperature_display
  mode: restart
  then:
    - lvgl.label.update:
        id: water_mode_temperature_values
        text: !lambda |-
          const std::string main_state = id(state_machine_state_main).state;
          float current_temperature = NAN;
          float target_temperature = NAN;

          if (main_state == "DHW") {
            current_temperature = id(dhw_temperature_tw_sensor).state;
            target_temperature = id(current_dhw_setpoint_sensor).state;
          } else if (main_state == "Heat/Cool") {
            current_temperature = id(heat_cool_temperature_tc).state;
            target_temperature = id(current_setpoint).state;
          }

          if (isnan(current_temperature) || isnan(target_temperature))
            return std::string("-°C / -°C");
          return str_snprintf("%.1f°C / %.1f°C", 48, current_temperature, target_temperature);

- id: update_manual_setpoint_ui
  mode: restart
  then:
    - lvgl.label.update:
        id: set_manual_sp_val
        text:
          format: "%.0f°C"
          args: ['id(manual_setpoint).state']
    - lvgl.label.update:
        id: set_manual_sp_lbl
        text_color: !lambda |-
          return id(heat_mode_select).current_option() == "Extern setpoint" ? lv_color_hex(0x1F2933) : lv_color_hex(0x9CA3AF);
    - lvgl.label.update:
        id: set_manual_sp_sub
        text_color: !lambda |-
          return id(heat_mode_select).current_option() == "Extern setpoint" ? lv_color_hex(0x6B7280) : lv_color_hex(0xBFC5CC);
    - lvgl.label.update:
        id: set_manual_sp_val
        text_color: !lambda |-
          return id(heat_mode_select).current_option() == "Extern setpoint" ? lv_color_hex(0x1F2933) : lv_color_hex(0x9CA3AF);
    - lvgl.widget.update:
        id: set_manual_sp_dec
        bg_color: !lambda |-
          return id(heat_mode_select).current_option() == "Extern setpoint" ? lv_color_hex(0x1F3B68) : lv_color_hex(0xE5E7EB);
    - lvgl.label.update:
        id: set_manual_sp_dec_lbl
        text_color: !lambda |-
          return id(heat_mode_select).current_option() == "Extern setpoint" ? lv_color_hex(0xFFFFFF) : lv_color_hex(0x9CA3AF);
    - lvgl.widget.update:
        id: set_manual_sp_inc
        bg_color: !lambda |-
          return id(heat_mode_select).current_option() == "Extern setpoint" ? lv_color_hex(0x1F3B68) : lv_color_hex(0xE5E7EB);
    - lvgl.label.update:
