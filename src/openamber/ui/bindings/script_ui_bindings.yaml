# ══════════════════════════════════════════════════════════════
# UI helper scripts used by event-driven bindings
# ══════════════════════════════════════════════════════════════

- id: update_thermostat_settings_ui
  mode: restart
  then:
    - lvgl.label.update:
        id: set_therm_def_heat_val
        text:
          format: "%.1f°C"
          args: ['id(thermostat_default_heat_setpoint).state']
    - lvgl.label.update:
        id: set_therm_def_cool_val
        text:
          format: "%.1f°C"
          args: ['id(thermostat_default_cool_setpoint).state']
    - lvgl.label.update:
        id: set_therm_heat_db_val
        text:
          format: "%.1f°C"
          args: ['id(thermostat_heat_deadband).state']
    - lvgl.label.update:
        id: set_therm_heat_or_val
        text:
          format: "%.1f°C"
          args: ['id(thermostat_heat_overrun).state']
    - lvgl.label.update:
        id: set_therm_cool_db_val
        text:
          format: "%.1f°C"
          args: ['id(thermostat_cool_deadband).state']
    - lvgl.label.update:
        id: set_therm_cool_or_val
        text:
          format: "%.1f°C"
          args: ['id(thermostat_cool_overrun).state']
    - lvgl.label.update:
        id: home_therm_setpoint_value
        text:
          format: "%.1f°C"
          args: ['id(thermostat_setpoint_number).state']
    - if:
        condition:
          lambda: 'return isnan(id(room_temperature).state);'
        then:
          - lvgl.label.update:
              id: home_therm_current_temp_value
              text: "-.-°C"
        else:
          - lvgl.label.update:
              id: home_therm_current_temp_value
              text:
                format: "%.1f°C"
                args: ['id(room_temperature).state']
    - script.execute: update_home_thermostat_mode_ui

- id: update_thermostat_mode_ui
  mode: restart
  then:
    - if:
        condition:
          lambda: |-
            auto idx = id(thermostat_mode_select).active_index();
            return idx.has_value() && idx.value() == 0;
        then:
          - lvgl.widget.update: { id: thermostat_row_default_cool, state: { disabled: false }, opa: 100% }
          - lvgl.widget.update: { id: thermostat_row_heat_deadband, state: { disabled: false }, opa: 100% }
          - lvgl.widget.update: { id: thermostat_row_heat_overrun, state: { disabled: false }, opa: 100% }
          - lvgl.widget.update: { id: thermostat_row_cool_deadband, state: { disabled: false }, opa: 100% }
          - lvgl.widget.update: { id: thermostat_row_cool_overrun, state: { disabled: false }, opa: 100% }
        else:
          - lvgl.widget.update: { id: thermostat_row_default_cool, state: { disabled: true }, opa: 40% }
          - lvgl.widget.update: { id: thermostat_row_heat_deadband, state: { disabled: true }, opa: 40% }
          - lvgl.widget.update: { id: thermostat_row_heat_overrun, state: { disabled: true }, opa: 40% }
          - lvgl.widget.update: { id: thermostat_row_cool_deadband, state: { disabled: true }, opa: 40% }
          - lvgl.widget.update: { id: thermostat_row_cool_overrun, state: { disabled: true }, opa: 40% }

- id: nav_select_tab
  mode: restart
  parameters:
    tab_index: int
  then:
    - if:
        condition:
          lambda: 'return tab_index == 0;'
        then:
          - lvgl.widget.update: { id: page_home, hidden: false }
          - lvgl.widget.update: { id: page_thermostat, hidden: true }
          - lvgl.widget.update: { id: page_service, hidden: true }
          - lvgl.widget.update: { id: page_system, hidden: true }
          - lvgl.widget.update: { id: page_settings, hidden: true }
        else:
          - if:
              condition:
                lambda: 'return tab_index == 1;'
              then:
                - lvgl.widget.update: { id: page_home, hidden: true }
                - lvgl.widget.update: { id: page_thermostat, hidden: false }
                - lvgl.widget.update: { id: page_service, hidden: true }
                - lvgl.widget.update: { id: page_system, hidden: true }
                - lvgl.widget.update: { id: page_settings, hidden: true }
                - script.execute: update_home_thermostat_mode_ui
              else:
                - if:
                    condition:
                      lambda: 'return tab_index == 2;'
                    then:
                      - lvgl.widget.update: { id: page_home, hidden: true }
                      - lvgl.widget.update: { id: page_thermostat, hidden: true }
                      - lvgl.widget.update: { id: page_service, hidden: true }
                      - lvgl.widget.update: { id: page_system, hidden: true }
                      - lvgl.widget.update: { id: page_settings, hidden: false }
                    else:
                      - if:
                          condition:
                            lambda: 'return tab_index == 3;'
                          then:
                            - lvgl.widget.update: { id: page_home, hidden: true }
                            - lvgl.widget.update: { id: page_thermostat, hidden: true }
                            - lvgl.widget.update: { id: page_service, hidden: false }
                            - lvgl.widget.update: { id: page_system, hidden: true }
                            - lvgl.widget.update: { id: page_settings, hidden: true }
                            - lvgl.widget.show: { id: service_tabs_bar }
                            - lvgl.widget.update: { id: service_maintenance_panel, width: 100%, align: TOP_LEFT }
                            - lvgl.widget.update: { id: service_sensors_panel, width: 100%, align: TOP_LEFT }
                            - lvgl.widget.hide: { id: service_errors_panel }
                            - lvgl.widget.hide: { id: service_warnings_panel }
                            - lvgl.widget.show: { id: service_maintenance_panel }
                            - lvgl.widget.update: { id: service_maintenance_layout, y: 112, height: 72% }
                            - lvgl.widget.show: { id: service_maintenance_header }
                            - lvgl.widget.show: { id: service_maintenance_title }
                            - lvgl.widget.show: { id: service_maintenance_state }
                            - lvgl.widget.hide: { id: service_sensors_panel }
                            - lvgl.widget.show: { id: set_service_mode_switch_ui }
                            - lvgl.widget.hide: { id: service_mpanel_compressor }
                            - lvgl.widget.hide: { id: service_mpanel_pumps }
                            - lvgl.widget.hide: { id: service_mpanel_valve }
                            - lvgl.widget.hide: { id: service_mpanel_backup }
                            - script.execute: update_service_mode_ui
                            - script.execute: update_service_top_tabs_ui
                          else:
                            - lvgl.widget.update: { id: page_home, hidden: true }
                            - lvgl.widget.update: { id: page_thermostat, hidden: true }
                            - lvgl.widget.update: { id: page_service, hidden: true }
                            - lvgl.widget.update: { id: page_system, hidden: false }
                            - lvgl.widget.update: { id: page_settings, hidden: true }

    - lvgl.widget.update: { id: nav_home, bg_opa: !lambda 'return tab_index == 0 ? 100 : 0;' }
    - lvgl.label.update: { id: nav_home_icon, text_color: !lambda 'return lv_color_hex(tab_index == 0 ? 0xFFFFFF : 0xD1D5DB);' }
    - lvgl.label.update: { id: nav_home_label, text_color: !lambda 'return lv_color_hex(tab_index == 0 ? 0xFFFFFF : 0xD1D5DB);' }

    - lvgl.widget.update: { id: nav_thermostat, bg_opa: !lambda 'return tab_index == 1 ? 100 : 0;' }
    - lvgl.label.update: { id: nav_thermostat_icon, text_color: !lambda 'return lv_color_hex(tab_index == 1 ? 0xFFFFFF : 0xD1D5DB);' }
    - lvgl.label.update: { id: nav_thermostat_label, text_color: !lambda 'return lv_color_hex(tab_index == 1 ? 0xFFFFFF : 0xD1D5DB);' }

    - lvgl.widget.update: { id: nav_settings, bg_opa: !lambda 'return tab_index == 2 ? 100 : 0;' }
    - lvgl.label.update: { id: nav_settings_icon, text_color: !lambda 'return lv_color_hex(tab_index == 2 ? 0xFFFFFF : 0xD1D5DB);' }
    - lvgl.label.update: { id: nav_settings_label, text_color: !lambda 'return lv_color_hex(tab_index == 2 ? 0xFFFFFF : 0xD1D5DB);' }

    - lvgl.widget.update: { id: nav_service, bg_opa: !lambda 'return tab_index == 3 ? 100 : 0;' }
    - lvgl.label.update: { id: nav_service_icon, text_color: !lambda 'return lv_color_hex(tab_index == 3 ? 0xFFFFFF : 0xD1D5DB);' }
    - lvgl.label.update: { id: nav_service_label, text_color: !lambda 'return lv_color_hex(tab_index == 3 ? 0xFFFFFF : 0xD1D5DB);' }

    - lvgl.widget.update: { id: nav_system, bg_opa: !lambda 'return tab_index == 4 ? 100 : 0;' }
    - lvgl.label.update: { id: nav_system_icon, text_color: !lambda 'return lv_color_hex(tab_index == 4 ? 0xFFFFFF : 0xD1D5DB);' }
    - lvgl.label.update: { id: nav_system_label, text_color: !lambda 'return lv_color_hex(tab_index == 4 ? 0xFFFFFF : 0xD1D5DB);' }

- id: update_home_thermostat_visibility
  mode: restart
  then:
    - if:
        condition:
          lambda: 'return id(thermostat_mode_select).current_option() == "Intern";'
        then:
          - lvgl.widget.show: { id: nav_sep_thermostat }
          - lvgl.widget.show: { id: nav_thermostat }
          - lvgl.widget.show: { id: home_thermostat_controls_panel }
        else:
          - if:
              condition:
                lambda: 'return !lv_obj_has_flag(id(page_thermostat), LV_OBJ_FLAG_HIDDEN);'
              then:
                - script.execute:
                    id: nav_select_tab
                    tab_index: 0
          - lvgl.widget.hide: { id: nav_sep_thermostat }
          - lvgl.widget.hide: { id: nav_thermostat }
          - lvgl.widget.update: { id: page_thermostat, hidden: true }
          - lvgl.widget.hide: { id: home_thermostat_controls_panel }

- id: update_home_thermostat_mode_ui
  mode: restart
  then:
    - script.execute: update_home_thermostat_visibility
    - lvgl.widget.update:
        id: home_therm_mode_off_btn
        bg_color: !lambda |-
          auto idx = id(thermostat_control_mode_select).active_index();
          if (!idx.has_value()) return lv_color_hex(0xFFFFFF);
          return lv_color_hex(idx.value() == 0 ? 0xE5EAF1 : 0xFFFFFF);
        border_color: !lambda |-
          auto idx = id(thermostat_control_mode_select).active_index();
          if (!idx.has_value()) return lv_color_hex(0xD1D9E3);
          return lv_color_hex(idx.value() == 0 ? 0x475569 : 0xD1D9E3);
        border_width: !lambda |-
          auto idx = id(thermostat_control_mode_select).active_index();
          return (idx.has_value() && idx.value() == 0) ? 2 : 1;
    - lvgl.label.update:
        id: home_therm_mode_off_icon
        text_color: !lambda |-
          auto idx = id(thermostat_control_mode_select).active_index();
          if (!idx.has_value()) return lv_color_hex(0x64748B);
          return lv_color_hex(idx.value() == 0 ? 0x0F172A : 0x64748B);
    - lvgl.label.update:
        id: home_therm_mode_off_lbl
        text_color: !lambda |-
          auto idx = id(thermostat_control_mode_select).active_index();
          if (!idx.has_value()) return lv_color_hex(0x64748B);
          return lv_color_hex(idx.value() == 0 ? 0x0F172A : 0x64748B);
    - lvgl.widget.update:
        id: home_therm_mode_cool_btn
        bg_color: !lambda |-
          auto idx = id(thermostat_control_mode_select).active_index();
          if (!idx.has_value()) return lv_color_hex(0xFFFFFF);
          return lv_color_hex(idx.value() == 1 ? 0xE0F2FE : 0xFFFFFF);
        border_color: !lambda |-
          auto idx = id(thermostat_control_mode_select).active_index();
          if (!idx.has_value()) return lv_color_hex(0xD1D9E3);
          return lv_color_hex(idx.value() == 1 ? 0x0284C7 : 0xCBD5E1);
        border_width: !lambda |-
          auto idx = id(thermostat_control_mode_select).active_index();
          return (idx.has_value() && idx.value() == 1) ? 2 : 1;
    - lvgl.label.update:
        id: home_therm_mode_cool_icon
        text_color: !lambda |-
          auto idx = id(thermostat_control_mode_select).active_index();
          if (!idx.has_value()) return lv_color_hex(0x64748B);
          return lv_color_hex(idx.value() == 1 ? 0x0C4A6E : 0x64748B);
    - lvgl.label.update:
        id: home_therm_mode_cool_lbl
        text_color: !lambda |-
          auto idx = id(thermostat_control_mode_select).active_index();
          if (!idx.has_value()) return lv_color_hex(0x64748B);
          return lv_color_hex(idx.value() == 1 ? 0x0C4A6E : 0x64748B);
    - lvgl.widget.update:
        id: home_therm_mode_heat_btn
        bg_color: !lambda |-
          auto idx = id(thermostat_control_mode_select).active_index();
          if (!idx.has_value()) return lv_color_hex(0xFFFFFF);
          return lv_color_hex(idx.value() == 2 ? 0xFFEDD5 : 0xFFFFFF);
        border_color: !lambda |-
          auto idx = id(thermostat_control_mode_select).active_index();
          if (!idx.has_value()) return lv_color_hex(0xD1D9E3);
          return lv_color_hex(idx.value() == 2 ? 0xF97316 : 0xD1D9E3);
        border_width: !lambda |-
          auto idx = id(thermostat_control_mode_select).active_index();
          return (idx.has_value() && idx.value() == 2) ? 2 : 1;
    - lvgl.label.update:
        id: home_therm_mode_heat_icon
        text_color: !lambda |-
          auto idx = id(thermostat_control_mode_select).active_index();
          if (!idx.has_value()) return lv_color_hex(0x64748B);
          return lv_color_hex(idx.value() == 2 ? 0x9A3412 : 0x64748B);
    - lvgl.label.update:
        id: home_therm_mode_heat_lbl
        text_color: !lambda |-
          auto idx = id(thermostat_control_mode_select).active_index();
          if (!idx.has_value()) return lv_color_hex(0x64748B);
          return lv_color_hex(idx.value() == 2 ? 0x9A3412 : 0x64748B);

- id: general_select_tab
  mode: restart
  parameters:
    tab_index: int
  then:
    - if:
        condition:
          lambda: 'return tab_index == 0;'
        then:
          - lvgl.widget.show: { id: panel_general_page_systeem }
          - lvgl.widget.hide: { id: panel_general_page_noodbedrijf }
          - lvgl.widget.hide: { id: panel_general_page_sensor_kalibratie }
          - lvgl.widget.hide: { id: panel_general_page_hardware }
          - lvgl.widget.update: { id: general_stab_systeem, bg_color: 0x1F3B68 }
          - lvgl.label.update: { id: general_stab_systeem_lbl, text_color: 0xFFFFFF }
          - lvgl.widget.update: { id: general_stab_noodbedrijf, bg_color: 0xCBD5E1 }
          - lvgl.label.update: { id: general_stab_noodbedrijf_lbl, text_color: 0x4B5563 }
          - lvgl.widget.update: { id: general_stab_sensor_kalibratie, bg_color: 0xCBD5E1 }
          - lvgl.label.update: { id: general_stab_sensor_kalibratie_lbl, text_color: 0x4B5563 }
          - lvgl.widget.update: { id: general_stab_hardware, bg_color: 0xCBD5E1 }
          - lvgl.label.update: { id: general_stab_hardware_lbl, text_color: 0x4B5563 }
          - script.execute: update_advanced_settings_ui
        else:
          - if:
              condition:
                lambda: 'return tab_index == 1;'
              then:
                - lvgl.widget.hide: { id: panel_general_page_systeem }
                - lvgl.widget.show: { id: panel_general_page_noodbedrijf }
                - lvgl.widget.hide: { id: panel_general_page_sensor_kalibratie }
                - lvgl.widget.hide: { id: panel_general_page_hardware }
                - lvgl.widget.update: { id: general_stab_systeem, bg_color: 0xCBD5E1 }
                - lvgl.label.update: { id: general_stab_systeem_lbl, text_color: 0x4B5563 }
                - lvgl.widget.update: { id: general_stab_noodbedrijf, bg_color: 0x1F3B68 }
                - lvgl.label.update: { id: general_stab_noodbedrijf_lbl, text_color: 0xFFFFFF }
                - lvgl.widget.update: { id: general_stab_sensor_kalibratie, bg_color: 0xCBD5E1 }
                - lvgl.label.update: { id: general_stab_sensor_kalibratie_lbl, text_color: 0x4B5563 }
                - lvgl.widget.update: { id: general_stab_hardware, bg_color: 0xCBD5E1 }
                - lvgl.label.update: { id: general_stab_hardware_lbl, text_color: 0x4B5563 }
              else:
                - if:
                    condition:
                      lambda: 'return tab_index == 2;'
                    then:
                      - lvgl.widget.hide: { id: panel_general_page_systeem }
                      - lvgl.widget.hide: { id: panel_general_page_noodbedrijf }
                      - lvgl.widget.show: { id: panel_general_page_sensor_kalibratie }
                      - lvgl.widget.hide: { id: panel_general_page_hardware }
                      - lvgl.widget.update: { id: general_stab_systeem, bg_color: 0xCBD5E1 }
                      - lvgl.label.update: { id: general_stab_systeem_lbl, text_color: 0x4B5563 }
                      - lvgl.widget.update: { id: general_stab_noodbedrijf, bg_color: 0xCBD5E1 }
                      - lvgl.label.update: { id: general_stab_noodbedrijf_lbl, text_color: 0x4B5563 }
                      - lvgl.widget.update: { id: general_stab_sensor_kalibratie, bg_color: 0x1F3B68 }
                      - lvgl.label.update: { id: general_stab_sensor_kalibratie_lbl, text_color: 0xFFFFFF }
                      - lvgl.widget.update: { id: general_stab_hardware, bg_color: 0xCBD5E1 }
                      - lvgl.label.update: { id: general_stab_hardware_lbl, text_color: 0x4B5563 }
                    else:
                      - lvgl.widget.hide: { id: panel_general_page_systeem }
                      - lvgl.widget.hide: { id: panel_general_page_noodbedrijf }
                      - lvgl.widget.hide: { id: panel_general_page_sensor_kalibratie }
                      - lvgl.widget.show: { id: panel_general_page_hardware }
                      - lvgl.widget.update: { id: general_stab_systeem, bg_color: 0xCBD5E1 }
                      - lvgl.label.update: { id: general_stab_systeem_lbl, text_color: 0x4B5563 }
                      - lvgl.widget.update: { id: general_stab_noodbedrijf, bg_color: 0xCBD5E1 }
                      - lvgl.label.update: { id: general_stab_noodbedrijf_lbl, text_color: 0x4B5563 }
                      - lvgl.widget.update: { id: general_stab_sensor_kalibratie, bg_color: 0xCBD5E1 }
                      - lvgl.label.update: { id: general_stab_sensor_kalibratie_lbl, text_color: 0x4B5563 }
                      - lvgl.widget.update: { id: general_stab_hardware, bg_color: 0x1F3B68 }
                      - lvgl.label.update: { id: general_stab_hardware_lbl, text_color: 0xFFFFFF }
                      - script.execute: update_flow_sensor_calibration_ui
    - script.execute: update_emergency_mode_ui

- id: update_flow_sensor_calibration_ui
  mode: restart
  then:
    - if:
        condition:
          switch.is_on: flow_sensor_enabled
        then:
          - lvgl.widget.update:
              id: set_general_hardware_flow_sensor_calibration
              state:
                disabled: false
          - lvgl.widget.update:
              id: set_general_hardware_flow_sensor_calibration
              opa: 100%
        else:
          - lvgl.widget.update:
              id: set_general_hardware_flow_sensor_calibration
              state:
                disabled: true
          - lvgl.widget.update:
              id: set_general_hardware_flow_sensor_calibration
              opa: 40%

- id: update_header_mode_badge
  mode: restart
  then:
    - if:
        condition:
          lambda: 'return id(service_mode_enabled).state && id(state_machine_state_main).state == "Maintenance";'
        then:
          - lvgl.widget.show: { id: header_maintenance_badge }
          - lvgl.widget.hide: { id: header_emergency_badge }
        else:
          - if:
              condition:
                switch.is_on: emergency_mode_enabled
              then:
                - lvgl.widget.hide: { id: header_maintenance_badge }
                - lvgl.widget.show: { id: header_emergency_badge }
              else:
                - lvgl.widget.hide: { id: header_maintenance_badge }
                - lvgl.widget.hide: { id: header_emergency_badge }

- id: update_emergency_mode_ui
  mode: restart
  then:
    - lvgl.widget.update:
        id: set_emergency_mode_switch_ui
        state:
          checked: !lambda 'return id(emergency_mode_enabled).state;'
    - script.execute: update_header_mode_badge

- id: update_bottomplate_mode_ui
  mode: restart
  then:
    - if:
        condition:
          lambda: |-
            return lv_dropdown_get_selected(id(set_bottomplate_mode_dd)->obj) == 1;
        then:
          - lvgl.widget.update:
              id: set_general_bodemplaat_start_row
              state:
                disabled: false
          - lvgl.widget.update:
              id: set_general_bodemplaat_hysteresis_row
              state:
                disabled: false
          - lvgl.widget.update:
              id: set_general_bodemplaat_start_row
              opa: 100%
          - lvgl.widget.update:
              id: set_general_bodemplaat_hysteresis_row
              opa: 100%
        else:
          - lvgl.widget.update:
              id: set_general_bodemplaat_start_row
              state:
                disabled: true
          - lvgl.widget.update:
              id: set_general_bodemplaat_hysteresis_row
              state:
                disabled: true
          - lvgl.widget.update:
              id: set_general_bodemplaat_start_row
              opa: 40%
          - lvgl.widget.update:
              id: set_general_bodemplaat_hysteresis_row
              opa: 40%

- id: pump_select_tab
  mode: restart
  parameters:
    tab_index: int
  then:
    - if:
        condition:
          lambda: 'return tab_index == 0;'
        then:
          - lvgl.widget.show: { id: panel_pump_page_algemeen }
          - lvgl.widget.hide: { id: panel_pump_page_pompsnelheid }
          - lvgl.widget.hide: { id: panel_frost }
          - lvgl.widget.update: { id: pump_stab_algemeen, bg_color: 0x1F3B68 }
          - lvgl.label.update: { id: pump_stab_algemeen_lbl, text_color: 0xFFFFFF }
          - lvgl.widget.update: { id: pump_stab_pompsnelheid, bg_color: 0xCBD5E1 }
          - lvgl.label.update: { id: pump_stab_pompsnelheid_lbl, text_color: 0x4B5563 }
          - lvgl.widget.update: { id: pump_stab_vorstbescherming, bg_color: 0xCBD5E1 }
          - lvgl.label.update: { id: pump_stab_vorstbescherming_lbl, text_color: 0x4B5563 }
        else:
          - if:
              condition:
                lambda: 'return tab_index == 1;'
              then:
                - lvgl.widget.hide: { id: panel_pump_page_algemeen }
                - lvgl.widget.show: { id: panel_pump_page_pompsnelheid }
