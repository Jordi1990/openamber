        bg_color: !lambda |-
          if (!id(dhw_schedule_enabled_switch).state) return lv_color_hex(0xE5E7EB);
          return id(dhw_schedule_saturday_enabled_switch).state ? lv_color_hex(0x1F3B68) : lv_color_hex(0xCBD5E1);
    - lvgl.widget.update:
        id: set_dhw_day_sat_lbl
        text_color: !lambda |-
          if (!id(dhw_schedule_enabled_switch).state) return lv_color_hex(0x9CA3AF);
          return id(dhw_schedule_saturday_enabled_switch).state ? lv_color_hex(0xFFFFFF) : lv_color_hex(0x334155);

    - lvgl.widget.update:
        id: set_dhw_day_sun
        bg_color: !lambda |-
          if (!id(dhw_schedule_enabled_switch).state) return lv_color_hex(0xE5E7EB);
          return id(dhw_schedule_sunday_enabled_switch).state ? lv_color_hex(0x1F3B68) : lv_color_hex(0xCBD5E1);
    - lvgl.widget.update:
        id: set_dhw_day_sun_lbl
        text_color: !lambda |-
          if (!id(dhw_schedule_enabled_switch).state) return lv_color_hex(0x9CA3AF);
          return id(dhw_schedule_sunday_enabled_switch).state ? lv_color_hex(0xFFFFFF) : lv_color_hex(0x334155);

    - lvgl.label.update:
        id: set_dhw_days_summary
        text: !lambda |-
          if (!id(dhw_schedule_enabled_switch).state) {
            return std::string("Schema uit");
          }

          std::string out = "Actief op: ";
          bool first = true;

          if (id(dhw_schedule_monday_enabled_switch).state) { out += first ? "Ma" : ", Ma"; first = false; }
          if (id(dhw_schedule_tuesday_enabled_switch).state) { out += first ? "Di" : ", Di"; first = false; }
          if (id(dhw_schedule_wednesday_enabled_switch).state) { out += first ? "Wo" : ", Wo"; first = false; }
          if (id(dhw_schedule_thursday_enabled_switch).state) { out += first ? "Do" : ", Do"; first = false; }
          if (id(dhw_schedule_friday_enabled_switch).state) { out += first ? "Vr" : ", Vr"; first = false; }
          if (id(dhw_schedule_saturday_enabled_switch).state) { out += first ? "Za" : ", Za"; first = false; }
          if (id(dhw_schedule_sunday_enabled_switch).state) { out += first ? "Zo" : ", Zo"; first = false; }

          if (first) {
            return std::string("Geen dagen geselecteerd");
          }
          return out;

    - lvgl.label.update:
        id: set_dhw_start_time_val
        text:
          format: "%02d:%02d"
          args: ['id(dhw_start_time).hour', 'id(dhw_start_time).minute']
