- id: wifi_scan_networks
  then:
    - lambda: |-
        const char *current_options = lv_dropdown_get_options(id(wifi_network_dd)->obj);
        if (current_options == nullptr || std::string(current_options) != "Zoeken...") {
          lv_dropdown_set_options(id(wifi_network_dd)->obj, "Zoeken...");
        }
    - lambda: wifi::global_wifi_component->start_scanning();

- id: wifi_scan_networks_if_empty
  then:
    - lambda: |-
        uint16_t count = lv_dropdown_get_option_cnt(id(wifi_network_dd)->obj);
        if (count <= 1) {
          const char *current_options = lv_dropdown_get_options(id(wifi_network_dd)->obj);
          if (current_options == nullptr || std::string(current_options) != "Zoeken...") {
            lv_dropdown_set_options(id(wifi_network_dd)->obj, "Zoeken...");
          }
          wifi::global_wifi_component->start_scanning();
        }

- id: wifi_network_dropdown_changed
  then:
    - lambda: |-
        char buf[64];
        lv_dropdown_get_selected_str(id(wifi_network_dd)->obj, buf, sizeof(buf));
        if (strcmp(buf, "Handmatig...") == 0) {
          lv_obj_clear_flag(id(wifi_hidden_ssid_section), LV_OBJ_FLAG_HIDDEN);
        } else {
          lv_obj_add_flag(id(wifi_hidden_ssid_section), LV_OBJ_FLAG_HIDDEN);
        }

- id: wifi_password_visibility_toggle
  then:
    - lambda: |-
        bool current = lv_textarea_get_password_mode(id(wifi_password_ta));
        lv_textarea_set_password_mode(id(wifi_password_ta), !current);
        lv_label_set_text(id(wifi_password_toggle_label), current ? "\U000F0208" : "\U000F0209");

- id: wifi_focus_text_input
  parameters:
    input_index: int
  then:
    - lvgl.widget.show: { id: wifi_keyboard }
    - lambda: |-
        lv_obj_t *ta = (input_index == 0) ? id(wifi_password_ta) : id(wifi_hidden_ssid_ta);
        lv_keyboard_set_textarea(id(wifi_keyboard)->obj, ta);

- id: wifi_unfocus_text_input
  then:
    - lvgl.widget.hide: { id: wifi_keyboard }

- id: update_wifi_connected_summary_ui
  then:
    - lvgl.label.update:
        id: wifi_connected_values_label
        text: !lambda |-
          std::string ssid = id(wifi_ssid_ui).state.empty() ? "-" : id(wifi_ssid_ui).state;
          std::string ip = id(wifi_ip_ui).state.empty() ? "-" : id(wifi_ip_ui).state;
          std::string mac = id(wifi_mac_ui).state.empty() ? "-" : id(wifi_mac_ui).state;
          char signal_buf[24];
          if (isnan(id(wifi_signal_db).state)) {
            snprintf(signal_buf, sizeof(signal_buf), "Geen signaal");
          } else {
            snprintf(signal_buf, sizeof(signal_buf), "%.0f dBm", id(wifi_signal_db).state);
          }
          std::string summary;
          summary.reserve(ssid.size() + ip.size() + mac.size() + strlen(signal_buf) + 8);
          summary += ssid;
          summary += "\n";
          summary += ip;
          summary += "\n";
          summary += mac;
          summary += "\n";
          summary += signal_buf;
          return summary;

- id: wifi_connect_selected
  then:
    - lambda: |-
        char dd_buf[64];
        lv_dropdown_get_selected_str(id(wifi_network_dd)->obj, dd_buf, sizeof(dd_buf));
        std::string ssid;
        if (std::string(dd_buf) == "Handmatig...") {
          ssid = lv_textarea_get_text(id(wifi_hidden_ssid_ta));
        } else {
          ssid = dd_buf;
        }
        if (ssid.empty() || ssid == "Geen netwerken gevonden" || ssid == "Zoeken..." || ssid == "Kies netwerk...") return;
        std::string password = lv_textarea_get_text(id(wifi_password_ta));
        wifi::global_wifi_component->save_wifi_sta(ssid, password);

- id: wifi_disconnect
  then:
    - lambda: |-
        wifi::global_wifi_component->save_wifi_sta("", "");
        wifi::global_wifi_component->clear_sta();
    - lvgl.label.update: { id: wifi_status_label, text: "Niet verbonden" }
    - lvgl.widget.update: { id: wifi_status_label, text_color: 0xEF4444 }
    - lvgl.label.update: { id: wifi_connected_values_label, text: "-\n-\n-\n-" }
    - lvgl.label.update: { id: nav_status_wifi_icon, text: "\U000F092E" }
    - lvgl.widget.update: { id: nav_status_wifi_icon, text_color: 0x9CA3AF }
    - lvgl.widget.hide: { id: wifi_connected_section }
    - lvgl.widget.show: { id: wifi_disconnected_section }
