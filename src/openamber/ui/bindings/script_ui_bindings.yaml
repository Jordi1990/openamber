- id: update_advanced_settings_ui
  mode: restart
  then:
    - lvgl.widget.update:
        id: set_advanced_settings_switch_ui
        state:
          checked: !lambda 'return id(advanced_settings_enabled).state;'
    - if:
        condition:
          switch.is_on: advanced_settings_enabled
        then:
          - lvgl.widget.show: { id: stab_advanced }
          - lvgl.widget.show: { id: set_heat_pid_section }
          - lvgl.widget.show: { id: set_cool_pid_section }
          - lvgl.widget.hide: { id: set_heat_pid_disabled_overlay }
          - lvgl.widget.hide: { id: set_cool_pid_disabled_overlay }
          - lvgl.widget.update:
              id: set_heat_pid_section
              state:
                disabled: false
          - lvgl.widget.update:
              id: set_cool_pid_section
              state:
