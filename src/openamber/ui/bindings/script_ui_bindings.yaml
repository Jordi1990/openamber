            id(service_errors_next_btn) == nullptr) {
          return;
        }

        struct AlertItem {
          const char *title;
          const char *explanation;
          bool active;
        };

        const AlertItem items[] = {
          {"P03 - Storing compressorstart", "De warmtepomp is geblokkeerd door een storing in de compressorstart.", id(error_flag_p03).state},
          {"P05 - Storing compressor - hogedrukbeveiliging", "Als de persdruk meer dan 32 bar bedraagt wordt de compressor uitgeschakeld.", id(error_flag_p05).state},
          {"P08 - Storing sensor persgasdruk", "Storing sensor persgasdruk.", id(error_flag_p08).state},
          {"P09 - Storing sensor verdamper/condensor buitendeel", "Storing sensor verdamper/condensor buitendeel.", id(error_flag_p09).state},
          {"P10 - Voedingsspanning te hoog of te laag", "Voedingsspanning te hoog of te laag.", id(error_flag_p10).state},
          {"F01 - Storing buitentemperatuursensor", "Storing buitentemperatuursensor.", id(error_flag_f01).state},
          {"F02 - Storing sensor verdamper/condensor buitendeel", "Storing sensor verdamper/condensor buitendeel.", id(error_flag_f02).state},
          {"F03 - Storing persgas temp sensor", "Storing persgas temp sensor.", id(error_flag_f03).state},
          {"F04 - Storing zuiggas temp sensor", "Storing zuiggas temp sensor.", id(error_flag_f04).state},
          {"F05 - Storing zuiggas druk sensor", "Storing zuiggas druk sensor.", id(error_flag_f05).state},
          {"F06 - Storing sensor persgasdruk", "Storing sensor persgasdruk.", id(error_flag_f06).state},
          {"F07 - Storing hogedrukbeveiliging", "Storing hogedrukbeveiliging.", id(error_flag_f07).state},
          {"F09 - Storing ventilatormotor DC", "Storing ventilatormotor DC.", id(error_flag_f09).state},
          {"E01 - Communicatiestoring", "Communicatiestoring tussen printplaten en/of bedieningspaneel.", id(error_flag_e01).state},
          {"E02 - Communicatiestoring", "Er is een communicatiestoring tussen beide printplaten in de warmtepomp.", id(error_flag_e02).state},
          {"E03 - Voedingsspanning", "De voedingsspanning is niet in orde.", id(error_flag_e03).state},
          {"E04 - Overbelasting voedingsspanning", "Er is een overbelasting van de voedingsspanning.", id(error_flag_e04).state},
          {"E05 - Probleem inverter PCB", "Er is een probleem met de inverter PCB.", id(error_flag_e05).state},
          {"E06 - VDC-module voedingsspanning", "De voedingsspanning in de VDC-module (24 Volt-omvormer) is te hoog of te laag.", id(error_flag_e06).state},
          {"E07 - Voedingsspanning te hoog of te laag", "Voedingsspanning te hoog of te laag.", id(error_flag_e07).state},
          {"E08 - Storing EEPROM warmtepomp", "Storing EEPROM warmtepomp.", id(error_flag_e08).state},
          {"F10 - Storing ventilatormotor DC", "Storing ventilatormotor DC.", id(error_flag_f10).state},
          {"TO01 - Pomp start timeout", "De pomp startte niet binnen de verwachte tijd. Controleer pompaansturing, relais, bedrijfstoestand en de flow (flow switch), omdat deze timeout op flow-detectie wordt bepaald.", id(error_pump_start_timeout).state},
          {"TO02 - Compressor start timeout", "De compressor startte niet binnen de verwachte tijd. Controleer permissies, beveiligingen en startcondities.", id(error_compressor_start_timeout).state},
          {"TO03 - Pomp stop timeout", "De pomp stopte niet binnen de verwachte tijd. Controleer relaisstatus, besturingslogica en de flow (flow switch), omdat deze timeout op flow-detectie wordt bepaald.", id(error_pump_stop_timeout).state},
          {"F16 - Storing sensor aanvoertemperatuur Tuo", "Storing sensor aanvoertemperatuur Tuo.", id(error_flag_f16).state},
          {"F17 - Storing sensor retourtemperatuur Tui", "Storing sensor retourtemperatuur Tui.", id(error_flag_f17).state},
          {"F18 - Storing sensor condensortemperatuur Tup", "Storing sensor condensortemperatuur Tup.", id(error_flag_f18).state}
        };

        const int total = sizeof(items) / sizeof(items[0]);
        int active_indices[32];
        int active_count = 0;
        for (int i = 0; i < total; i++) {
          if (items[i].active) {
            active_indices[active_count++] = i;
          }
        }

        const bool timeout_error_active =
            id(error_pump_start_timeout).state ||
            id(error_compressor_start_timeout).state ||
            id(error_pump_stop_timeout).state;

        if (timeout_error_active) lv_obj_clear_flag(id(service_errors_reset_timeout_btn), LV_OBJ_FLAG_HIDDEN);
        else lv_obj_add_flag(id(service_errors_reset_timeout_btn), LV_OBJ_FLAG_HIDDEN);

        if (active_count == 0) {
          id(service_error_page_index) = 0;
          lv_label_set_text(id(service_errors_status), "Geen actieve foutmeldingen");
          lv_label_set_text(id(service_errors_code_title), "");
          lv_label_set_text(id(service_errors_explanation_value), "");
          lv_label_set_text(id(service_errors_counter), "");
          lv_obj_add_flag(id(service_errors_nav_row), LV_OBJ_FLAG_HIDDEN);
          return;
        }

        lv_obj_clear_flag(id(service_errors_nav_row), LV_OBJ_FLAG_HIDDEN);

        int index = id(service_error_page_index);
        if (index < 0) index = 0;
        if (index >= active_count) index = active_count - 1;
        id(service_error_page_index) = index;

        const AlertItem &item = items[active_indices[index]];
        std::string status = "Actieve foutmelding " + std::to_string(index + 1) + " van " + std::to_string(active_count);
        std::string counter = std::to_string(index + 1) + "/" + std::to_string(active_count);

        lv_label_set_text(id(service_errors_status), status.c_str());
        lv_label_set_text(id(service_errors_code_title), item.title);
        lv_label_set_text(id(service_errors_explanation_value), item.explanation);
        lv_label_set_text(id(service_errors_counter), counter.c_str());

        if (index > 0) lv_obj_clear_flag(id(service_errors_prev_btn), LV_OBJ_FLAG_HIDDEN);
        else lv_obj_add_flag(id(service_errors_prev_btn), LV_OBJ_FLAG_HIDDEN);

        if (index < (active_count - 1)) lv_obj_clear_flag(id(service_errors_next_btn), LV_OBJ_FLAG_HIDDEN);
        else lv_obj_add_flag(id(service_errors_next_btn), LV_OBJ_FLAG_HIDDEN);

