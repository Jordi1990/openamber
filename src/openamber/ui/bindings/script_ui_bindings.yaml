- id: update_thermostat_settings_ui
  mode: restart
  then:
    - lvgl.label.update:
        id: set_therm_sp_val
        text:
          format: "%.1f°C"
          args: ['id(thermostat_setpoint_number).state']
    - lvgl.label.update:
        id: set_therm_def_heat_val
        text:
          format: "%.1f°C"
          args: ['id(thermostat_default_heat_setpoint).state']
    - lvgl.label.update:
        id: set_therm_def_cool_val
        text:
          format: "%.1f°C"
          args: ['id(thermostat_default_cool_setpoint).state']
    - lvgl.label.update:
        id: set_therm_heat_db_val
        text:
          format: "%.1f°C"
          args: ['id(thermostat_heat_deadband).state']
    - lvgl.label.update:
        id: set_therm_heat_or_val
        text:
          format: "%.1f°C"
          args: ['id(thermostat_heat_overrun).state']
    - lvgl.label.update:
        id: set_therm_cool_db_val
        text:
          format: "%.1f°C"
          args: ['id(thermostat_cool_deadband).state']
    - lvgl.label.update:
        id: set_therm_cool_or_val
        text:
          format: "%.1f°C"
          args: ['id(thermostat_cool_overrun).state']

- id: thermostat_select_tab
  mode: restart
  parameters:
    tab_index: int
  then:
    - if:
        condition:
          lambda: 'return tab_index == 0;'
        then:
          - lvgl.widget.show: { id: panel_thermostat_page_setpoint }
          - lvgl.widget.hide: { id: panel_thermostat_page_verwarmen }
          - lvgl.widget.hide: { id: panel_thermostat_page_koelen }
          - lvgl.widget.update: { id: thermostat_stab_setpoint, bg_color: 0x1F3B68 }
          - lvgl.label.update: { id: thermostat_stab_setpoint_lbl, text_color: 0xFFFFFF }
          - lvgl.widget.update: { id: thermostat_stab_verwarmen, bg_color: 0xCBD5E1 }
          - lvgl.label.update: { id: thermostat_stab_verwarmen_lbl, text_color: 0x4B5563 }
          - lvgl.widget.update: { id: thermostat_stab_koelen, bg_color: 0xCBD5E1 }
          - lvgl.label.update: { id: thermostat_stab_koelen_lbl, text_color: 0x4B5563 }
        else:
          - if:
              condition:
                lambda: 'return tab_index == 1;'
              then:
                - lvgl.widget.hide: { id: panel_thermostat_page_setpoint }
                - lvgl.widget.show: { id: panel_thermostat_page_verwarmen }
                - lvgl.widget.hide: { id: panel_thermostat_page_koelen }
                - lvgl.widget.update: { id: thermostat_stab_setpoint, bg_color: 0xCBD5E1 }
                - lvgl.label.update: { id: thermostat_stab_setpoint_lbl, text_color: 0x4B5563 }
                - lvgl.widget.update: { id: thermostat_stab_verwarmen, bg_color: 0x1F3B68 }
                - lvgl.label.update: { id: thermostat_stab_verwarmen_lbl, text_color: 0xFFFFFF }
                - lvgl.widget.update: { id: thermostat_stab_koelen, bg_color: 0xCBD5E1 }
                - lvgl.label.update: { id: thermostat_stab_koelen_lbl, text_color: 0x4B5563 }
              else:
                - lvgl.widget.hide: { id: panel_thermostat_page_setpoint }
                - lvgl.widget.hide: { id: panel_thermostat_page_verwarmen }
                - lvgl.widget.show: { id: panel_thermostat_page_koelen }
                - lvgl.widget.update: { id: thermostat_stab_setpoint, bg_color: 0xCBD5E1 }
                - lvgl.label.update: { id: thermostat_stab_setpoint_lbl, text_color: 0x4B5563 }
                - lvgl.widget.update: { id: thermostat_stab_verwarmen, bg_color: 0xCBD5E1 }
                - lvgl.label.update: { id: thermostat_stab_verwarmen_lbl, text_color: 0x4B5563 }
                - lvgl.widget.update: { id: thermostat_stab_koelen, bg_color: 0x1F3B68 }
                - lvgl.label.update: { id: thermostat_stab_koelen_lbl, text_color: 0xFFFFFF }

- id: general_select_tab
