        if (index >= active_count) index = active_count - 1;
        id(service_warning_page_index) = index;

        const AlertItem &item = items[active_indices[index]];
        std::string status = "Actieve waarschuwing " + std::to_string(index + 1) + " van " + std::to_string(active_count);
        std::string counter = std::to_string(index + 1) + "/" + std::to_string(active_count);

        lv_label_set_text(id(service_warnings_status), status.c_str());
