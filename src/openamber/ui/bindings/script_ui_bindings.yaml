- id: update_advanced_settings_ui
  mode: restart
  then:
    - lvgl.widget.update:
        id: set_advanced_settings_switch_ui
        state:
          checked: !lambda 'return id(advanced_settings_enabled).state;'
    - if:
        condition:
          switch.is_on: advanced_settings_enabled
        then:
          - lvgl.widget.show: { id: set_heat_pid_section }
          - lvgl.widget.show: { id: set_cool_pid_section }
        else:
          - lvgl.widget.hide: { id: set_heat_pid_section }
          - lvgl.widget.hide: { id: set_cool_pid_section }

- id: update_water_mode_temperature_display
  mode: restart
  then:
    - if:
        condition:
          lambda: 'return id(state_machine_state_main).state == "DHW" && !isnan(id(dhw_temperature_tw_sensor).state) && !isnan(id(current_dhw_setpoint_sensor).state);'
        then:
          - lvgl.label.update:
              id: water_mode_temperature_values
              text:
                format: "%.1f°C / %.1f°C"
                args: ['id(dhw_temperature_tw_sensor).state', 'id(current_dhw_setpoint_sensor).state']
        else:
          - if:
              condition:
                lambda: 'return id(state_machine_state_main).state == "Heat/Cool" && !isnan(id(heat_cool_temperature_tc).state) && !isnan(id(current_setpoint).state);'
              then:
                - lvgl.label.update:
                    id: water_mode_temperature_values
                    text:
                      format: "%.1f°C / %.1f°C"
                      args: ['id(heat_cool_temperature_tc).state', 'id(current_setpoint).state']
              else:
                - lvgl.label.update:
                    id: water_mode_temperature_values
                    text: "-°C / -°C"

