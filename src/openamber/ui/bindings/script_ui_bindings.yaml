- id: wifi_scan_networks
  then:
    - lambda: |-
        lv_dropdown_set_options(id(wifi_network_dd)->obj, "Zoeken...");
    - lambda: wifi::global_wifi_component->start_scanning();

- id: wifi_scan_networks_if_empty
  then:
    - lambda: |-
        uint16_t count = lv_dropdown_get_option_cnt(id(wifi_network_dd)->obj);
        if (count <= 1) {
          lv_dropdown_set_options(id(wifi_network_dd)->obj, "Zoeken...");
          wifi::global_wifi_component->start_scanning();
        }

- id: wifi_connect_selected
  then:
    - lambda: |-
        char dd_buf[64];
        lv_dropdown_get_selected_str(id(wifi_network_dd)->obj, dd_buf, sizeof(dd_buf));
        std::string ssid;
        if (std::string(dd_buf) == "Handmatig...") {
          ssid = lv_textarea_get_text(id(wifi_hidden_ssid_ta));
        } else {
          ssid = dd_buf;
        }
        if (ssid.empty() || ssid == "Geen netwerken gevonden" || ssid == "Zoeken..." || ssid == "Kies netwerk...") return;
        std::string password = lv_textarea_get_text(id(wifi_password_ta));
        wifi::global_wifi_component->save_wifi_sta(ssid, password);

- id: wifi_disconnect
  then:
    - lambda: |-
        wifi::global_wifi_component->save_wifi_sta("", "");
        wifi::global_wifi_component->clear_sta();
    - lvgl.label.update: { id: wifi_status_label, text: "Niet verbonden" }
    - lvgl.widget.update: { id: wifi_status_label, text_color: 0xEF4444 }
    - lvgl.label.update: { id: wifi_ssid_label, text: "-" }
    - lvgl.label.update: { id: wifi_ip_label, text: "-" }
    - lvgl.label.update: { id: wifi_signal_label, text: "-" }
    - lvgl.label.update: { id: nav_status_wifi_icon, text: "\U000F092E" }
    - lvgl.widget.update: { id: nav_status_wifi_icon, text_color: 0x9CA3AF }
    - lvgl.widget.hide: { id: wifi_connected_section }
    - lvgl.widget.show: { id: wifi_disconnected_section }
