obj:
  id: service_mpanel_valve
  width: 100%
  height: 100%
  hidden: true
  bg_opa: 0%
  border_opa: 0%
  pad_all: 0
  widgets:
    - label:
        text: "Klepstand forceren"
        text_color: 0x1F2933
        text_font: font_text_24
        align: TOP_LEFT
    - label:
        width: 100%
        text: "Forceer de 3-weg klep tijdelijk naar CV/Koelen of Tapwater"
        text_color: 0x6B7280
        text_font: font_text_20
        long_mode: WRAP
        align: TOP_LEFT
        y: 38
    - obj:
        id: service_valve_btn_heat_cool
        width: 48%
        height: 42
        align: TOP_LEFT
        y: 74
        bg_color: 0xE8ECF1
        bg_opa: 100%
        radius: 8
        border_opa: 0%
        scrollbar_mode: "OFF"
        scrollable: false
        on_click:
          - if:
              condition:
                lambda: 'return id(state_machine_state_main).state == "Maintenance";'
              then:
                - lvgl.widget.update: { id: service_valve_btn_heat_cool, bg_color: 0x1F3B68 }
                - lvgl.widget.update: { id: service_valve_btn_heat_cool_lbl, text_color: 0xFFFFFF }
                - lvgl.widget.update: { id: service_valve_btn_dhw, bg_color: 0xE8ECF1 }
                - lvgl.widget.update: { id: service_valve_btn_dhw_lbl, text_color: 0x4B5563 }
                - switch.turn_on: three_way_valve_heat_cool_switch
                - switch.turn_off: three_way_valve_dhw_switch
                - script.execute: update_service_valve_ui
        widgets:
          - label:
              id: service_valve_btn_heat_cool_lbl
              text: "CV/Koelen"
              text_color: 0x4B5563
              text_font: font_text_20
              align: CENTER
    - obj:
        id: service_valve_btn_dhw
        width: 48%
        height: 42
        align: TOP_RIGHT
        y: 74
        bg_color: 0xE8ECF1
        bg_opa: 100%
        radius: 8
        border_opa: 0%
        scrollbar_mode: "OFF"
        scrollable: false
        on_click:
          - if:
              condition:
                lambda: 'return id(state_machine_state_main).state == "Maintenance";'
              then:
                - lvgl.widget.update: { id: service_valve_btn_dhw, bg_color: 0x1F3B68 }
                - lvgl.widget.update: { id: service_valve_btn_dhw_lbl, text_color: 0xFFFFFF }
                - lvgl.widget.update: { id: service_valve_btn_heat_cool, bg_color: 0xE8ECF1 }
                - lvgl.widget.update: { id: service_valve_btn_heat_cool_lbl, text_color: 0x4B5563 }
                - switch.turn_on: three_way_valve_dhw_switch
                - switch.turn_off: three_way_valve_heat_cool_switch
                - script.execute: update_service_valve_ui
        widgets:
          - label:
              id: service_valve_btn_dhw_lbl
              text: "Tapwater"
              text_color: 0x4B5563
              text_font: font_text_20
              align: CENTER

