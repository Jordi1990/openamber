obj:
  id: service_maintenance_panel
  width: 100%
  height: 100%
  align: TOP_LEFT
  y: 0
  hidden: true
  bg_opa: 0%
  border_opa: 0%
  pad_all: 0
  scrollbar_mode: "OFF"
  scrollable: false
  widgets:
    - obj:
        id: service_maintenance_header
        width: 100%
        height: 72
        bg_opa: 0%
        border_opa: 0%
        pad_all: 4
        scrollbar_mode: "OFF"
        scrollable: false
        widgets:
          - label:
              id: service_maintenance_title
              text: "Onderhoudsmodus"
              text_color: 0x1F2933
              text_font: font_text_24
              align: TOP_LEFT
          - label:
              id: service_maintenance_state
              width: 75%
              height: SIZE_CONTENT
              text: "Onderhoudsmodus niet actief"
              text_color: 0x6B7280
              text_font: font_text_20
              align: TOP_LEFT
              y: 38
          - switch:
              id: set_service_mode_switch_ui
              align: TOP_RIGHT
              bg_color: 0x9CA3AF
              indicator:
                bg_color: 0x16A34A
              knob:
                bg_color: 0xFFFFFF
              on_click:
                - if:
                    condition:
                      switch.is_on: service_mode_enabled
                    then:
                      - switch.turn_off: service_mode_enabled
                      - script.execute: update_service_mode_ui
                    else:
                      - switch.turn_on: service_mode_enabled
                      - script.execute: update_service_mode_ui

    - label:
        id: service_maintenance_lock_hint
        width: 100%
        text: "Handmatige bediening blijft vergrendeld tot onderhoudsmodus actief is."
        text_color: 0x9CA3AF
        text_font: font_text_20
        long_mode: WRAP
        align: TOP_LEFT
        y: 76

    - obj:
        id: service_maintenance_layout
        width: 100%
        height: 72%
        align: TOP_LEFT
        y: 112
        opa: 45%
        bg_opa: 0%
        border_opa: 0%
        pad_all: 6
        scrollbar_mode: "OFF"
        scrollable: false
        widgets:
          - !include page_service_tab_buitenunit.yaml
          - !include page_service_tab_pumps.yaml
          - !include page_service_tab_valve.yaml
          - !include page_service_tab_backup.yaml
