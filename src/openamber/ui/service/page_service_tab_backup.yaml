obj:
  id: service_mpanel_backup
  width: 100%
  height: 100%
  hidden: true
  bg_opa: 0%
  border_opa: 0%
  pad_all: 0
  widgets:
    - label:
        text: "Back-up verwarming"
        text_color: 0x1F2933
        text_font: font_text_24
        align: TOP_LEFT
    - label:
        width: 100%
        text: "Test backup verwarming relais."
        text_color: 0x6B7280
        text_font: font_text_24
        long_mode: WRAP
        align: TOP_LEFT
        y: 26
    - obj:
        width: 100%
        height: 34
        y: 64
        bg_opa: 0%
        border_opa: 0%
        pad_all: 0
        scrollbar_mode: "OFF"
        scrollable: false
        widgets:
          - label:
              text: "Backup element"
              text_color: 0x1F2933
              text_font: font_text_24
              align: LEFT_MID
          - switch:
              id: service_backup_heater_relay_switch_ui
              align: RIGHT_MID
              bg_color: 0x9CA3AF
              indicator:
                bg_color: 0x16A34A
              knob:
                bg_color: 0xFFFFFF
              on_click:
                - if:
                    condition:
                      lambda: 'return id(state_machine_state_main).state == "Maintenance";'
                    then:
                      - switch.toggle: backup_heater_relay
                    else:
                      - script.execute: update_service_mode_ui
    - obj:
        width: 100%
        height: 34
        y: 100
        bg_opa: 0%
        border_opa: 0%
        pad_all: 0
        scrollbar_mode: "OFF"
        scrollable: false
        widgets:
          - label:
              text: "CV hybride backup relais"
              text_color: 0x1F2933
              text_font: font_text_24
              align: LEFT_MID
          - switch:
              id: service_external_backup_heating_relay_switch_ui
              align: RIGHT_MID
              bg_color: 0x9CA3AF
              indicator:
                bg_color: 0x16A34A
              knob:
                bg_color: 0xFFFFFF
              on_click:
                - if:
                    condition:
                      lambda: 'return id(state_machine_state_main).state == "Maintenance";'
                    then:
                      - switch.toggle: external_backup_heating_relay
                    else:
                      - script.execute: update_service_mode_ui

