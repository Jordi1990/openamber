obj:
  id: service_errors_panel
  width: 100%
  height: 100%
  align: TOP_LEFT
  y: 0
  hidden: true
  bg_opa: 0%
  border_opa: 0%
  pad_all: 0
  scrollbar_mode: "OFF"
  scrollable: false
  widgets:
    - obj:
        width: 100%
        height: 100%
        bg_color: 0xFFFFFF
        bg_opa: 100%
        radius: 12
        border_width: 1
        border_color: 0xE5E7EB
        border_opa: 100%
        pad_all: 14
        scrollbar_mode: "OFF"
        scrollable: false
        layout:
          type: FLEX
          flex_flow: COLUMN
          flex_align_main: START
          flex_align_cross: STRETCH
          pad_row: 8
        widgets:
          - label:
              text: "Foutmeldingen"
              text_color: 0x991B1B
              text_font: font_text_24
          - label:
              id: service_errors_status
              text: "Geen actieve foutmeldingen"
              text_color: 0x6B7280
              text_font: font_text_20
              long_mode: WRAP
          - obj:
              width: 100%
              height: 1
              bg_color: 0xE5E7EB
              bg_opa: 100%
              border_opa: 0%
              radius: 0
              pad_all: 0
          - label:
              id: service_errors_code_title
              text: ""
              text_color: 0x111827
              text_font: font_text_24
              long_mode: WRAP
          - label:
              id: service_errors_explanation_value
              width: 100%
              text: ""
              text_color: 0x1F2933
              text_font: font_text_20
              long_mode: WRAP
          - obj:
              width: 100%
              height: 1
              bg_color: 0xE5E7EB
              bg_opa: 100%
              border_opa: 0%
              radius: 0
              pad_all: 0
          - obj:
              id: service_errors_nav_row
              width: 100%
              height: 48
              bg_opa: 0%
              border_opa: 0%
              pad_all: 0
              scrollbar_mode: "OFF"
              scrollable: false
              layout:
                type: FLEX
                flex_flow: ROW
                flex_align_main: SPACE_BETWEEN
                flex_align_cross: CENTER
                pad_column: 8
              widgets:
                - obj:
                    id: service_errors_prev_btn
                    width: 170
                    height: 40
                    bg_color: 0x1F3B68
                    bg_opa: 100%
                    radius: 10
                    border_width: 0
                    border_opa: 0%
                    scrollbar_mode: "OFF"
                    scrollable: false
                    on_click:
                      - script.execute: service_errors_prev_item
                    widgets:
                      - label:
                          text: "Vorige"
                          text_color: 0xFFFFFF
                          text_font: font_text_20
                          align: CENTER
                - label:
                    id: service_errors_counter
                    text: "0/0"
                    text_color: 0x6B7280
                    text_font: font_text_20
                    align: CENTER
                - obj:
                    id: service_errors_next_btn
                    width: 170
                    height: 40
                    bg_color: 0x1F3B68
                    bg_opa: 100%
                    radius: 10
                    border_width: 0
                    border_opa: 0%
                    scrollbar_mode: "OFF"
                    scrollable: false
                    on_click:
                      - script.execute: service_errors_next_item
                    widgets:
                      - label:
                          text: "Volgende"
                          text_color: 0xFFFFFF
                          text_font: font_text_20
                          align: CENTER
