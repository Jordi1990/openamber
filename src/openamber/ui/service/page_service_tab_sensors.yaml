obj:
  id: service_sensors_panel
  width: 100%
  height: 100%
  align: TOP_LEFT
  y: 0
  hidden: true
  bg_opa: 0%
  border_opa: 0%
  pad_all: 0
  scrollbar_mode: "OFF"
  scrollable: false
  layout:
    type: FLEX
    flex_flow: ROW_WRAP
    flex_align_main: START
    flex_align_cross: STRETCH
    pad_row: 10
    pad_column: 10
  widgets:
    - obj:
        width: 49%
        height: 166
        bg_color: 0xFFFFFF
        bg_opa: 100%
        radius: 12
        border_width: 1
        border_color: 0xE5E7EB
        border_opa: 100%
        pad_all: 10
        scrollbar_mode: "OFF"
        scrollable: false
        widgets:
          - label: { text: "Status", text_color: 0x111827, text_font: font_text_20, align: TOP_LEFT }
          - label: { width: 44%, text: "Hoofdstatus\nCV/Koelen\nTapwater", text_color: 0x6B7280, text_font: font_text_20, long_mode: WRAP, align: TOP_LEFT, y: 30 }
          - label: { id: service_diag_status_values, width: 54%, text: "-\n-\n-", text_color: 0x1F2933, text_font: font_text_20, text_align: RIGHT, long_mode: WRAP, align: TOP_RIGHT, y: 30 }

    - obj:
        width: 49%
        height: 166
        bg_color: 0xFFFFFF
        bg_opa: 100%
        radius: 12
        border_width: 1
        border_color: 0xE5E7EB
        border_opa: 100%
        pad_all: 10
        scrollbar_mode: "OFF"
        scrollable: false
        widgets:
          - label: { text: "Druk & Temperatuur", text_color: 0x111827, text_font: font_text_20, align: TOP_LEFT }
          - label: { width: 42%, text: "Ta / Tc\nTuo / Tui\nZuig / Pers", text_color: 0x6B7280, text_font: font_text_20, long_mode: WRAP, align: TOP_LEFT, y: 30 }
          - label: { id: service_diag_temp_values, width: 56%, text: "- / -\n- / -\n- / -", text_color: 0x1F2933, text_font: font_text_20, text_align: RIGHT, long_mode: WRAP, align: TOP_RIGHT, y: 30 }

    - obj:
        width: 49%
        height: 230
        bg_color: 0xFFFFFF
        bg_opa: 100%
        radius: 12
        border_width: 1
        border_color: 0xE5E7EB
        border_opa: 100%
        pad_all: 10
        scrollbar_mode: "OFF"
        scrollable: false
        widgets:
          - label: { text: "Aansturing", text_color: 0x111827, text_font: font_text_20, align: TOP_LEFT }
          - label: { width: 42%, text: "Compressor\nPomp PWM\nFan RPM\nExpansieklep", text_color: 0x6B7280, text_font: font_text_20, long_mode: WRAP, align: TOP_LEFT, y: 30 }
          - label: { id: service_diag_control_values, width: 56%, text: "- Hz\n- %\n- rpm\n- %", text_color: 0x1F2933, text_font: font_text_20, text_align: RIGHT, long_mode: WRAP, align: TOP_RIGHT, y: 30 }

    - obj:
        width: 49%
        height: 230
        bg_color: 0xFFFFFF
        bg_opa: 100%
        radius: 12
        border_width: 1
        border_color: 0xE5E7EB
        border_opa: 100%
        pad_all: 10
        scrollbar_mode: "OFF"
        scrollable: false
        widgets:
          - label: { text: "Systeem", text_color: 0x111827, text_font: font_text_20, align: TOP_LEFT }
          - label: { width: 44%, text: "Defrost / Bodemplaat\nModbus binnen\nModbus buiten\nSG contacten A / B\nWarmte/koude vraag", text_color: 0x6B7280, text_font: font_text_20, long_mode: WRAP, align: TOP_LEFT, y: 30 }
          - label: { id: service_diag_system_values, width: 54%, text: "- / -\n-\n-\n- / -\n- / -", text_color: 0x1F2933, text_font: font_text_20, text_align: RIGHT, long_mode: WRAP, align: TOP_RIGHT, y: 30 }

