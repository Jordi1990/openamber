              bg_opa: 0%
              border_opa: 0%
              pad_all: 0
              scrollbar_mode: "OFF"
              scrollable: false
              widgets:
                - label: { text: "Tapwater", text_color: 0x6B7280, text_font: font_text_20, align: TOP_LEFT }
                - label: { id: service_diag_state_dhw_value, width: 54%, text: "-", text_color: 0x1F2933, text_font: font_text_20, text_align: RIGHT, long_mode: DOT, align: TOP_RIGHT }

    - obj:
        width: 49%
        height: 166
        bg_color: 0xFFFFFF
        bg_opa: 100%
        radius: 12
        border_width: 1
        border_color: 0xE5E7EB
        border_opa: 100%
