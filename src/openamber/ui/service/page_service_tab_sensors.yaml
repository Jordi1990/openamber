obj:
  id: service_sensors_panel
  width: 72%
  height: 100%
  align: TOP_RIGHT
  y: 0
  hidden: true
  bg_opa: 0%
  border_opa: 0%
  pad_all: 0
  scrollbar_mode: "OFF"
  scrollable: false
  layout:
    type: FLEX
    flex_flow: ROW_WRAP
    flex_align_main: START
    flex_align_cross: STRETCH
    pad_row: 10
    pad_column: 10
  widgets:
    - obj:
        width: 49%
        height: 166
        bg_color: 0xFFFFFF
        bg_opa: 100%
        radius: 12
        border_width: 1
        border_color: 0xE5E7EB
        border_opa: 100%
        pad_all: 10
        scrollbar_mode: "OFF"
        scrollable: false
        widgets:
          - label: { text: "Status", text_color: 0x111827, text_font: font_text_20, align: TOP_LEFT }
          - obj:
              width: 100%
              height: SIZE_CONTENT
              y: 30
              bg_opa: 0%
              border_opa: 0%
              pad_all: 0
              scrollbar_mode: "OFF"
              scrollable: false
              widgets:
                - label: { text: "Hoofdstatus", text_color: 0x6B7280, text_font: font_text_20, align: TOP_LEFT }
                - label: { id: service_diag_state_main_value, width: 54%, text: "-", text_color: 0x1F2933, text_font: font_text_20, text_align: RIGHT, long_mode: DOT, align: TOP_RIGHT }
          - obj:
              width: 100%
              height: SIZE_CONTENT
              y: 62
              bg_opa: 0%
              border_opa: 0%
              pad_all: 0
              scrollbar_mode: "OFF"
              scrollable: false
              widgets:
                - label: { text: "CV/Koelen", text_color: 0x6B7280, text_font: font_text_20, align: TOP_LEFT }
                - label: { id: service_diag_state_heat_cool_value, width: 54%, text: "-", text_color: 0x1F2933, text_font: font_text_20, text_align: RIGHT, long_mode: DOT, align: TOP_RIGHT }
          - obj:
              width: 100%
              height: SIZE_CONTENT
