obj:
  id: service_mpanel_pumps
  width: 100%
  height: 100%
  hidden: true
  bg_opa: 0%
  border_opa: 0%
  pad_all: 0
  scrollbar_mode: "OFF"
  scrollable: false
  widgets:
    - obj:
        width: 100%
        height: 62
        y: 0
        bg_opa: 0%
        border_opa: 0%
        pad_all: 0
        scrollbar_mode: "OFF"
        scrollable: false
        widgets:
          - label:
              text: "P0 pomp relais"
              text_color: 0x1F2933
              text_font: font_text_24
              align: TOP_LEFT
          - label:
              text: "Schakel P0 pomp relais handmatig tijdens onderhoud"
              width: 72%
              text_color: 0x6B7280
              text_font: font_text_20
              align: TOP_LEFT
              y: 34
          - switch:
              id: service_pump_p0_switch_ui
              align: TOP_RIGHT
              bg_color: 0x9CA3AF
              indicator:
                bg_color: 0x16A34A
              knob:
                bg_color: 0xFFFFFF
              on_click:
                - if:
                    condition:
                      lambda: 'return id(state_machine_state_main).state == "Maintenance";'
                    then:
                      - switch.toggle: pump_p0_relay_switch
                    else:
                      - script.execute: update_service_mode_ui

    - obj:
        width: 100%
        height: 94
        y: 68
        bg_opa: 0%
        border_opa: 0%
        pad_all: 0
        scrollbar_mode: "OFF"
        scrollable: false
        widgets:
          - label:
              text: "P0 PWM"
              text_color: 0x1F2933
              text_font: font_text_24
              align: TOP_LEFT
          - label:
              id: service_p0_pwm_slider_value
              text: "- %"
              text_color: 0x1F2933
              text_font: font_text_24
              align: TOP_RIGHT
          - label:
              text: "Stel P0 PWM handmatig in voor pompdiagnose"
              text_color: 0x6B7280
              text_font: font_text_20
              align: TOP_LEFT
              y: 34
          - slider:
              id: service_p0_pwm_slider
              width: 96%
              align: TOP_MID
              y: 56
              min_value: 0
              max_value: 100
              value: 0
              knob:
                bg_color: 0xFFFFFF
                border_color: 0x1F3B68
                border_width: 3
              on_value:
                then:
                  - lambda: |-
                      const auto duty = lv_slider_get_value(id(service_p0_pwm_slider));
                      lv_label_set_text_fmt(id(service_p0_pwm_slider_value), "%d %%", duty);
              on_release:
                then:
                  - if:
                      condition:
                        lambda: 'return id(state_machine_state_main).state == "Maintenance";'
                      then:
                        - lambda: |-
                            const auto duty = lv_slider_get_value(id(service_p0_pwm_slider));
                            const float control_speed = ((duty * 10) * -1) + 1000;
                            auto pump_call = id(pump_control_pwm_number).make_call();
                            pump_call.set_value(control_speed);
                            pump_call.perform();
                      else:
                        - script.execute: update_service_mode_ui

    - obj:
        width: 100%
        height: 62
        y: 168
        bg_opa: 0%
        border_opa: 0%
        pad_all: 0
        scrollbar_mode: "OFF"
        scrollable: false
        widgets:
          - label:
              text: "P1 pomp relais"
              text_color: 0x1F2933
              text_font: font_text_24
              align: TOP_LEFT
          - label:
              text: "Schakel P1 pomp relais handmatig tijdens onderhoud"
              width: 72%
              text_color: 0x6B7280
              text_font: font_text_20
              align: TOP_LEFT
              y: 34
          - switch:
              id: service_pump_p1_switch_ui
              align: TOP_RIGHT
              bg_color: 0x9CA3AF
              indicator:
                bg_color: 0x16A34A
              knob:
                bg_color: 0xFFFFFF
              on_click:
                - if:
                    condition:
                      lambda: 'return id(state_machine_state_main).state == "Maintenance";'
                    then:
                      - switch.toggle: pump_p1_relay_switch
                    else:
                      - script.execute: update_service_mode_ui

    - obj:
        width: 100%
        height: 62
        y: 236
