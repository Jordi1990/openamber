# Panel: Algemeen
# ------------------------------------------------------------
obj:
  id: panel_general
  width: 100%
  height: 100%
  bg_opa: 0%
  border_opa: 0%
  pad_left: 4
  pad_right: 4
  pad_top: 4
  pad_bottom: 4
  scrollbar_mode: "OFF"
  scrollable: true
  layout:
    type: FLEX
    flex_flow: COLUMN
    flex_align_main: START
    flex_align_cross: STRETCH
    pad_row: 4

  widgets:
    - obj:
        id: panel_general_tab_bar
        width: 100%
        height: 40
        bg_opa: 0%
        border_opa: 0%
        pad_all: 0
        scrollbar_mode: "OFF"
        scrollable: false
        layout:
          type: FLEX
          flex_flow: ROW
          flex_align_main: START
          flex_align_cross: CENTER
          pad_column: 6
        widgets:
          - obj:
              id: general_stab_systeem
              width: SIZE_CONTENT
              height: 34
              bg_color: 0x1F3B68
              bg_opa: 100%
              radius: 8
              border_opa: 0%
              pad_left: 12
              pad_right: 12
              pad_top: 4
              pad_bottom: 4
              scrollbar_mode: "OFF"
              scrollable: false
              on_click:
                - script.execute:
                    id: general_select_tab
                    tab_index: 0
              widgets:
                - label: { id: general_stab_systeem_lbl, text: "Systeem", text_color: 0xFFFFFF, text_font: font_text_20, align: CENTER }

          - obj:
              id: general_stab_sensor_kalibratie
              width: SIZE_CONTENT
              height: 34
              bg_color: 0xCBD5E1
              bg_opa: 100%
              radius: 8
              border_opa: 0%
              pad_left: 12
              pad_right: 12
              pad_top: 4
              pad_bottom: 4
              scrollbar_mode: "OFF"
              scrollable: false
              on_click:
                - script.execute:
                    id: general_select_tab
                    tab_index: 2
              widgets:
                - label: { id: general_stab_sensor_kalibratie_lbl, text: "Sensor kalibratie", text_color: 0x4B5563, text_font: font_text_20, align: CENTER }

          - obj:
              id: general_stab_noodbedrijf
              width: SIZE_CONTENT
              height: 34
              bg_color: 0xCBD5E1
              bg_opa: 100%
              radius: 8
              border_opa: 0%
              pad_left: 12
              pad_right: 12
              pad_top: 4
              pad_bottom: 4
              scrollbar_mode: "OFF"
              scrollable: false
              on_click:
                - script.execute:
                    id: general_select_tab
                    tab_index: 1
              widgets:
                - label: { id: general_stab_noodbedrijf_lbl, text: "Noodbedrijf", text_color: 0x4B5563, text_font: font_text_20, align: CENTER }

          - obj:
              id: general_stab_hardware
              width: SIZE_CONTENT
              height: 34
              bg_color: 0xCBD5E1
              bg_opa: 100%
              radius: 8
              border_opa: 0%
              pad_left: 12
              pad_right: 12
              pad_top: 4
              pad_bottom: 4
              scrollbar_mode: "OFF"
              scrollable: false
              on_click:
                - script.execute:
                    id: general_select_tab
                    tab_index: 3
              widgets:
                - label: { id: general_stab_hardware_lbl, text: "Opties", text_color: 0x4B5563, text_font: font_text_20, align: CENTER }

    - obj:
        id: panel_general_page_systeem
        width: 100%
        height: SIZE_CONTENT
        bg_opa: 0%
        border_opa: 0%
        pad_all: 0
        scrollbar_mode: "OFF"
        scrollable: false
        layout:
          type: FLEX
          flex_flow: COLUMN
          flex_align_main: START
          flex_align_cross: STRETCH
          pad_row: 6
        widgets:
          - obj:
              id: set_general_system_dhw
              width: 100%
              height: SIZE_CONTENT
              bg_opa: 0%
              border_opa: 0%
              pad_all: 6
              widgets:
                - label: { text: "Tapwater aanwezig", text_color: 0x1F2933, text_font: font_text_24, align: TOP_LEFT }
                - label: { text: "Tapwatervat is aanwezig in het systeem", text_color: 0x6B7280, text_font: font_text_20, align: TOP_LEFT, y: 38 }
                - switch:
                    id: set_dhw_enabled_switch_ui
                    align: TOP_RIGHT
                    bg_color: 0x9CA3AF
                    indicator:
                      bg_color: 0x16A34A
                    knob:
                      bg_color: 0xFFFFFF
                    on_click:
                      - if:
                          condition:
                            switch.is_on: dhw_enabled_switch
                          then:
                            - switch.turn_off: dhw_enabled_switch
                            - lvgl.widget.hide: { id: stab_dhw }
                          else:
                            - switch.turn_on: dhw_enabled_switch
                            - lvgl.widget.show: { id: stab_dhw }

          - obj:
              id: set_general_system_analytics
              width: 100%
              height: SIZE_CONTENT
              bg_opa: 0%
              border_opa: 0%
              pad_all: 6
              widgets:
                - label: { text: "Analytics versturen", text_color: 0x1F2933, text_font: font_text_24, align: TOP_LEFT }
                - label: { text: "Deel anonieme gebruiksdata voor het OpenAmber dashboard", text_color: 0x6B7280, text_font: font_text_20, align: TOP_LEFT, y: 38 }
                - switch:
                    id: set_analytics_enabled_switch_ui
                    align: TOP_RIGHT
                    bg_color: 0x9CA3AF
                    indicator:
                      bg_color: 0x16A34A
                    knob:
                      bg_color: 0xFFFFFF
                    on_click:
                      - if:
                          condition:
                            switch.is_on: analytics_enabled_switch
                          then:
                            - switch.turn_off: analytics_enabled_switch
                          else:
                            - switch.turn_on: analytics_enabled_switch

          - obj:
              id: set_analytics_id_row
              width: 100%
              height: SIZE_CONTENT
              hidden: true
              bg_opa: 0%
              border_opa: 0%
              pad_all: 6
              widgets:
                - label: { text: "Analytics ID", text_color: 0x9CA3AF, text_font: font_text_24, align: TOP_LEFT }
                - label:
                    id: set_analytics_id_value
                    width: 100%
                    text: "Onbekend"
                    text_color: 0x9CA3AF
                    text_font: font_text_20
                    long_mode: WRAP
                    align: TOP_LEFT
                    y: 36


          - obj:
              id: set_general_defrost_advanced_toggle_row
              width: 100%
              height: SIZE_CONTENT
              bg_opa: 0%
              border_opa: 0%
              pad_all: 6
              widgets:
                - label: { text: "Geavanceerde instellingen", text_color: 0x1F2933, text_font: font_text_24, align: TOP_LEFT }
                - label: { text: "Toon geavanceerde instellingen", text_color: 0x6B7280, text_font: font_text_20, align: TOP_LEFT, y: 38 }
                - switch:
                    id: set_advanced_settings_switch_ui
                    align: TOP_RIGHT
                    bg_color: 0x9CA3AF
                    indicator:
                      bg_color: 0x16A34A
                    knob:
                      bg_color: 0xFFFFFF
                    on_click:
                      - if:
                          condition:
                            switch.is_on: advanced_settings_enabled
                          then:
                            - switch.turn_off: advanced_settings_enabled
                          else:
                            - switch.turn_on: advanced_settings_enabled

    - obj:
        id: panel_general_page_sensor_kalibratie
        hidden: true
        width: 100%
        height: SIZE_CONTENT
        bg_opa: 0%
        border_opa: 0%
        pad_all: 0
        scrollbar_mode: "OFF"
        scrollable: false
        layout:
          type: FLEX
          flex_flow: COLUMN
          flex_align_main: START
          flex_align_cross: STRETCH
          pad_row: 6
        widgets:
          - obj:
              width: 100%
              height: SIZE_CONTENT
              bg_opa: 0%
              border_opa: 0%
              pad_all: 6
              widgets:
                - label: { text: "Ruimtetemperatuur offset", text_color: 0x1F2933, text_font: font_text_24, align: TOP_LEFT }
                - label: { text: "Correctie voor interne ruimtetemperatuurmeting", text_color: 0x6B7280, text_font: font_text_20, align: TOP_LEFT, y: 38 }
                - obj:
                    width: SIZE_CONTENT
                    height: SIZE_CONTENT
                    align: TOP_RIGHT
                    bg_opa: 0%
                    border_opa: 0%
                    pad_all: 0
                    layout: { type: FLEX, flex_flow: ROW, flex_align_cross: CENTER, pad_column: 8 }
                    widgets:
                      - obj:
                          width: 40
                          height: 40
                          bg_color: 0x1F3B68
                          bg_opa: 100%
                          radius: 10
                          border_opa: 0%
                          scrollbar_mode: "OFF"
                          scrollable: false
                          on_click:
                            - number.decrement: tr_offset
                          widgets:
                            - label: { text: "\U000F0374", text_color: 0xFFFFFF, text_font: font_mdi_24, align: CENTER }
                      - label: { id: set_tr_offset_val, text: "0.0°C", text_color: 0x1F2933, text_font: font_text_24 }
                      - obj:
                          width: 40
                          height: 40
                          bg_color: 0x1F3B68
                          bg_opa: 100%
                          radius: 10
                          border_opa: 0%
                          scrollbar_mode: "OFF"
                          scrollable: false
                          on_click:
                            - number.increment: tr_offset
                          widgets:
                            - label: { text: "\U000F0415", text_color: 0xFFFFFF, text_font: font_mdi_24, align: CENTER }

          - obj:
              width: 100%
              height: SIZE_CONTENT
              bg_opa: 0%
              border_opa: 0%
              pad_all: 6
              widgets:
                - label: { text: "Tapwatertemperatuur offset", text_color: 0x1F2933, text_font: font_text_24, align: TOP_LEFT }
                - label: { text: "Correctie voor tapwatertemperatuurmeting", text_color: 0x6B7280, text_font: font_text_20, align: TOP_LEFT, y: 38 }
                - obj:
                    width: SIZE_CONTENT
                    height: SIZE_CONTENT
                    align: TOP_RIGHT
                    bg_opa: 0%
                    border_opa: 0%
                    pad_all: 0
                    layout: { type: FLEX, flex_flow: ROW, flex_align_cross: CENTER, pad_column: 8 }
                    widgets:
                      - obj:
                          width: 40
                          height: 40
                          bg_color: 0x1F3B68
                          bg_opa: 100%
                          radius: 10
                          border_opa: 0%
                          scrollbar_mode: "OFF"
                          scrollable: false
                          on_click:
                            - number.decrement: tw_offset
                          widgets:
                            - label: { text: "\U000F0374", text_color: 0xFFFFFF, text_font: font_mdi_24, align: CENTER }
                      - label: { id: set_tw_offset_val, text: "0.0°C", text_color: 0x1F2933, text_font: font_text_24 }
                      - obj:
                          width: 40
                          height: 40
                          bg_color: 0x1F3B68
                          bg_opa: 100%
                          radius: 10
                          border_opa: 0%
                          scrollbar_mode: "OFF"
                          scrollable: false
                          on_click:
                            - number.increment: tw_offset
                          widgets:
                            - label: { text: "\U000F0415", text_color: 0xFFFFFF, text_font: font_mdi_24, align: CENTER }

          - obj:
              width: 100%
              height: SIZE_CONTENT
              bg_opa: 0%
              border_opa: 0%
              pad_all: 6
              widgets:
                - label: { text: "CV-aanvoertemperatuur offset", text_color: 0x1F2933, text_font: font_text_24, align: TOP_LEFT }
                - label: { text: "Correctie voor CV-aanvoertemperatuurmeting", text_color: 0x6B7280, text_font: font_text_20, align: TOP_LEFT, y: 38 }
                - obj:
                    width: SIZE_CONTENT
                    height: SIZE_CONTENT
                    align: TOP_RIGHT
                    bg_opa: 0%
                    border_opa: 0%
                    pad_all: 0
                    layout: { type: FLEX, flex_flow: ROW, flex_align_cross: CENTER, pad_column: 8 }
                    widgets:
                      - obj:
                          width: 40
                          height: 40
                          bg_color: 0x1F3B68
                          bg_opa: 100%
                          radius: 10
                          border_opa: 0%
                          scrollbar_mode: "OFF"
                          scrollable: false
                          on_click:
                            - number.decrement: tc_offset
                          widgets:
                            - label: { text: "\U000F0374", text_color: 0xFFFFFF, text_font: font_mdi_24, align: CENTER }
                      - label: { id: set_tc_offset_val, text: "0.0°C", text_color: 0x1F2933, text_font: font_text_24 }
                      - obj:
                          width: 40
                          height: 40
                          bg_color: 0x1F3B68
                          bg_opa: 100%
                          radius: 10
                          border_opa: 0%
                          scrollbar_mode: "OFF"
                          scrollable: false
                          on_click:
                            - number.increment: tc_offset
                          widgets:
                            - label: { text: "\U000F0415", text_color: 0xFFFFFF, text_font: font_mdi_24, align: CENTER }

    - obj:
        id: panel_general_page_noodbedrijf
        hidden: true
        width: 100%
        height: SIZE_CONTENT
        bg_opa: 0%
        border_opa: 0%
        pad_all: 0
        scrollbar_mode: "OFF"
        scrollable: false
        layout:
          type: FLEX
          flex_flow: COLUMN
          flex_align_main: START
          flex_align_cross: STRETCH
          pad_row: 6
        widgets:
          - obj:
              id: set_general_emergency_mode_row
              width: 100%
              height: SIZE_CONTENT
              bg_opa: 0%
              border_opa: 0%
              pad_all: 6
              widgets:
                - label: { text: "Noodbedrijf", text_color: 0x1F2933, text_font: font_text_24, align: TOP_LEFT }
                - label: { text: "Schakel de compressor uit en laat alleen het backup-element werken", text_color: 0x6B7280, text_font: font_text_20, align: TOP_LEFT, y: 38 }
                - switch:
                    id: set_emergency_mode_switch_ui
                    align: TOP_RIGHT
                    bg_color: 0x9CA3AF
                    indicator:
                      bg_color: 0xF97316
                    knob:
                      bg_color: 0xFFFFFF
                    on_click:
                      - if:
                          condition:
                            switch.is_on: emergency_mode_enabled
                          then:
                            - switch.turn_off: emergency_mode_enabled
                          else:
                            - switch.turn_on: emergency_mode_enabled

    - obj:
        id: panel_general_page_hardware
        hidden: true
        width: 100%
        height: SIZE_CONTENT
        bg_opa: 0%
        border_opa: 0%
        pad_all: 0
        scrollbar_mode: "OFF"
        scrollable: false
        layout:
          type: FLEX
          flex_flow: COLUMN
          flex_align_main: START
          flex_align_cross: STRETCH
          pad_row: 6
        widgets:
          - obj:
              id: set_general_hardware_flow_sensor
              width: 100%
              height: SIZE_CONTENT
              bg_opa: 0%
              border_opa: 0%
              pad_all: 6
              widgets:
                - label: { text: "Flow sensor aanwezig", text_color: 0x1F2933, text_font: font_text_24, align: TOP_LEFT }
                - label: { text: "Gebruik de flowsensor voor flow en energie-berekeningen", text_color: 0x6B7280, text_font: font_text_20, align: TOP_LEFT, y: 38 }
                - switch:
                    id: set_flow_sensor_enabled_switch_ui
                    align: TOP_RIGHT
                    bg_color: 0x9CA3AF
                    indicator:
                      bg_color: 0x16A34A
                    knob:
                      bg_color: 0xFFFFFF
                    on_click:
                      - if:
                          condition:
                            switch.is_on: flow_sensor_enabled
                          then:
                            - switch.turn_off: flow_sensor_enabled
                          else:
                            - switch.turn_on: flow_sensor_enabled

          - obj:
              id: set_general_hardware_flow_sensor_calibration
              width: 100%
              height: SIZE_CONTENT
              bg_opa: 0%
              border_opa: 0%
              pad_all: 6
              widgets:
                - label: { text: "Flow sensor kalibratie", text_color: 0x1F2933, text_font: font_text_24, align: TOP_LEFT }
                - label: { text: "Aantal pulses per liter voor de flowsensor", text_color: 0x6B7280, text_font: font_text_20, align: TOP_LEFT, y: 38 }
                - obj:
                    width: SIZE_CONTENT
                    height: SIZE_CONTENT
                    align: TOP_RIGHT
                    bg_opa: 0%
                    border_opa: 0%
                    pad_all: 0
                    layout: { type: FLEX, flex_flow: ROW, flex_align_cross: CENTER, pad_column: 8 }
                    widgets:
                      - obj:
                          width: 40
                          height: 40
                          bg_color: 0x1F3B68
                          bg_opa: 100%
                          radius: 10
                          border_opa: 0%
                          scrollbar_mode: "OFF"
                          scrollable: false
                          on_click:
                            - number.decrement: flow_sensor_calibration
                          widgets:
                            - label: { text: "\U000F0374", text_color: 0xFFFFFF, text_font: font_mdi_24, align: CENTER }
                      - label: { id: set_flow_sensor_calibration_val, text: "476 p/l", text_color: 0x1F2933, text_font: font_text_24 }
                      - obj:
                          width: 40
                          height: 40
                          bg_color: 0x1F3B68
                          bg_opa: 100%
                          radius: 10
                          border_opa: 0%
                          scrollbar_mode: "OFF"
                          scrollable: false
                          on_click:
                            - number.increment: flow_sensor_calibration
                          widgets:
                            - label: { text: "\U000F0415", text_color: 0xFFFFFF, text_font: font_mdi_24, align: CENTER }

# ------------------------------------------------------------
