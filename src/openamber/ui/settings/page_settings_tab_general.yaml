# Panel: Algemeen
# ------------------------------------------------------------
obj:
  id: panel_general
  width: 100%
  height: 100%
  bg_opa: 0%
  border_opa: 0%
  pad_left: 4
  pad_right: 4
  pad_top: 4
  pad_bottom: 4
  scrollbar_mode: "OFF"
  scrollable: true
  layout:
    type: FLEX
    flex_flow: COLUMN
    flex_align_main: START
    flex_align_cross: STRETCH
    pad_row: 4

  widgets:
    - obj:
        id: panel_general_tab_bar
        width: 100%
        height: 40
        bg_opa: 0%
        border_opa: 0%
        pad_all: 0
        scrollbar_mode: "OFF"
        scrollable: false
        layout:
          type: FLEX
          flex_flow: ROW
          flex_align_main: START
          flex_align_cross: CENTER
          pad_column: 6
        widgets:
          - obj:
              id: general_stab_systeem
              width: SIZE_CONTENT
              height: 34
              bg_color: 0x1F3B68
              bg_opa: 100%
              radius: 8
              border_opa: 0%
              pad_left: 12
              pad_right: 12
              pad_top: 4
              pad_bottom: 4
              scrollbar_mode: "OFF"
              scrollable: false
              on_click:
                - script.execute:
                    id: general_select_tab
                    tab_index: 0
              widgets:
                - label: { id: general_stab_systeem_lbl, text: "Systeem", text_color: 0xFFFFFF, text_font: font_text_20, align: CENTER }

          - obj:
              id: general_stab_bodemplaat
              width: SIZE_CONTENT
              height: 34
              bg_color: 0xCBD5E1
              bg_opa: 100%
              radius: 8
              border_opa: 0%
              pad_left: 12
              pad_right: 12
              pad_top: 4
              pad_bottom: 4
              scrollbar_mode: "OFF"
              scrollable: false
              on_click:
                - script.execute:
                    id: general_select_tab
                    tab_index: 1
              widgets:
                - label: { id: general_stab_bodemplaat_lbl, text: "Bodemplaat", text_color: 0x4B5563, text_font: font_text_20, align: CENTER }

          - obj:
              id: general_stab_defrost
              width: SIZE_CONTENT
              height: 34
              bg_color: 0xCBD5E1
              bg_opa: 100%
              radius: 8
              border_opa: 0%
              pad_left: 12
              pad_right: 12
              pad_top: 4
              pad_bottom: 4
              scrollbar_mode: "OFF"
              scrollable: false
              on_click:
                - script.execute:
                    id: general_select_tab
                    tab_index: 2
              widgets:
                - label: { id: general_stab_defrost_lbl, text: "Defrost", text_color: 0x4B5563, text_font: font_text_20, align: CENTER }

          - obj:
              id: general_stab_defrost_start
              width: SIZE_CONTENT
              height: 34
              bg_color: 0xCBD5E1
              bg_opa: 100%
              radius: 8
              border_opa: 0%
              pad_left: 12
              pad_right: 12
              pad_top: 4
              pad_bottom: 4
              scrollbar_mode: "OFF"
              scrollable: false
              on_click:
                - script.execute:
                    id: general_select_tab
                    tab_index: 3
              widgets:
                - label: { id: general_stab_defrost_start_lbl, text: "Defrost start", text_color: 0x4B5563, text_font: font_text_20, align: CENTER }

    - obj:
        id: panel_general_page_systeem
        width: 100%
        height: SIZE_CONTENT
        bg_opa: 0%
        border_opa: 0%
        pad_all: 0
        scrollbar_mode: "OFF"
        scrollable: false
        layout:
          type: FLEX
          flex_flow: COLUMN
          flex_align_main: START
          flex_align_cross: STRETCH
          pad_row: 6
        widgets:
          - obj:
              id: set_general_system_dhw
              width: 100%
              height: SIZE_CONTENT
              bg_opa: 0%
              border_opa: 0%
              pad_all: 6
              widgets:
                - label: { text: "Tapwater aanwezig", text_color: 0x1F2933, text_font: font_text_24, align: TOP_LEFT }
                - label: { text: "Tapwatervat is aanwezig in het systeem", text_color: 0x6B7280, text_font: font_text_20, align: TOP_LEFT, y: 38 }
                - switch:
                    id: set_dhw_enabled_switch_ui
                    align: TOP_RIGHT
                    bg_color: 0x9CA3AF
                    indicator:
                      bg_color: 0x16A34A
                    knob:
                      bg_color: 0xFFFFFF
                    on_click:
                      - if:
                          condition:
                            switch.is_on: dhw_enabled_switch
                          then:
                            - switch.turn_off: dhw_enabled_switch
                            - lvgl.widget.hide: { id: stab_dhw }
                          else:
                            - switch.turn_on: dhw_enabled_switch
                            - lvgl.widget.show: { id: stab_dhw }

          - obj:
              id: set_general_system_analytics
              width: 100%
              height: SIZE_CONTENT
              bg_opa: 0%
              border_opa: 0%
              pad_all: 6
              widgets:
                - label: { text: "Analytics versturen", text_color: 0x1F2933, text_font: font_text_24, align: TOP_LEFT }
                - label: { text: "Deel anonieme gebruiksdata voor het OpenAmber dashboard", text_color: 0x6B7280, text_font: font_text_20, align: TOP_LEFT, y: 38 }
                - switch:
                    id: set_analytics_enabled_switch_ui
                    align: TOP_RIGHT
                    bg_color: 0x9CA3AF
                    indicator:
                      bg_color: 0x16A34A
                    knob:
                      bg_color: 0xFFFFFF
                    on_click:
                      - if:
                          condition:
                            switch.is_on: analytics_enabled_switch
                          then:
                            - switch.turn_off: analytics_enabled_switch
                          else:
                            - switch.turn_on: analytics_enabled_switch

          - obj:
              id: set_analytics_id_row
              width: 100%
              height: SIZE_CONTENT
              hidden: true
              bg_opa: 0%
              border_opa: 0%
              pad_all: 6
              widgets:
                - label: { text: "Analytics ID", text_color: 0x9CA3AF, text_font: font_text_24, align: TOP_LEFT }
                - label:
                    id: set_analytics_id_value
                    width: 100%
                    text: "Onbekend"
                    text_color: 0x9CA3AF
                    text_font: font_text_20
                    long_mode: WRAP
                    align: TOP_LEFT
                    y: 36

          - obj:
              id: set_general_bodemplaat_note_row
              hidden: true
              width: 100%
              height: SIZE_CONTENT
              bg_opa: 0%
              border_opa: 0%
              pad_all: 6
              widgets:
                - label:
                    width: 100%
                    text: "Let op: experimentele instellingen. Wijzigingen worden niet opgeslagen en na een power cycle teruggezet naar standaard."
                    text_color: 0xB45309
                    text_font: font_text_20
                    long_mode: WRAP
                    align: TOP_LEFT

          - obj:
              id: set_general_bodemplaat_mode_row
              hidden: true
              width: 100%
              height: SIZE_CONTENT
              bg_opa: 0%
              border_opa: 0%
              pad_all: 6
              widgets:
                - label: { text: "Bodemplaat", text_color: 0x1F2933, text_font: font_text_24, align: TOP_LEFT }
                - label: { text: "Kies wanneer actief", text_color: 0x6B7280, text_font: font_text_20, align: TOP_LEFT, y: 38 }
                - dropdown:
                    id: set_bottomplate_mode_dd
                    symbol: "\U000F0140"
                    width: 230
                    align: TOP_RIGHT
                    y: 0
                    options:
                      - "Onbekend"
                      - "Buitentemperatuur"
                      - "Tijdens defrost"
                    text_font: font_text_20
                    dropdown_list:
                      text_font: font_text_20
                    on_value:
                      then:
                        - lambda: |-
                            auto val = lv_dropdown_get_selected(id(set_bottomplate_mode_dd)->obj);
                            if (val == 0) id(bottomplate_heater_mode).make_call().set_option("Onbekend").perform();
                            else if (val == 1) id(bottomplate_heater_mode).make_call().set_option("Buitentemperatuur").perform();
                            else id(bottomplate_heater_mode).make_call().set_option("Tijdens defrost").perform();
                        - script.execute: update_bottomplate_mode_ui

          - obj:
              id: set_general_bodemplaat_start_row
              hidden: true
              width: 100%
              height: SIZE_CONTENT
              bg_opa: 0%
              border_opa: 0%
              pad_all: 6
              widgets:
                - label: { text: "Starttemperatuur bodemplaat", text_color: 0x1F2933, text_font: font_text_24, align: TOP_LEFT }
                - label: { text: "Buitentemperatuur voor inschakelen bodemplaat", text_color: 0x6B7280, text_font: font_text_20, align: TOP_LEFT, y: 38 }
                - obj:
                    width: SIZE_CONTENT
                    height: SIZE_CONTENT
                    align: TOP_RIGHT
                    bg_opa: 0%
                    border_opa: 0%
                    pad_all: 0
                    layout: { type: FLEX, flex_flow: ROW, flex_align_cross: CENTER, pad_column: 8 }
                    widgets:
                      - obj:
                          width: 40
                          height: 40
                          bg_color: 0x1F3B68
                          bg_opa: 100%
                          radius: 10
                          border_opa: 0%
                          scrollbar_mode: "OFF"
                          scrollable: false
                          on_click:
                            - number.decrement: bottomplate_heater_ambient_temperature_start
                          widgets:
                            - label: { text: "\U000F0374", text_color: 0xFFFFFF, text_font: font_mdi_24, align: CENTER }
                      - label: { id: set_bottomplate_start_val, text: "34°C", text_color: 0x1F2933, text_font: font_text_24 }
                      - obj:
                          width: 40
                          height: 40
                          bg_color: 0x1F3B68
                          bg_opa: 100%
                          radius: 10
                          border_opa: 0%
                          scrollbar_mode: "OFF"
                          scrollable: false
