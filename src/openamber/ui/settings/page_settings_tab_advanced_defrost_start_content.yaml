- obj:
    id: set_general_defrost_start_note_row
    width: 100%
    height: SIZE_CONTENT
    bg_opa: 0%
    border_opa: 0%
    pad_all: 6
    widgets:
      - label:
          width: 100%
          text: "Let op: experimentele instellingen. Wijzigingen worden niet opgeslagen en na een power cycle teruggezet naar standaard."
          text_color: 0xB45309
          text_font: font_text_20
          long_mode: WRAP
          align: TOP_LEFT

- obj:
    id: set_general_defrost_enter1_row
    width: 100%
    height: SIZE_CONTENT
    bg_opa: 0%
    border_opa: 0%
    pad_all: 6
    widgets:
      - label: { text: "Defrost starttemperatuur 1", text_color: 0x1F2933, text_font: font_text_24, align: TOP_LEFT }
      - obj:
          width: SIZE_CONTENT
          height: SIZE_CONTENT
          align: TOP_RIGHT
          bg_opa: 0%
          border_opa: 0%
          pad_all: 0
          layout: { type: FLEX, flex_flow: ROW, flex_align_cross: CENTER, pad_column: 8 }
          widgets:
            - obj:
                width: 40
                height: 40
                bg_color: 0x1F3B68
                bg_opa: 100%
                radius: 10
                border_opa: 0%
                scrollbar_mode: "OFF"
                scrollable: false
                on_click:
                  - number.decrement: enter_defrost_temperature
                widgets:
                  - label: { text: "\U000F0374", text_color: 0xFFFFFF, text_font: font_mdi_24, align: CENTER }
            - label: { id: set_defrost_enter1_val, text: "27.0Â°C", text_color: 0x1F2933, text_font: font_text_24 }
            - obj:
                width: 40
                height: 40
                bg_color: 0x1F3B68
                bg_opa: 100%
                radius: 10
                border_opa: 0%
                scrollbar_mode: "OFF"
                scrollable: false
                on_click:
                  - number.increment: enter_defrost_temperature
                widgets:
                  - label: { text: "\U000F0415", text_color: 0xFFFFFF, text_font: font_mdi_24, align: CENTER }

