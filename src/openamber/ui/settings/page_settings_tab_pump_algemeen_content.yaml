- obj:
    width: 100%
    height: SIZE_CONTENT
    bg_opa: 0%
    border_opa: 0%
    pad_all: 6
    widgets:
      - label: { text: "Pomp P1 aanwezig", text_color: 0x1F2933, text_font: font_text_24, align: TOP_LEFT }
      - label: { text: "Extra circulatiepomp P1 aanwezig", text_color: 0x6B7280, text_font: font_text_20, align: TOP_LEFT, y: 38 }
      - switch:
          id: set_pump_p1_switch
          align: TOP_RIGHT
          bg_color: 0x9CA3AF
          indicator:
            bg_color: 0x16A34A
          knob:
            bg_color: 0xFFFFFF
          on_click:
            - if:
                condition:
                  switch.is_on: pump_p1_enabled
                then:
                  - switch.turn_off: pump_p1_enabled
                else:
                  - switch.turn_on: pump_p1_enabled
      

- obj:
    width: 100%
    height: SIZE_CONTENT
    bg_opa: 0%
    border_opa: 0%
    pad_all: 6
    widgets:
      - label: { text: "Pompinterval (min)", text_color: 0x1F2933, text_font: font_text_24, align: TOP_LEFT }
      - label: { text: "Tussentijd periodiek pompen bij warmte-/koudevraag", text_color: 0x6B7280, text_font: font_text_20, align: TOP_LEFT, y: 38 }
      - obj:
          width: SIZE_CONTENT
          height: SIZE_CONTENT
          align: TOP_RIGHT
          bg_opa: 0%
          border_opa: 0%
          pad_all: 0
          layout: { type: FLEX, flex_flow: ROW, flex_align_cross: CENTER, pad_column: 8 }
          widgets:
            - obj:
                width: 40
                height: 40
                bg_color: 0x1F3B68
                bg_opa: 100%
                radius: 10
                border_opa: 0%
                scrollbar_mode: "OFF"
                scrollable: false
                on_click:
                  - number.decrement: pump_interval
                widgets:
                  - label: { text: "\U000F0374", text_color: 0xFFFFFF, text_font: font_mdi_24, align: CENTER }
            - label: { id: set_pump_interval_val, text: "15 min", text_color: 0x1F2933, text_font: font_text_24 }
            - obj:
                width: 40
                height: 40
                bg_color: 0x1F3B68
                bg_opa: 100%
                radius: 10
                border_opa: 0%
                scrollbar_mode: "OFF"
                scrollable: false
                on_click:
                  - number.increment: pump_interval
                widgets:
                  - label: { text: "\U000F0415", text_color: 0xFFFFFF, text_font: font_mdi_24, align: CENTER }
      

