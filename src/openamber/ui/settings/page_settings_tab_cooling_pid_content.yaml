- obj:
    id: set_cool_pid_section
    width: 100%
    height: SIZE_CONTENT
    bg_opa: 0%
    border_opa: 0%
    pad_all: 0
    layout:
      type: FLEX
      flex_flow: COLUMN
      flex_align_main: START
      flex_align_cross: STRETCH
      pad_row: 6
    widgets:
      - obj:
          width: 100%
          height: SIZE_CONTENT
          bg_opa: 0%
          border_opa: 0%
          pad_all: 6
          widgets:
            - label: { text: "PID P (Kp)", text_color: 0x1F2933, text_font: font_text_24, align: TOP_LEFT }
            - label: { text: "Hoger: sneller reageren, lager: rustiger maar trager", text_color: 0x6B7280, text_font: font_text_20, align: TOP_LEFT, y: 38 }
            - obj:
                width: SIZE_CONTENT
                height: SIZE_CONTENT
                align: TOP_RIGHT
                bg_opa: 0%
                border_opa: 0%
                pad_all: 0
                layout: { type: FLEX, flex_flow: ROW, flex_align_cross: CENTER, pad_column: 8 }
                widgets:
                  - obj:
                      width: 40
                      height: 40
                      bg_color: 0x1F3B68
                      bg_opa: 100%
                      radius: 10
                      border_opa: 0%
                      scrollbar_mode: "OFF"
                      scrollable: false
                      on_click:
                        - number.decrement: pid_cool_kp
                      widgets:
                        - label: { text: "\U000F0374", text_color: 0xFFFFFF, text_font: font_mdi_24, align: CENTER }
                  - label: { id: set_cool_pid_kp_val, text: "0.60", text_color: 0x1F2933, text_font: font_text_24 }
                  - obj:
                      width: 40
                      height: 40
                      bg_color: 0x1F3B68
                      bg_opa: 100%
                      radius: 10
                      border_opa: 0%
                      scrollbar_mode: "OFF"
                      scrollable: false
                      on_click:
                        - number.increment: pid_cool_kp
                      widgets:
                        - label: { text: "\U000F0415", text_color: 0xFFFFFF, text_font: font_mdi_24, align: CENTER }

      - obj:
          width: 100%
          height: SIZE_CONTENT
          bg_opa: 0%
          border_opa: 0%
          pad_all: 6
          widgets:
            - label: { text: "PID I (Ki)", text_color: 0x1F2933, text_font: font_text_24, align: TOP_LEFT }
            - label: { text: "Hoger: corrigeert afwijking sneller, lager: minder agressief", text_color: 0x6B7280, text_font: font_text_20, align: TOP_LEFT, y: 38 }
            - obj:
                width: SIZE_CONTENT
                height: SIZE_CONTENT
                align: TOP_RIGHT
                bg_opa: 0%
                border_opa: 0%
                pad_all: 0
                layout: { type: FLEX, flex_flow: ROW, flex_align_cross: CENTER, pad_column: 8 }
                widgets:
                  - obj:
                      width: 40
                      height: 40
                      bg_color: 0x1F3B68
                      bg_opa: 100%
                      radius: 10
                      border_opa: 0%
                      scrollbar_mode: "OFF"
                      scrollable: false
                      on_click:
                        - number.decrement: pid_cool_ki
                      widgets:
                        - label: { text: "\U000F0374", text_color: 0xFFFFFF, text_font: font_mdi_24, align: CENTER }
                  - label: { id: set_cool_pid_ki_val, text: "0.0020", text_color: 0x1F2933, text_font: font_text_24 }
                  - obj:
                      width: 40
                      height: 40
                      bg_color: 0x1F3B68
                      bg_opa: 100%
                      radius: 10
                      border_opa: 0%
                      scrollbar_mode: "OFF"
                      scrollable: false
                      on_click:
                        - number.increment: pid_cool_ki
                      widgets:
                        - label: { text: "\U000F0415", text_color: 0xFFFFFF, text_font: font_mdi_24, align: CENTER }

      - obj:
          width: 100%
          height: SIZE_CONTENT
          bg_opa: 0%
          border_opa: 0%
          pad_all: 6
          widgets:
            - label: { text: "PID D (Kd)", text_color: 0x1F2933, text_font: font_text_24, align: TOP_LEFT }
            - label: { text: "Hoger: dempt schommelingen, lager: directer maar onrustiger", text_color: 0x6B7280, text_font: font_text_20, align: TOP_LEFT, y: 38 }
            - obj:
                width: SIZE_CONTENT
                height: SIZE_CONTENT
                align: TOP_RIGHT
                bg_opa: 0%
                border_opa: 0%
                pad_all: 0
                layout: { type: FLEX, flex_flow: ROW, flex_align_cross: CENTER, pad_column: 8 }
                widgets:
                  - obj:
                      width: 40
                      height: 40
                      bg_color: 0x1F3B68
                      bg_opa: 100%
                      radius: 10
                      border_opa: 0%
                      scrollbar_mode: "OFF"
                      scrollable: false
                      on_click:
                        - number.decrement: pid_cool_kd
                      widgets:
                        - label: { text: "\U000F0374", text_color: 0xFFFFFF, text_font: font_mdi_24, align: CENTER }
                  - label: { id: set_cool_pid_kd_val, text: "0.70", text_color: 0x1F2933, text_font: font_text_24 }
                  - obj:
                      width: 40
                      height: 40
                      bg_color: 0x1F3B68
                      bg_opa: 100%
                      radius: 10
                      border_opa: 0%
                      scrollbar_mode: "OFF"
                      scrollable: false
                      on_click:
                        - number.increment: pid_cool_kd
                      widgets:
                        - label: { text: "\U000F0415", text_color: 0xFFFFFF, text_font: font_mdi_24, align: CENTER }

      - obj:
          id: set_cool_pid_disabled_overlay
          hidden: true
          ignore_layout: true
          align: TOP_LEFT
          width: 100%
          height: 100%
          bg_color: 0xFFFFFF
          bg_opa: 55%
          border_opa: 0%
          radius: 0
          pad_all: 0
          scrollbar_mode: "OFF"
          scrollable: false
