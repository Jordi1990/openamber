- obj:
    width: 100%
    height: SIZE_CONTENT
    bg_opa: 0%
    border_opa: 0%
    pad_all: 6
    widgets:
      - label: { text: "Start delta (°C)", text_color: 0x1F2933, text_font: font_text_24, align: TOP_LEFT }
      - label: { text: "Verschil met setpoint om compressor te starten", text_color: 0x6B7280, text_font: font_text_20, align: TOP_LEFT, y: 38 }
      - obj:
          width: SIZE_CONTENT
          height: SIZE_CONTENT
          align: TOP_RIGHT
          bg_opa: 0%
          border_opa: 0%
          pad_all: 0
          layout: { type: FLEX, flex_flow: ROW, flex_align_cross: CENTER, pad_column: 8 }
          widgets:
            - obj:
                width: 40
                height: 40
                bg_color: 0x1F3B68
                bg_opa: 100%
                radius: 10
                border_opa: 0%
                scrollbar_mode: "OFF"
                scrollable: false
                on_click:
                  - number.decrement: compressor_start_delta
                widgets:
                  - label: { text: "\U000F0374", text_color: 0xFFFFFF, text_font: font_mdi_24, align: CENTER }
            - label: { id: set_comp_start_val, text: "3.0°C", text_color: 0x1F2933, text_font: font_text_24 }
            - obj:
                width: 40
                height: 40
                bg_color: 0x1F3B68
                bg_opa: 100%
                radius: 10
                border_opa: 0%
                scrollbar_mode: "OFF"
                scrollable: false
                on_click:
                  - number.increment: compressor_start_delta
                widgets:
                  - label: { text: "\U000F0415", text_color: 0xFFFFFF, text_font: font_mdi_24, align: CENTER }


- obj:
    width: 100%
    height: SIZE_CONTENT
    bg_opa: 0%
    border_opa: 0%
    pad_all: 6
    widgets:
      - label: { text: "Verwarmingsmodus", text_color: 0x1F2933, text_font: font_text_24, align: TOP_LEFT }
      - label: { text: "Kies stooklijn of extern aangestuurd setpoint", text_color: 0x6B7280, text_font: font_text_20, align: TOP_LEFT, y: 38 }
      - dropdown:
          id: set_heat_mode_dd
          symbol: "\U000F0140"
          width: 220
          align: TOP_RIGHT
          y: 0
          options:
            - "Stooklijn"
            - "Extern setpoint"
          text_font: font_text_24
          dropdown_list:
            text_font: font_text_24
          on_value:
            then:
              - lambda: |-
                  auto val = lv_dropdown_get_selected(id(set_heat_mode_dd)->obj);
                  if (val == 0) id(heat_mode_select).make_call().set_option("Stooklijn").perform();
                  else id(heat_mode_select).make_call().set_option("Extern setpoint").perform();
              - if:
                  condition:
                    lambda: |-
                      return lv_dropdown_get_selected(id(set_heat_mode_dd)->obj) == 0;
                  then:
                    - lvgl.widget.show: { id: set_heat_curve_title }
                    - lvgl.widget.show: { id: set_heat_curve_chart_container }
                    - lvgl.widget.show: { id: set_heat_curve_controls_container }
                  else:
                    - lvgl.widget.hide: { id: set_heat_curve_title }
                    - lvgl.widget.hide: { id: set_heat_curve_chart_container }
                    - lvgl.widget.hide: { id: set_heat_curve_controls_container }
      

- obj:
    width: 100%
    height: SIZE_CONTENT
    bg_opa: 0%
    border_opa: 0%
    pad_all: 6
    widgets:
      - label: { id: set_manual_sp_lbl, text: "Extern setpoint (°C)", text_color: 0x1F2933, text_font: font_text_24, align: TOP_LEFT }
      - label: { id: set_manual_sp_sub, text: "Cv-aanvoertemperatuur bij extern setpoint", text_color: 0x6B7280, text_font: font_text_20, align: TOP_LEFT, y: 38 }
      - obj:
          width: SIZE_CONTENT
          height: SIZE_CONTENT
          align: TOP_RIGHT
          bg_opa: 0%
          border_opa: 0%
          pad_all: 0
          layout: { type: FLEX, flex_flow: ROW, flex_align_cross: CENTER, pad_column: 8 }
          widgets:
            - obj:
                id: set_manual_sp_dec
                width: 40
                height: 40
                bg_color: 0x1F3B68
                bg_opa: 100%
                radius: 10
                border_opa: 0%
                scrollbar_mode: "OFF"
                scrollable: false
                on_click:
                  - if:
                      condition:
                        lambda: 'return id(heat_mode_select).current_option() == "Extern setpoint";'
                      then:
                        - number.decrement: manual_setpoint
                        - lvgl.label.update:
                            id: set_manual_sp_val
                            text:
                              format: "%.0f°C"
                              args: ['id(manual_setpoint).state']
                widgets:
                  - label: { id: set_manual_sp_dec_lbl, text: "\U000F0374", text_color: 0xFFFFFF, text_font: font_mdi_24, align: CENTER }
            - label: { id: set_manual_sp_val, text: "30°C", text_color: 0x1F2933, text_font: font_text_24 }
            - obj:
                id: set_manual_sp_inc
                width: 40
                height: 40
                bg_color: 0x1F3B68
                bg_opa: 100%
                radius: 10
                border_opa: 0%
                scrollbar_mode: "OFF"
                scrollable: false
                on_click:
                  - if:
                      condition:
                        lambda: 'return id(heat_mode_select).current_option() == "Extern setpoint";'
                      then:
                        - number.increment: manual_setpoint
                        - lvgl.label.update:
                            id: set_manual_sp_val
                            text:
                              format: "%.0f°C"
                              args: ['id(manual_setpoint).state']
                widgets:
                  - label: { id: set_manual_sp_inc_lbl, text: "\U000F0415", text_color: 0xFFFFFF, text_font: font_mdi_24, align: CENTER }


- obj:
    width: 100%
    height: SIZE_CONTENT
    bg_opa: 0%
    border_opa: 0%
    pad_all: 6
    widgets:
      - label: { text: "Verwarmen vermogen", text_color: 0x1F2933, text_font: font_text_24, align: TOP_LEFT }
      - label: { text: "Max compressorvermogen bij verwarmen", text_color: 0x6B7280, text_font: font_text_20, align: TOP_LEFT, y: 38 }
      - dropdown:
          id: set_heat_power_dd
          symbol: "\U000F0140"
          width: 220
          align: TOP_RIGHT
          y: 0
          options:
            - "Beperkt"
            - "Zeer laag"
            - "Laag"
            - "Gemiddeld"
            - "Verhoogd"
            - "Hoog"
            - "Maximaal"
          text_font: font_text_24
          dropdown_list:
            text_font: font_text_24
          on_value:
            then:
              - lambda: |-
                  const char* opts[] = {"Beperkt","Zeer laag","Laag","Gemiddeld","Verhoogd","Hoog","Maximaal"};
                  auto val = lv_dropdown_get_selected(id(set_heat_power_dd)->obj);
                  if (val < 7) id(heat_compressor_mode).make_call().set_option(opts[val]).perform();


