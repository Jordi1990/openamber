- obj:
    id: set_heat_curve_controls_container
    width: 100%
    height: SIZE_CONTENT
    bg_opa: 0%
    border_opa: 0%
    pad_all: 0
    layout:
      type: FLEX
      flex_flow: ROW
      flex_align_main: SPACE_EVENLY
      flex_align_cross: CENTER
      pad_column: 4
    widgets:
      # -10°C
      - obj:
          width: SIZE_CONTENT
          height: SIZE_CONTENT
          bg_opa: 0%
          border_opa: 0%
          pad_all: 2
          layout: { type: FLEX, flex_flow: COLUMN, flex_align_cross: CENTER, pad_row: 2 }
          widgets:
            - label: { text: "-10°C", text_color: 0x6B7280, text_font: font_text_24 }
            - label: { id: set_hc_m10_val, text: "35°C", text_color: 0x1F2933, text_font: font_text_24 }
