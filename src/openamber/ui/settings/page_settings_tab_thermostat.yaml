# Panel: Thermostaat (intern)
# ------------------------------------------------------------
obj:
  id: panel_thermostat
  width: 100%
  height: 100%
  hidden: true
  bg_opa: 0%
  border_opa: 0%
  pad_left: 4
  pad_right: 4
  pad_top: 4
  pad_bottom: 4
  scrollbar_mode: "OFF"
  scrollable: false
  layout:
    type: FLEX
    flex_flow: COLUMN
    flex_align_main: START
    flex_align_cross: CENTER
    pad_row: 4

  widgets:
    - obj:
        id: panel_thermostat_page_setpoint
        width: 100%
        height: SIZE_CONTENT
        bg_opa: 0%
        border_opa: 0%
        pad_all: 0
        scrollbar_mode: "OFF"
        scrollable: false
        layout:
          type: FLEX
          flex_flow: COLUMN
          flex_align_main: START
          flex_align_cross: CENTER
          pad_row: 4
        widgets:
          - obj:
              id: thermostat_row_setpoint
              width: 100%
              height: SIZE_CONTENT
              bg_opa: 0%
              border_opa: 0%
              pad_all: 6
              widgets:
                - label: { text: "Thermostaat bron", text_color: 0x1F2933, text_font: font_text_24, align: TOP_LEFT }
                - label: { text: "Kies intern of extern thermostaatsignaal", text_color: 0x6B7280, text_font: font_text_20, align: TOP_LEFT, y: 38 }
                - dropdown:
                    id: set_thermostat_dd
                    symbol: "\U000F0140"
                    width: 200
                    align: TOP_RIGHT
                    y: 0
                    options:
                      - "Intern"
                      - "Extern"
                    text_font: font_text_20
                    dropdown_list:
                      text_font: font_text_20
                    on_value:
                      then:
                        - lambda: |-
                            auto val = lv_dropdown_get_selected(id(set_thermostat_dd)->obj);
                            auto idx = id(thermostat_mode_select).active_index();
                            if (idx.has_value() && idx.value() == (int) val) {
                              return;
                            }
                            if (val == 0) id(thermostat_mode_select).make_call().set_option("Intern").perform();
                            else id(thermostat_mode_select).make_call().set_option("Extern").perform();

          - obj:
              id: thermostat_row_default_heat
              width: 100%
              height: SIZE_CONTENT
              bg_opa: 0%
              border_opa: 0%
              pad_all: 6
              widgets:
                - label: { text: "Setpoint", text_color: 0x1F2933, text_font: font_text_24, align: TOP_LEFT }
                - label: { text: "Huidig kamertemperatuur setpoint", text_color: 0x6B7280, text_font: font_text_20, align: TOP_LEFT, y: 38 }
                - obj:
                    width: 200
                    height: 40
                    align: TOP_RIGHT
                    bg_opa: 0%
                    border_opa: 0%
                    pad_all: 0
                    widgets:
                      - label: { id: set_therm_sp_val, text: "20.5C", text_color: 0x1F2933, text_font: font_text_24, align: RIGHT_MID }

          - obj:
              id: thermostat_row_default_cool
              width: 100%
              height: SIZE_CONTENT
              bg_opa: 0%
              border_opa: 0%
              pad_all: 6
              widgets:
                - label: { text: "Standaard setpoint verwarmen", text_color: 0x1F2933, text_font: font_text_24, align: TOP_LEFT }
                - label: { text: "Setpoint verwarmen na herstart", text_color: 0x6B7280, text_font: font_text_20, align: TOP_LEFT, y: 38 }
                - obj:
                    width: 200
                    height: 40
                    align: TOP_RIGHT
                    bg_opa: 0%
                    border_opa: 0%
                    pad_all: 0
                    widgets:
                      - label: { id: set_therm_def_heat_val, text: "20.5C", text_color: 0x1F2933, text_font: font_text_24, align: RIGHT_MID }

          - obj:
              id: thermostat_row_heat_deadband
              width: 100%
              height: SIZE_CONTENT
              bg_opa: 0%
              border_opa: 0%
              pad_all: 6
              widgets:
                - label: { text: "Standaard setpoint koelen", text_color: 0x1F2933, text_font: font_text_24, align: TOP_LEFT }
                - label: { text: "Setpoint koelen na herstart", text_color: 0x6B7280, text_font: font_text_20, align: TOP_LEFT, y: 38 }
                - obj:
                    width: 200
                    height: 40
                    align: TOP_RIGHT
                    bg_opa: 0%
                    border_opa: 0%
                    pad_all: 0
                    widgets:
                      - label: { id: set_therm_def_cool_val, text: "24.0C", text_color: 0x1F2933, text_font: font_text_24, align: RIGHT_MID }

    - obj:
        id: panel_thermostat_page_verwarmen
        width: 100%
        height: SIZE_CONTENT
        bg_opa: 0%
        border_opa: 0%
        pad_all: 0
        scrollbar_mode: "OFF"
        scrollable: false
        layout:
          type: FLEX
          flex_flow: COLUMN
          flex_align_main: START
          flex_align_cross: CENTER
          pad_row: 4
        widgets:
          - obj:
              id: thermostat_row_heat_overrun
              width: 100%
              height: SIZE_CONTENT
              bg_opa: 0%
              border_opa: 0%
              pad_all: 6
              widgets:
                - label: { text: "Deadband verwarmen", text_color: 0x1F2933, text_font: font_text_24, align: TOP_LEFT }
                - label: { text: "Temperatuurverschil onder setpoint voor verwarmen", text_color: 0x6B7280, text_font: font_text_20, align: TOP_LEFT, y: 38 }
                - obj:
                    width: 200
                    height: 40
                    align: TOP_RIGHT
                    bg_opa: 0%
                    border_opa: 0%
                    pad_all: 0
                    widgets:
                      - label: { id: set_therm_heat_db_val, text: "0.3C", text_color: 0x1F2933, text_font: font_text_24, align: RIGHT_MID }

          - obj:
              id: thermostat_row_cool_deadband
              width: 100%
              height: SIZE_CONTENT
              bg_opa: 0%
              border_opa: 0%
              pad_all: 6
              widgets:
                - label: { text: "Overrun verwarmen", text_color: 0x1F2933, text_font: font_text_24, align: TOP_LEFT }
                - label: { text: "Temperatuurverschil boven setpoint voor stoppen", text_color: 0x6B7280, text_font: font_text_20, align: TOP_LEFT, y: 38 }
                - obj:
                    width: 200
                    height: 40
                    align: TOP_RIGHT
                    bg_opa: 0%
                    border_opa: 0%
                    pad_all: 0
                    widgets:
                      - label: { id: set_therm_heat_or_val, text: "0.2C", text_color: 0x1F2933, text_font: font_text_24, align: RIGHT_MID }

    - obj:
        id: panel_thermostat_page_koelen
        width: 100%
        height: SIZE_CONTENT
        bg_opa: 0%
        border_opa: 0%
        pad_all: 0
        scrollbar_mode: "OFF"
        scrollable: false
        layout:
          type: FLEX
          flex_flow: COLUMN
          flex_align_main: START
          flex_align_cross: CENTER
          pad_row: 4
        widgets:
          - obj:
              id: thermostat_row_cool_overrun
              width: 100%
              height: SIZE_CONTENT
              bg_opa: 0%
              border_opa: 0%
              pad_all: 6
              widgets:
                - label: { text: "Deadband koelen", text_color: 0x1F2933, text_font: font_text_24, align: TOP_LEFT }
                - label: { text: "Temperatuurverschil boven setpoint voor koelen", text_color: 0x6B7280, text_font: font_text_20, align: TOP_LEFT, y: 38 }
                - obj:
                    width: 200
                    height: 40
                    align: TOP_RIGHT
                    bg_opa: 0%
                    border_opa: 0%
                    pad_all: 0
                    widgets:
                      - label: { id: set_therm_cool_db_val, text: "0.5C", text_color: 0x1F2933, text_font: font_text_24, align: RIGHT_MID }

          - obj:
              width: 100%
              height: SIZE_CONTENT
              bg_opa: 0%
              border_opa: 0%
              pad_all: 6
              widgets:
                - label: { text: "Overrun koelen", text_color: 0x1F2933, text_font: font_text_24, align: TOP_LEFT }
                - label: { text: "Temperatuurverschil onder setpoint voor stoppen", text_color: 0x6B7280, text_font: font_text_20, align: TOP_LEFT, y: 38 }
                - obj:
                    width: 200
                    height: 40
                    align: TOP_RIGHT
                    bg_opa: 0%
                    border_opa: 0%
                    pad_all: 0
                    widgets:
                      - label: { id: set_therm_cool_or_val, text: "3.0C", text_color: 0x1F2933, text_font: font_text_24, align: RIGHT_MID }

