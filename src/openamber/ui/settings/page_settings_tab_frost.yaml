# Panel: Vorstbescherming
# ------------------------------------------------------------
obj:
    id: panel_frost
    width: 100%
    height: 100%
    hidden: true
    bg_opa: 0%
    border_opa: 0%
    pad_left: 4
    pad_right: 4
    pad_top: 4
    pad_bottom: 4
    scrollbar_mode: "OFF"
    scrollable: true
    layout:
      type: FLEX
      flex_flow: COLUMN
      flex_align_main: START
      flex_align_cross: CENTER
      pad_row: 6
      
    widgets:
      - obj:
          width: 100%
          height: SIZE_CONTENT
          bg_opa: 0%
          border_opa: 0%
          pad_all: 6
          widgets:
            - label: { text: "Buitentemperatuur 1e trap", text_color: 0x1F2933, text_font: font_text_24, align: TOP_LEFT }
            - label: { text: "Buitentemperatuur waaronder trap 1 activeert", text_color: 0x6B7280, text_font: font_text_20, align: TOP_LEFT, y: 38 }
            - obj:
                width: SIZE_CONTENT
                height: SIZE_CONTENT
                align: TOP_RIGHT
                bg_opa: 0%
                border_opa: 0%
                pad_all: 0
                layout: { type: FLEX, flex_flow: ROW, flex_align_cross: CENTER, pad_column: 8 }
                widgets:
                  - obj:
                      width: 40
                      height: 40
                      bg_color: 0x1F3B68
                      bg_opa: 100%
                      radius: 10
                      border_opa: 0%
                      scrollbar_mode: "OFF"
                      scrollable: false
                      on_click:
                        - number.decrement: frost_protection_stage_1_temp_ta
                      widgets:
                        - label: { text: "\U000F0374", text_color: 0xFFFFFF, text_font: font_mdi_24, align: CENTER }
                  - label: { id: set_frost1_val, text: "5.0°C", text_color: 0x1F2933, text_font: font_text_24 }
                  - obj:
                      width: 40
                      height: 40
                      bg_color: 0x1F3B68
                      bg_opa: 100%
                      radius: 10
                      border_opa: 0%
                      scrollbar_mode: "OFF"
                      scrollable: false
                      on_click:
                        - number.increment: frost_protection_stage_1_temp_ta
                      widgets:
                        - label: { text: "\U000F0415", text_color: 0xFFFFFF, text_font: font_mdi_24, align: CENTER }
      
      - obj:
          width: 100%
          height: SIZE_CONTENT
          bg_opa: 0%
          border_opa: 0%
          pad_all: 6
          widgets:
            - label: { text: "Buitentemperatuur 2e trap", text_color: 0x1F2933, text_font: font_text_24, align: TOP_LEFT }
            - label: { text: "Buitentemperatuur waaronder trap 2 activeert", text_color: 0x6B7280, text_font: font_text_20, align: TOP_LEFT, y: 38 }
            - obj:
                width: SIZE_CONTENT
                height: SIZE_CONTENT
                align: TOP_RIGHT
                bg_opa: 0%
                border_opa: 0%
                pad_all: 0
                layout: { type: FLEX, flex_flow: ROW, flex_align_cross: CENTER, pad_column: 8 }
                widgets:
                  - obj:
                      width: 40
                      height: 40
                      bg_color: 0x1F3B68
                      bg_opa: 100%
                      radius: 10
                      border_opa: 0%
                      scrollbar_mode: "OFF"
                      scrollable: false
                      on_click:
                        - number.decrement: frost_protection_stage_2_temp_ta
                      widgets:
                        - label: { text: "\U000F0374", text_color: 0xFFFFFF, text_font: font_mdi_24, align: CENTER }
                  - label: { id: set_frost2_ta_val, text: "4.0°C", text_color: 0x1F2933, text_font: font_text_24 }
                  - obj:
                      width: 40
                      height: 40
                      bg_color: 0x1F3B68
                      bg_opa: 100%
                      radius: 10
                      border_opa: 0%
                      scrollbar_mode: "OFF"
                      scrollable: false
                      on_click:
                        - number.increment: frost_protection_stage_2_temp_ta
                      widgets:
                        - label: { text: "\U000F0415", text_color: 0xFFFFFF, text_font: font_mdi_24, align: CENTER }
      
      - obj:
          width: 100%
          height: SIZE_CONTENT
          bg_opa: 0%
          border_opa: 0%
          pad_all: 6
          widgets:
            - label: { text: "Watertemperatuur 2e trap", text_color: 0x1F2933, text_font: font_text_24, align: TOP_LEFT }
            - label: { text: "Watertemperatuur waaronder trap 2 activeert", text_color: 0x6B7280, text_font: font_text_20, align: TOP_LEFT, y: 38 }
            - obj:
                width: SIZE_CONTENT
                height: SIZE_CONTENT
                align: TOP_RIGHT
                bg_opa: 0%
                border_opa: 0%
                pad_all: 0
                layout: { type: FLEX, flex_flow: ROW, flex_align_cross: CENTER, pad_column: 8 }
                widgets:
                  - obj:
                      width: 40
                      height: 40
                      bg_color: 0x1F3B68
                      bg_opa: 100%
                      radius: 10
                      border_opa: 0%
                      scrollbar_mode: "OFF"
                      scrollable: false
                      on_click:
                        - number.decrement: frost_protection_stage_2_temp_tui
                      widgets:
                        - label: { text: "\U000F0374", text_color: 0xFFFFFF, text_font: font_mdi_24, align: CENTER }
                  - label: { id: set_frost2_tui_val, text: "7.0°C", text_color: 0x1F2933, text_font: font_text_24 }
                  - obj:
                      width: 40
                      height: 40
                      bg_color: 0x1F3B68
                      bg_opa: 100%
                      radius: 10
                      border_opa: 0%
                      scrollbar_mode: "OFF"
                      scrollable: false
                      on_click:
                        - number.increment: frost_protection_stage_2_temp_tui
                      widgets:
                        - label: { text: "\U000F0415", text_color: 0xFFFFFF, text_font: font_mdi_24, align: CENTER }
      
