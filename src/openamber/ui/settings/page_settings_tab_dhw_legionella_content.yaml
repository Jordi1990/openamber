- obj:
    width: 100%
    height: SIZE_CONTENT
    bg_opa: 0%
    border_opa: 0%
    pad_all: 6
    widgets:
      - label: { text: "Legionellapreventie", text_color: 0x1F2933, text_font: font_text_24, align: TOP_LEFT }
      - label: { text: "Periodieke opwarming tegen legionella", text_color: 0x6B7280, text_font: font_text_20, align: TOP_LEFT, y: 38 }
      - switch:
          id: set_legio_switch
          align: TOP_RIGHT
          bg_color: 0x9CA3AF
          indicator:
            bg_color: 0x16A34A
          knob:
            bg_color: 0xFFFFFF
          on_click:
            - if:
                condition:
                  switch.is_on: legio_enabled_switch
                then:
                  - switch.turn_off: legio_enabled_switch
                else:
                  - switch.turn_on: legio_enabled_switch

- obj:
    width: 100%
    height: SIZE_CONTENT
    bg_opa: 0%
    border_opa: 0%
    pad_all: 6
    widgets:
      - label: { id: set_legio_days_lbl, text: "Legionella herhaling (dgn)", text_color: 0x1F2933, text_font: font_text_24, align: TOP_LEFT }
      - label: { id: set_legio_days_sub, text: "Dagen tussen preventieverwarming", text_color: 0x6B7280, text_font: font_text_20, align: TOP_LEFT, y: 38 }
      - obj:
          width: SIZE_CONTENT
          height: SIZE_CONTENT
          align: TOP_RIGHT
          bg_opa: 0%
          border_opa: 0%
          pad_all: 0
          layout: { type: FLEX, flex_flow: ROW, flex_align_cross: CENTER, pad_column: 8 }
          widgets:
            - obj:
                id: set_legio_days_dec
                width: 40
                height: 40
                bg_color: 0x1F3B68
                bg_opa: 100%
                radius: 10
                border_opa: 0%
                scrollbar_mode: "OFF"
                scrollable: false
                on_click:
                  - if:
                      condition:
                        switch.is_on: legio_enabled_switch
                      then:
                        - number.decrement: legio_repeat_days_number
                widgets:
                  - label: { id: set_legio_days_dec_lbl, text: "\U000F0374", text_color: 0xFFFFFF, text_font: font_mdi_24, align: CENTER }
            - label: { id: set_legio_days_val, text: "7 d", text_color: 0x1F2933, text_font: font_text_24 }
            - obj:
                id: set_legio_days_inc
                width: 40
                height: 40
                bg_color: 0x1F3B68
                bg_opa: 100%
                radius: 10
                border_opa: 0%
                scrollbar_mode: "OFF"
                scrollable: false
                on_click:
                  - if:
                      condition:
                        switch.is_on: legio_enabled_switch
                      then:
                        - number.increment: legio_repeat_days_number
                widgets:
                  - label: { id: set_legio_days_inc_lbl, text: "\U000F0415", text_color: 0xFFFFFF, text_font: font_mdi_24, align: CENTER }

- obj:
