      - label: { id: set_legio_temp_sub, text: "Doeltemperatuur bij legionellapreventie", text_color: 0x6B7280, text_font: font_text_20, align: TOP_LEFT, y: 38 }
      - obj:
          width: SIZE_CONTENT
          height: SIZE_CONTENT
          align: TOP_RIGHT
