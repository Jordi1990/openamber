      - label:
          id: set_dhw_days_summary
          text: "Actief op: -"
          text_color: 0x6B7280
          text_font: font_text_20
          align: TOP_LEFT
          y: 108
      - obj:
          width: 100%
          height: SIZE_CONTENT
          align: TOP_LEFT
          y: 138
          bg_opa: 0%
          border_opa: 0%
          pad_all: 0
          widgets:
            - label: { id: set_dhw_start_time_lbl, text: "Starttijd", text_color: 0x1F2933, text_font: font_text_24, align: TOP_LEFT }
            - obj:
                width: SIZE_CONTENT
                height: SIZE_CONTENT
                align: TOP_RIGHT
                bg_opa: 0%
                border_opa: 0%
                pad_all: 0
                layout: { type: FLEX, flex_flow: ROW, flex_align_cross: CENTER, pad_column: 4 }
                widgets:
                  - obj:
                      id: set_dhw_start_time_dec
                      width: 40
                      height: 40
                      bg_color: 0x1F3B68
                      bg_opa: 100%
                      radius: 10
                      border_opa: 0%
                      scrollbar_mode: "OFF"
                      scrollable: false
                      on_click:
                        - if:
                            condition:
                              switch.is_on: dhw_schedule_enabled_switch
                            then:
                              - lambda: |-
                                  int h = id(dhw_start_time).hour;
                                  int m = id(dhw_start_time).minute;
                                  m -= 30;
                                  if (m < 0) { m += 60; h = (h + 23) % 24; }
                                  auto call = id(dhw_start_time).make_call();
                                  call.set_time(h, m, 0);
                                  call.perform();
                              - lvgl.label.update:
                                  id: set_dhw_start_time_val
                                  text:
                                    format: "%02d:%02d"
                                    args: ['id(dhw_start_time).hour', 'id(dhw_start_time).minute']
                      widgets:
                        - label: { id: set_dhw_start_time_dec_lbl, text: "\U000F0374", text_color: 0xFFFFFF, text_font: font_mdi_24, align: CENTER }
                  - label: { id: set_dhw_start_time_val, text: "10:00", text_color: 0x1F2933, text_font: font_text_24 }
                  - obj:
                      id: set_dhw_start_time_inc
                      width: 40
                      height: 40
                      bg_color: 0x1F3B68
                      bg_opa: 100%
                      radius: 10
                      border_opa: 0%
                      scrollbar_mode: "OFF"
                      scrollable: false
                      on_click:
                        - if:
                            condition:
                              switch.is_on: dhw_schedule_enabled_switch
                            then:
                              - lambda: |-
                                  int h = id(dhw_start_time).hour;
                                  int m = id(dhw_start_time).minute;
                                  m += 30;
                                  if (m >= 60) { m -= 60; h = (h + 1) % 24; }
                                  auto call = id(dhw_start_time).make_call();
                                  call.set_time(h, m, 0);
                                  call.perform();
                              - lvgl.label.update:
                                  id: set_dhw_start_time_val
                                  text:
                                    format: "%02d:%02d"
                                    args: ['id(dhw_start_time).hour', 'id(dhw_start_time).minute']
                      widgets:
                        - label: { id: set_dhw_start_time_inc_lbl, text: "\U000F0415", text_color: 0xFFFFFF, text_font: font_mdi_24, align: CENTER }
