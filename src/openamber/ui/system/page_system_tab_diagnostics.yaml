obj:
  id: system_diagnostics_panel
  width: 100%
  height: 100%
  align: TOP_LEFT
  y: 0
  hidden: true
  bg_opa: 0%
  border_opa: 0%
  pad_all: 0
  scrollbar_mode: "OFF"
  scrollable: false
  layout:
    type: FLEX
    flex_flow: ROW_WRAP
    flex_align_main: START
    flex_align_cross: CENTER
    pad_row: 10
    pad_column: 10
  widgets:
    - obj:
        width: 100%
        height: 190
        bg_color: 0xFFFFFF
        bg_opa: 100%
        radius: 12
        border_width: 1
        border_color: 0xE5E7EB
        border_opa: 100%
        pad_all: 10
        scrollbar_mode: "OFF"
        scrollable: false
        widgets:
          - label: { text: "Runtime", text_color: 0x111827, text_font: font_text_20, align: TOP_LEFT }
          - label: { width: 42%, text: "ESPHome\nUptime", text_color: 0x6B7280, text_font: font_text_20, long_mode: WRAP, align: TOP_LEFT, y: 30 }
          - label: { id: system_diag_runtime_values, width: 56%, text: "-\n-", text_color: 0x1F2933, text_font: font_text_20, text_align: RIGHT, long_mode: WRAP, align: TOP_RIGHT, y: 30 }

    - obj:
        width: 100%
        height: 210
        bg_color: 0xFFFFFF
        bg_opa: 100%
        radius: 12
        border_width: 1
        border_color: 0xE5E7EB
        border_opa: 100%
        pad_all: 10
        scrollbar_mode: "OFF"
        scrollable: false
        widgets:
          - label: { text: "Geheugen", text_color: 0x111827, text_font: font_text_20, align: TOP_LEFT }
          - label: { width: 42%, text: "Heap vrij\nHeap frag.\nHeap max\nPSRAM vrij", text_color: 0x6B7280, text_font: font_text_20, long_mode: WRAP, align: TOP_LEFT, y: 30 }
          - label: { id: system_diag_memory_values, width: 56%, text: "-\n-\n-\n-", text_color: 0x1F2933, text_font: font_text_20, text_align: RIGHT, long_mode: WRAP, align: TOP_RIGHT, y: 30 }

    - obj:
        width: 100%
        height: 160
        bg_color: 0xFFFFFF
        bg_opa: 100%
        radius: 12
        border_width: 1
        border_color: 0xE5E7EB
        border_opa: 100%
        pad_all: 10
        scrollbar_mode: "OFF"
        scrollable: false
        widgets:
          - label: { text: "ESP", text_color: 0x111827, text_font: font_text_20, align: TOP_LEFT }
          - label: { width: 42%, text: "Chip\nReset reason", text_color: 0x6B7280, text_font: font_text_20, long_mode: WRAP, align: TOP_LEFT, y: 30 }
          - label: { id: system_diag_esp_values, width: 56%, text: "-\n-", text_color: 0x1F2933, text_font: font_text_20, text_align: RIGHT, long_mode: WRAP, align: TOP_RIGHT, y: 30 }
