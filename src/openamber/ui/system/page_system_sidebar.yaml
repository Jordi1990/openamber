obj:
  id: system_sidebar
  grid_cell_row_pos: 0
  grid_cell_column_pos: 0
  grid_cell_x_align: STRETCH
  grid_cell_y_align: STRETCH
  width: 210
  height: 100%
  bg_color: 0xE8ECF1
  bg_opa: 100%
  radius: 14
  border_width: 0
  border_opa: 0%
  pad_left: 4
  pad_right: 4
  pad_top: 3
  pad_bottom: 3
  scrollbar_mode: "OFF"
  scrollable: false
  layout:
    type: FLEX
    flex_flow: COLUMN
    flex_align_main: START
    flex_align_cross: CENTER
    pad_row: 2
  widgets:
    - obj:
        id: system_tab_management
        width: 100%
        height: 40
        bg_color: 0x1F3B68
        bg_opa: 100%
        radius: 10
        border_width: 0
        border_opa: 0%
        pad_left: 12
        pad_top: 2
        pad_bottom: 2
        on_click:
          - lvgl.widget.show: { id: service_updates_panel }
          - lvgl.widget.hide: { id: system_diagnostics_panel }
          - lvgl.widget.update: { id: system_tab_management, bg_color: 0x1F3B68 }
          - lvgl.widget.update: { id: system_tab_management_lbl, text_color: 0xFFFFFF }
          - lvgl.widget.update: { id: system_tab_diagnostics, bg_color: 0xE8ECF1 }
          - lvgl.widget.update: { id: system_tab_diagnostics_lbl, text_color: 0x4B5563 }
        widgets:
          - label:
              id: system_tab_management_lbl
              text: "Beheer"
              text_color: 0xFFFFFF
              text_font: font_text_20
              align: LEFT_MID

    - obj:
        id: system_tab_diagnostics
        width: 100%
        height: 40
        bg_color: 0xE8ECF1
        bg_opa: 100%
        radius: 10
        border_width: 0
        border_opa: 0%
        pad_left: 12
        pad_top: 2
        pad_bottom: 2
        on_click:
          - lvgl.widget.hide: { id: service_updates_panel }
          - lvgl.widget.show: { id: system_diagnostics_panel }
          - script.execute: update_system_diagnostics_ui
          - lvgl.widget.update: { id: system_tab_management, bg_color: 0xE8ECF1 }
          - lvgl.widget.update: { id: system_tab_management_lbl, text_color: 0x4B5563 }
          - lvgl.widget.update: { id: system_tab_diagnostics, bg_color: 0x1F3B68 }
          - lvgl.widget.update: { id: system_tab_diagnostics_lbl, text_color: 0xFFFFFF }
        widgets:
          - label:
              id: system_tab_diagnostics_lbl
              text: "Diagnostiek"
              text_color: 0x4B5563
              text_font: font_text_20
              align: LEFT_MID
