obj:
  id: page_home
  width: 100%
  height: 76%
  x: 0
  y: 70
  bg_opa: 0%
  border_opa: 0%
  scrollbar_mode: "OFF"
  scrollable: false
  pad_left: 24
  pad_right: 24
  pad_top: 10
  pad_bottom: 10
  layout:
    type: GRID
    grid_rows: [ FR(1) ]
    grid_columns: [ FR(13), FR(6) ]
    pad_column: 16

  widgets:
    - obj:
        id: home_left_wrapper
        width: 100%
        height: 100%
        grid_cell_row_pos: 0
        grid_cell_column_pos: 0
        grid_cell_x_align: STRETCH
        grid_cell_y_align: STRETCH
        bg_opa: 0%
        border_opa: 0%
        pad_all: 0
        scrollbar_mode: "OFF"
        scrollable: false
        layout:
          type: FLEX
          flex_flow: ROW
          pad_column: 16
        widgets:
          - obj:
              id: water_card
              flex_grow: 1
              height: 100%
              bg_color: 0xF5F8FC
              bg_opa: 100%
              radius: 18
              pad_left: 24
              pad_right: 24
              pad_top: 20
              pad_bottom: 20
              border_width: 0
              border_opa: 0%
              shadow_width: 10
              shadow_spread: 0
              shadow_color: 0x000000
              shadow_opa: 20%
              scrollbar_mode: "OFF"
              scrollable: false
              widgets:
                - label:
                    id: water_title
                    text: "Water circuit"
                    text_color: 0x1F2933
                    text_font: font_mdi_24
                    align: TOP_LEFT
                    y: 0

                - obj:
                    id: water_mode_chip
                    align: TOP_RIGHT
                    x: -4
                    y: 0
                    width: SIZE_CONTENT
                    height: SIZE_CONTENT
                    pad_left: 10
                    pad_right: 12
                    pad_top: 4
                    pad_bottom: 4
                    bg_color: 0xF97316
                    bg_opa: 100%
                    radius: 16
                    border_width: 0
                    border_opa: 0%

                    layout:
                      type: FLEX
                      flex_flow: ROW
                      flex_align_cross: CENTER
                      pad_column: 6
                    widgets:
                      - label:
                          id: water_mode_icon
                          text: "\U000F0238"
                          text_color: 0xFFFFFF
                          text_font: font_mdi_24
                      - label:
                          id: water_mode_text
                          text: "Verwarmen"
                          text_color: 0xFFFFFF
                          text_font: font_mdi_24

                - image:
                    id: water_diagram_img
                    src: img_water_circuit
                    align: CENTER
                    y: -35

                - obj:
                    id: water_aanvoer_group
                    align: LEFT_MID
                    x: 80
                    y: 5
                    bg_opa: 0%
                    border_opa: 0%
                    pad_all: 0
                    layout:
                      type: FLEX
                      flex_flow: COLUMN
                      flex_align_cross: START
                      pad_row: 2
                    widgets:
                      - label:
                          id: water_aanvoer_label
                          text: "Aanvoer"
                          text_color: 0x1F2933
                          text_font: font_mdi_24
                      - label:
                          id: water_aanvoer_value
                          text: "32,5°C"
                          text_color: 0x1F2933
                          text_font: font_value_big

                - obj:
                    id: water_retour_group
                    align: RIGHT_MID
                    x: -25
                    y: 5
                    bg_opa: 0%
                    border_opa: 0%
                    pad_all: 0
                    layout:
                      type: FLEX
                      flex_flow: COLUMN
                      flex_align_cross: END
                      pad_row: 2
                    widgets:
                      - label:
                          id: water_retour_label
                          text: "Retour"
                          text_color: 0x1F2933
                          text_font: font_mdi_24
                      - label:
                          id: water_retour_value
                          text: "27,8°C"
                          text_color: 0x1F2933
                          text_font: font_value_big

                - obj:
                    id: water_delta_group
                    align: CENTER
                    x: 40
                    y: 50
                    bg_opa: 0%
                    border_opa: 0%
                    pad_all: 0
                    layout:
                      type: FLEX
                      flex_flow: COLUMN
                      flex_align_cross: CENTER
                      pad_row: 4
                    widgets:
                      - label:
                          id: water_delta_label
                          text: "\U000F01C2T"
                          text_color: 0x1F2933
                          text_font: font_value_big
                      - label:
                          id: water_delta_value
                          text: "4,7°C"
                          text_color: 0x1F2933
                          text_font: font_value_big

                - obj:
                    id: water_outdoor_group
                    align: BOTTOM_LEFT
                    x: 0
                    y: 0
                    width: SIZE_CONTENT
                    height: SIZE_CONTENT
                    pad_all: 0
                    bg_opa: 0%
                    border_opa: 0%
                    layout:
                      type: FLEX
                      flex_flow: ROW
                      flex_align_cross: CENTER
                      pad_column: 8
                    widgets:
                      - label:
                          id: water_outdoor_icon
                          text: "\U000F050F"
                          text_color: 0x0072CE
                          text_font: font_mdi_24
                          y: 2
                      - label:
                          id: header_outdoor
                          text: "Buiten -°C"
                          text_color: 0x1F2933
                          text_font: font_mdi_24

                - obj:
                    id: water_mode_temperature_group
                    align: BOTTOM_RIGHT
                    x: 0
                    y: 0
                    width: SIZE_CONTENT
                    height: SIZE_CONTENT
                    pad_all: 0
                    bg_opa: 0%
                    border_opa: 0%
                    layout:
                      type: FLEX
                      flex_flow: COLUMN
                      flex_align_cross: END
                      pad_row: 2
                    widgets:
                      - label:
                          id: water_mode_temperature_caption
                          text: "Huidig / Doel"
                          text_color: 0x1F2933
                          text_font: font_mdi_24
                      - label:
                          id: water_mode_temperature_values
                          text: "-°C / -°C"
                          text_color: 0x1F2933
                          text_font: font_mdi_24

          # ── DHW Tank Card (hidden when DHW not enabled) ──
          - obj:
              id: dhw_tank_card
              width: 160
              height: 100%
              hidden: true
              bg_color: 0xF5F8FC
              bg_opa: 100%
              radius: 18
              pad_left: 12
              pad_right: 12
              pad_top: 16
              pad_bottom: 12
              border_width: 0
              border_opa: 0%
              shadow_width: 10
              shadow_spread: 0
              shadow_color: 0x000000
              shadow_opa: 20%
              scrollbar_mode: "OFF"
              scrollable: false
              widgets:
                # Title
                - label:
                    id: dhw_tank_title
                    text: "Tapwater"
                    text_color: 0x1F2933
                    text_font: font_mdi_24
                    align: TOP_MID
                    y: 0

                # Status chip
                - obj:
                    id: dhw_tank_chip
                    hidden: true
                    align: TOP_MID
                    y: 30
                    width: SIZE_CONTENT
                    height: SIZE_CONTENT
                    pad_left: 8
                    pad_right: 10
                    pad_top: 3
                    pad_bottom: 3
                    bg_color: 0x919191
                    bg_opa: 100%
                    radius: 12
                    border_width: 0
                    border_opa: 0%
                    layout:
                      type: FLEX
                      flex_flow: ROW
                      flex_align_cross: CENTER
                      pad_column: 4
                    widgets:
                      - label:
                          id: dhw_tank_chip_icon
                          text: "\U000F1603"
                          text_color: 0xFFFFFF
                          text_font: font_mdi_24
                      - label:
                          id: dhw_tank_chip_text
                          text: "Idle"
                          text_color: 0xFFFFFF
                          text_font: font_mdi_24

                # Tank visualization area
                - obj:
                    id: dhw_tank_area
                    align: CENTER
                    y: 10
                    width: 100%
                    height: 220
                    bg_opa: 0%
                    border_opa: 0%
                    pad_all: 0
                    scrollbar_mode: "OFF"
                    scrollable: false
                    widgets:
                      # Flow arrow up (left side, visible when pump on)
                      - label:
                          id: dhw_flow_arrow_up
                          text: "\U000F005D"
                          text_color: 0x22D3EE
                          text_font: font_mdi_24
                          align: LEFT_MID
                          x: 0
                          y: -30
                          hidden: true

                      # Flow arrow down (left side, visible when pump on)
                      - label:
                          id: dhw_flow_arrow_down
                          text: "\U000F0045"
                          text_color: 0x22D3EE
                          text_font: font_mdi_24
                          align: LEFT_MID
                          x: 0
                          y: 30
                          hidden: true

                      # Tank body
                      - obj:
                          id: dhw_tank_body
                          align: CENTER
                          width: 100%
                          height: 200
                          bg_color: 0xF8FAFC
                          bg_opa: 100%
                          radius: 18
                          border_width: 3
                          border_color: 0x38BDF8
                          border_opa: 100%
                          scrollbar_mode: "OFF"
                          scrollable: false
                          widgets:
                            # Inner water volume
                            - obj:
                                id: dhw_tank_water_fill
                                align: BOTTOM_MID
                                y: -6
                                width: 92%
                                height: 128
                                bg_color: 0x7DD3FC
                                bg_opa: 85%
                                radius: 12
                                border_width: 0
                                border_opa: 0%

                            # Water surface line
                            - obj:
                                id: dhw_tank_water_surface
                                align: BOTTOM_MID
                                y: -132
                                width: 92%
                                height: 6
                                bg_color: 0xE0F2FE
                                bg_opa: 100%
                                radius: 8
                                border_width: 0
                                border_opa: 0%

                            # Decorative bubbles for tank-water look
                            - obj:
                                id: dhw_tank_bubble_1
                                align: BOTTOM_MID
                                x: -16
                                y: -46
                                width: 7
                                height: 7
                                bg_color: 0xE0F2FE
                                bg_opa: 100%
                                radius: 7
                                border_width: 0
                                border_opa: 0%
                            - obj:
                                id: dhw_tank_bubble_2
                                align: BOTTOM_MID
                                x: 8
                                y: -74
                                width: 5
                                height: 5
                                bg_color: 0xE0F2FE
                                bg_opa: 100%
                                radius: 5
                                border_width: 0
                                border_opa: 0%
                            - obj:
                                id: dhw_tank_bubble_3
                                align: BOTTOM_MID
                                x: 18
                                y: -100
                                width: 4
                                height: 4
                                bg_color: 0xE0F2FE
                                bg_opa: 100%
                                radius: 4
                                border_width: 0
                                border_opa: 0%

                            # Current temperature (large, centered)
                            - label:
                                id: dhw_tank_temp_value
                                text: "-°C"
                                text_color: 0x1F2933
                                text_font: font_value_big
                                align: CENTER
                                y: -20

                            # "Doel" caption
                            - label:
                                id: dhw_tank_target_caption
                                text: "Doel"
                                text_color: 0x6B7280
                                text_font: font_mdi_24
                                align: CENTER
                                y: 16

                            # Target temperature
                            - label:
                                id: dhw_tank_target_value
                                text: "-°C"
                                text_color: 0x1F2933
                                text_font: font_mdi_24
                                align: CENTER
                                y: 40

                      # Circulation spinner (visible when pump on)
                      - spinner:
                          id: dhw_circulation_spinner
                          align: RIGHT_MID
                          x: -2
                          width: 36
                          height: 36
                          spin_time: 2s
                          arc_length: 90deg
                          arc_width: 3
                          arc_color: 0xBFDBFE
                          indicator:
                            arc_width: 3
                            arc_color: 0x22D3EE
                          hidden: true

                # Pump status row at bottom
                - obj:
                    id: dhw_pump_status_row
                    align: BOTTOM_MID
                    width: 100%
                    height: SIZE_CONTENT
                    bg_opa: 0%
                    border_opa: 0%
                    pad_all: 0
                    layout:
                      type: FLEX
                      flex_flow: ROW
                      flex_align_main: CENTER
                      flex_align_cross: CENTER
                      pad_column: 6
                    widgets:
                      - label:
                          id: dhw_pump_icon
                          text: "\U000F058F"
                          text_color: 0x919191
                          text_font: font_mdi_24
                      - label:
                          id: dhw_pump_state_label
                          text: "UIT"
                          text_color: 0x919191
                          text_font: font_mdi_24

    - obj:
        id: home_tiles_grid
        width: 100%
        height: 100%
        grid_cell_row_pos: 0
        grid_cell_column_pos: 1
        grid_cell_x_align: STRETCH
        grid_cell_y_align: STRETCH
        bg_opa: 0%
        border_opa: 0%
        pad_all: 0
        layout:
          type: GRID
          grid_rows: [ FR(1), FR(1), FR(1) ]
          grid_columns: [ FR(1), FR(1) ]
          pad_row: 14
          pad_column: 14

        widgets:
          - obj:
              id: tile_fan
              width: 100%
              height: 100%
              grid_cell_row_pos: 0
              grid_cell_column_pos: 0
              grid_cell_x_align: STRETCH
              grid_cell_y_align: STRETCH
              bg_color: 0x919191
              bg_opa: 100%
              radius: 16
              pad_left: 8
              pad_right: 8
              pad_top: 8
              pad_bottom: 8
              border_width: 0
              border_opa: 0%

              widgets:
                - label:
                    id: tile_fan_icon
                    text: "\U000F0210"
                    text_color: 0x0072CE
                    text_font: font_mdi_24
                    align: TOP_MID
                    y: 4

                - label:
                    id: tile_fan_title
                    text: "Fan"
                    text_color: 0x1F2933
                    text_font: font_text_20
                    align: CENTER
                    y: -4

                - obj:
                    id: tile_fan_chip
                    align: BOTTOM_MID
                    width: SIZE_CONTENT
                    height: SIZE_CONTENT
                    pad_left: 16
                    pad_right: 16
                    pad_top: 4
                    pad_bottom: 4
                    text_color: 0x000000
                    bg_opa: TRANSP
                    radius: 16
                    border_width: 0
                    widgets:
                      - label:
                          id: tile_fan_value
                          text: "0 RPM"
                          text_font: font_text_20

          - obj:
              id: tile_pump
              width: 100%
              height: 100%
              grid_cell_row_pos: 0
              grid_cell_column_pos: 1
              grid_cell_x_align: STRETCH
              grid_cell_y_align: STRETCH
              bg_color: 0x919191
              bg_opa: 100%
              radius: 16
              pad_left: 8
              pad_right: 8
              pad_top: 8
              pad_bottom: 8
              border_width: 0
              border_opa: 0%

              widgets:
                - label:
                    id: tile_pump_icon
                    text: "\U000F058F"
                    text_color: 0x0072CE
                    text_font: font_mdi_24
                    align: TOP_MID
                    y: 4

                - label:
                    id: tile_pump_title
                    text: "Pomp"
                    text_color: 0x1F2933
                    text_font: font_text_20
                    align: CENTER
                    y: -4

                - obj:
                    id: tile_pump_chip
                    align: BOTTOM_MID
                    width: SIZE_CONTENT
                    height: SIZE_CONTENT
                    pad_left: 16
                    pad_right: 16
                    pad_top: 4
                    pad_bottom: 4
                    text_color: 0x000000
                    bg_opa: TRANSP
                    radius: 16
                    border_width: 0
                    widgets:
                      - label:
                          id: tile_pump_state
                          text: "UIT"
                          text_font: font_text_20

          - obj:
              id: tile_defrost
              width: 100%
              height: 100%
              grid_cell_row_pos: 1
              grid_cell_column_pos: 0
              grid_cell_x_align: STRETCH
              grid_cell_y_align: STRETCH
              bg_color: 0x919191
              bg_opa: 100%
              radius: 16
              pad_left: 8
              pad_right: 8
              pad_top: 8
              pad_bottom: 8
              border_width: 0
              border_opa: 0%

              widgets:
                - label:
                    id: tile_defrost_icon
                    text: "\U000F12CB"
                    text_color: 0x0072CE
                    text_font: font_mdi_24
                    align: TOP_MID
                    y: 4

                - label:
                    id: tile_defrost_title
                    text: "Defrost"
                    text_color: 0x1F2933
                    text_font: font_text_20
                    align: CENTER
                    y: -4

                - obj:
                    id: tile_defrost_chip
                    align: BOTTOM_MID
                    width: SIZE_CONTENT
                    height: SIZE_CONTENT
                    pad_left: 16
                    pad_right: 16
                    pad_top: 4
                    pad_bottom: 4
                    text_color: 0x000000
                    bg_opa: TRANSP
                    radius: 16
                    border_width: 0
                    widgets:
                      - label:
                          id: tile_defrost_state
                          text: "UIT"
                          text_font: font_text_20

          - obj:
              id: tile_compressor
              width: 100%
              height: 100%
              grid_cell_row_pos: 1
              grid_cell_column_pos: 1
              grid_cell_x_align: STRETCH
              grid_cell_y_align: STRETCH
              bg_color: 0x919191
              bg_opa: 100%
              radius: 16
              pad_left: 8
              pad_right: 8
              pad_top: 8
              pad_bottom: 8
              border_width: 0
              border_opa: 0%

              widgets:
                - label:
                    id: tile_compressor_icon
                    text: "\U000F1A44"
                    text_color: 0x0072CE
                    text_font: font_mdi_24
                    align: TOP_MID
                    y: 4

                - label:
                    id: tile_compressor_title
                    text: "Compressor"
                    text_color: 0x1F2933
                    text_font: font_text_20
                    align: CENTER
                    y: -4

                - obj:
                    id: tile_compressor_chip
                    align: BOTTOM_MID
                    width: SIZE_CONTENT
                    height: SIZE_CONTENT
                    pad_left: 16
                    pad_right: 16
                    pad_top: 4
                    pad_bottom: 4
                    text_color: 0x000000
                    bg_opa: TRANSP
                    radius: 16
                    border_width: 0
                    widgets:
                      - label:
                          id: tile_compressor_value
                          text: "0 Hz"
                          text_font: font_text_20

          - obj:
              id: tile_backup_heater
              width: 100%
              height: 100%
              grid_cell_row_pos: 2
              grid_cell_column_pos: 0
              grid_cell_x_align: STRETCH
              grid_cell_y_align: STRETCH
              bg_color: 0x919191
              bg_opa: 100%
              radius: 16
              pad_left: 8
              pad_right: 8
              pad_top: 8
              pad_bottom: 8
              border_width: 0
              border_opa: 0%

              widgets:
                - label:
                    id: tile_backup_icon
                    text: "\U000F0238"
                    text_color: 0x0072CE
                    text_font: font_mdi_24
                    align: TOP_MID
                    y: 4

                - label:
                    id: tile_backup_title
                    text: "Backup heater"
                    text_color: 0x1F2933
                    text_font: font_text_20
                    align: CENTER
                    y: -10

                - obj:
                    id: tile_backup_chip
                    align: BOTTOM_MID
                    width: SIZE_CONTENT
                    height: SIZE_CONTENT
                    pad_left: 16
                    pad_right: 16
                    pad_top: 4
                    pad_bottom: 4
                    text_color: 0x000000
                    bg_opa: TRANSP
                    radius: 16
                    border_width: 0
                    widgets:
                      - label:
                          id: tile_backup_state
                          text: "UIT"
                          text_font: font_text_20

          - obj:
              id: tile_baseplate
              width: 100%
              height: 100%
              grid_cell_row_pos: 2
              grid_cell_column_pos: 1
              grid_cell_x_align: STRETCH
              grid_cell_y_align: STRETCH
              bg_color: 0x919191
              bg_opa: 100%
              radius: 16
              pad_left: 8
              pad_right: 8
              pad_top: 8
              pad_bottom: 8
              border_width: 0
              border_opa: 0%

              widgets:
                - label:
                    id: tile_baseplate_icon
                    text: "\U000F0438"
                    text_color: 0x0072CE
                    text_font: font_mdi_24
                    align: TOP_MID
                    y: 4

                - label:
                    id: tile_baseplate_title
                    text: "Bodemplaat\nverwarming"
                    text_color: 0x1F2933
                    text_font: font_text_20
                    align: CENTER
                    y: -4

                - obj:
                    id: tile_baseplate_chip
                    align: BOTTOM_MID
                    width: SIZE_CONTENT
                    height: SIZE_CONTENT
                    pad_left: 16
                    pad_right: 16
                    pad_top: 4
                    pad_bottom: 4
                    text_color: 0x000000
                    bg_opa: TRANSP
                    radius: 16
                    border_width: 0
                    widgets:
                      - label:
                          id: tile_baseplate_state
                          text: "UIT"
                          text_font: font_text_20
