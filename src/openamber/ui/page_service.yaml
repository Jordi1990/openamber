                    align: TOP_LEFT

                - obj:
                    id: service_update_button
                    width: 180
                    height: 52
                    align: BOTTOM_RIGHT
                    y: 0
                    hidden: true
                    bg_color: 0x0072CE
                    bg_opa: 100%
                    radius: 14
                    border_width: 0
                    border_opa: 0%
                    pad_all: 0
                    on_click:
                      - lvgl.widget.show:
                          id: service_update_confirm_modal
                    widgets:
                      - label:
                          id: service_update_button_label
                          text: "Update"
                          text_color: 0xFFFFFF
                          text_font: font_mdi_24
                          align: CENTER

                - obj:
                    id: service_check_update_button
                    width: 250
                    height: 52
                    align: TOP_RIGHT
                    y: -2
                    hidden: false
                    bg_color: 0x0072CE
                    bg_opa: 100%
                    radius: 14
                    border_width: 0
                    border_opa: 0%
                    pad_all: 0
                    on_click:
                      - globals.set:
                          id: service_update_check_failed
                          value: 'false'
                      - globals.set:
                          id: service_update_check_in_progress
                          value: 'true'
                      - lvgl.widget.hide:
                          id: service_check_update_button
                      - lvgl.widget.show:
                          id: service_check_update_button_busy
                      - update.check:
                          id: firmware_update
                      - delay: 30s
                      - if:
                          condition:
                            and:
                              - not:
                                  update.is_available: firmware_update
                              - lambda: |-
                                  const auto &info = id(firmware_update).update_info;
                                  return info.latest_version.empty() && info.release_url.empty();
                          then:
                            - globals.set:
                                id: service_update_check_failed
                                value: 'true'
                          else:
                            - globals.set:
                                id: service_update_check_failed
                                value: 'false'
                      - globals.set:
                          id: service_update_check_in_progress
                          value: 'false'
                    widgets:
                      - label:
                          id: service_check_update_button_label
                          text: "Controleer updates"
                          text_color: 0xFFFFFF
                          text_font: font_mdi_24
                          align: CENTER

