                    height: 52
                    align: TOP_RIGHT
                    y: -2
                    hidden: true
                    bg_color: 0xC7CDD6
                    bg_opa: 100%
                    radius: 14
                    border_width: 0
                    border_opa: 0%
                    pad_all: 0
                    widgets:
                      - label:
                          id: service_check_update_button_busy_label
                          text: "Ophalen..."
                          text_color: 0x4B5563
                          text_font: font_mdi_24
                          align: CENTER

