obj:
  id: page_system
  width: 100%
  height: 76%
  x: 0
  y: 70
  hidden: true
  bg_opa: 0%
  border_opa: 0%
  scrollbar_mode: "OFF"
  scrollable: false
  pad_left: 24
  pad_right: 24
  pad_top: 4
  pad_bottom: 4

  widgets:
    - obj:
        id: system_card
        width: 100%
        height: 100%
        bg_color: 0xF5F8FC
        bg_opa: 100%
        radius: 18
        pad_left: 16
        pad_right: 16
        pad_top: 8
        pad_bottom: 8
        border_width: 0
        border_opa: 0%
        shadow_width: 10
        shadow_spread: 0
        shadow_color: 0x000000
        shadow_opa: 20%
        scrollbar_mode: "OFF"
        scrollable: false
        layout:
          type: GRID
          grid_rows: [FR(1)]
          grid_columns: [210, FR(1)]
          pad_column: 12

        widgets:
          - !include system/page_system_sidebar.yaml
          - obj:
              id: system_content
              grid_cell_row_pos: 0
              grid_cell_column_pos: 1
              grid_cell_x_align: STRETCH
              grid_cell_y_align: STRETCH
              bg_opa: 0%
              border_opa: 0%
              scrollbar_mode: "OFF"
              scrollable: false
              widgets:
                - !include system/page_system_tab_updates.yaml
                - !include system/page_system_tab_diagnostics.yaml

    - obj:
        id: service_confirm_modal
        width: 100%
        height: 100%
        hidden: true
        bg_color: 0x000000
        bg_opa: 45%
        border_width: 0
        border_opa: 0%
        pad_all: 0
        scrollbar_mode: "OFF"
        scrollable: false

        widgets:
          - obj:
                            id: service_confirm_card
                            width: 560
                            height: 260
                            align: CENTER
                            bg_color: 0xFFFFFF
                            bg_opa: 100%
                            radius: 18
                            border_width: 0
                            border_opa: 0%
                            pad_left: 22
                            pad_right: 22
                            pad_top: 18
                            pad_bottom: 18

                            widgets:
                                - label:
                                        id: service_confirm_title
                                        text: "Actie bevestigen"
                                        text_color: 0x1F2933
                                        text_font: font_mdi_24
                                        align: TOP_LEFT

                                - label:
                                        id: service_confirm_text
                                        text: ""
                                        text_color: 0x1F2933
                                        text_font: font_mdi_24
                                        align: TOP_LEFT
                                        y: 56

                                - obj:
                                        id: service_confirm_cancel_button
                                        width: 200
                                        height: 56
                                        align: BOTTOM_LEFT
                                        bg_color: 0xE5E7EB
                                        bg_opa: 100%
                                        radius: 14
                                        border_width: 0
                                        border_opa: 0%
                                        pad_all: 0
                                        on_click:
                                            - globals.set:
                                                    id: service_confirm_action
                                                    value: '0'
                                            - lvgl.widget.hide:
                                                    id: service_confirm_modal
                                        widgets:
                                            - label:
                                                    id: service_confirm_cancel_label
                                                    text: "Annuleren"
                                                    text_color: 0x1F2933
                                                    text_font: font_mdi_24
                                                    align: CENTER

                                - obj:
                                        id: service_confirm_button
                                        width: 200
                                        height: 56
                                        align: BOTTOM_RIGHT
                                        bg_color: 0x0072CE
                                        bg_opa: 100%
                                        radius: 14
                                        border_width: 0
                                        border_opa: 0%
                                        pad_all: 0
                                        on_click:
                                            - lvgl.widget.hide:
                                                    id: service_confirm_modal
                                            - if:
                                                    condition:
                                                        lambda: 'return id(service_confirm_action) == 1;'
                                                    then:
                                                        - button.press: restart_openamber
                                                    else:
                                                        - if:
                                                                condition:
                                                                    lambda: 'return id(service_confirm_action) == 2;'
                                                                then:
                                                                    - globals.set:
                                                                            id: service_update_install_in_progress
                                                                            value: 'true'
                                                                    - lvgl.widget.show:
                                                                            id: service_update_progress_overlay
                                                                    - update.perform:
                                                                            id: firmware_update
                                                                    - delay: 10min
                                                                    - globals.set:
                                                                            id: service_update_install_in_progress
                                                                            value: 'false'
                                                                    - lvgl.widget.hide:
                                                                            id: service_update_progress_overlay
                                                                    - globals.set:
                                                                            id: service_confirm_action
                                                                            value: '0'
                                        widgets:
                                            - label:
                                                    id: service_confirm_button_label
                                                    text: "Herstarten"
                                                    text_color: 0xFFFFFF
                                                    text_font: font_mdi_24
                                                    align: CENTER

    - obj:
        id: service_update_progress_overlay
        width: 100%
        height: 100%
        hidden: true
        bg_color: 0x000000
        bg_opa: 60%
        border_width: 0
        border_opa: 0%
        pad_all: 0
        scrollbar_mode: "OFF"
        scrollable: false

        widgets:
          - obj:
              id: service_update_progress_card
              width: 560
              height: 220
              align: CENTER
              bg_color: 0xFFFFFF
              bg_opa: 100%
              radius: 18
              border_width: 0
              border_opa: 0%
              pad_left: 22
              pad_right: 22
              pad_top: 20
              pad_bottom: 20

              widgets:
                - label:
                    id: service_update_progress_title
                    text: "Update wordt geinstalleerd"
                    text_color: 0x1F2933
                    text_font: font_mdi_24
                    align: CENTER
