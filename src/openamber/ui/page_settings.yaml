obj:
  id: page_settings
  width: 100%
  height: 76%
  x: 0
  y: 70
  hidden: true
  bg_opa: 0%
  border_opa: 0%
  scrollbar_mode: "OFF"
  scrollable: false
  pad_left: 24
  pad_right: 24
  pad_top: 10
  pad_bottom: 10

  widgets:
