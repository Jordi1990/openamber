        pad_right: 16
        pad_top: 12
        pad_bottom: 12
        border_width: 0
        border_opa: 0%
        shadow_width: 10
        shadow_spread: 0
        shadow_color: 0x000000
        shadow_opa: 20%
        scrollbar_mode: "OFF"
        scrollable: false
        layout:
          type: GRID
          grid_rows: [FR(1)]
          grid_columns: [210, FR(1)]
          pad_column: 12

