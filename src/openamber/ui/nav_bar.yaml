obj:
  id: nav_bar
  width: 100%
  height: 12%
  align: BOTTOM_MID
  bg_color: 0x0A2747
  bg_opa: 100%
  radius: 0
  border_width: 0
  border_opa: 0%
  scrollbar_mode: "OFF"
  scrollable: false
  pad_left: 24
  pad_right: 24
  pad_top: 5
  pad_bottom: 5
  layout:
    type: FLEX
    flex_flow: ROW
    flex_align_main: SPACE_BETWEEN
    flex_align_cross: CENTER
    pad_column: 18

  widgets:
    - obj:
        id: nav_home
        width: 150
        height: 100%
        bg_color: 0x1F3B68
        bg_opa: 100%
        radius: 24
        border_width: 0
        border_opa: 0%
        pad_left: 12
        pad_right: 12
        pad_top: 4
        pad_bottom: 4
        on_click:
          - script.execute:
              id: nav_select_tab
              tab_index: 0
          - script.execute: update_home_thermostat_mode_ui
        widgets:
          - label:
              id: nav_home_icon
              text: "\U000F06A1"
              text_color: 0xFFFFFF
              text_font: font_mdi_24
              align: TOP_MID
              y: 0
          - label:
              id: nav_home_label
              text: "Home"
              text_color: 0xFFFFFF
              text_font: font_mdi_24
              align: BOTTOM_MID

    - obj:
        id: nav_sep1
        width: 2
        height: 65%
        bg_color: 0x1F3B68
        bg_opa: 100%
        radius: 1
        border_width: 0
        border_opa: 0%

    - obj:
        id: nav_graph
        width: 120
        height: 100%
        pad_all: 0
        bg_opa: 0%
        border_opa: 0%
        widgets:
          - label:
              id: nav_graph_icon
              text: "\U000F08D4"
              text_color: 0xD1D5DB
              text_font: font_mdi_24
              align: TOP_MID
              y: 0
          - label:
              id: nav_graph_label
              text: "Grafiek"
              text_color: 0xD1D5DB
              text_font: font_mdi_24
              align: BOTTOM_MID

    - obj:
        id: nav_sep2
        width: 2
        height: 65%
        bg_color: 0x1F3B68
        bg_opa: 100%
        radius: 1
        border_width: 0
        border_opa: 0%

    - obj:
        id: nav_settings
        width: 170
        height: 100%
        bg_color: 0x1F3B68
        bg_opa: 0%
        radius: 24
        border_width: 0
        border_opa: 0%
        pad_left: 12
        pad_right: 12
        pad_top: 4
        pad_bottom: 4
        on_click:
          - script.execute:
              id: nav_select_tab
              tab_index: 1
        widgets:
          - label:
              id: nav_settings_icon
              text: "\U000F08BB"
              text_color: 0xD1D5DB
              text_font: font_mdi_24
              align: TOP_MID
              y: 0
          - label:
              id: nav_settings_label
              text: "Instellingen"
              text_color: 0xD1D5DB
              text_font: font_mdi_24
              align: BOTTOM_MID

    - obj:
        id: nav_sep3
        width: 2
        height: 65%
        bg_color: 0x1F3B68
        bg_opa: 100%
        radius: 1
        border_width: 0
        border_opa: 0%

    - obj:
        id: nav_service
        width: 120
        height: 100%
        pad_all: 0
        bg_color: 0x1F3B68
        bg_opa: 0%
        border_opa: 0%
        radius: 24
        on_click:
          - script.execute:
              id: nav_select_tab
              tab_index: 2
        widgets:
          - label:
              id: nav_service_icon
              text: "\U000F0BE0"
              text_color: 0xD1D5DB
              text_font: font_mdi_24
              align: TOP_MID
              y: 0
          - label:
              id: nav_service_label
              text: "Service"
              text_color: 0xD1D5DB
              text_font: font_mdi_24
              align: BOTTOM_MID

    - obj:
        id: nav_sep4
        width: 2
        height: 65%
        bg_color: 0x1F3B68
        bg_opa: 100%
        radius: 1
        border_width: 0
        border_opa: 0%

    - obj:
        id: nav_system
        width: 120
        height: 100%
        pad_all: 0
        bg_color: 0x1F3B68
        bg_opa: 0%
        border_opa: 0%
        radius: 24
        on_click:
          - script.execute:
              id: nav_select_tab
              tab_index: 3
        widgets:
          - label:
              id: nav_system_icon
              text: "\U000F035B"
              text_color: 0xD1D5DB
              text_font: font_mdi_24
              align: TOP_MID
              y: 0
          - label:
              id: nav_system_label
              text: "Systeem"
              text_color: 0xD1D5DB
              text_font: font_mdi_24
              align: BOTTOM_MID
          - obj:
              id: nav_system_badge
              width: 12
              height: 12
              align: TOP_RIGHT
              x: -10
              y: 6
              hidden: true
              bg_color: 0xEF4444
              bg_opa: 100%
              radius: 6
              border_width: 0
              border_opa: 0%
              pad_all: 0

