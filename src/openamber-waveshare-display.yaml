packages:
 - !include openamber/common/openamber.yaml
 - !include openamber/ui/display_switches.yaml
 - !include openamber/ui/bindings/ui_bindings_package.yaml

esp32:
  variant: esp32s3
  flash_size: 16MB
  cpu_frequency: 240MHZ
  framework:
    sdkconfig_options:
      CONFIG_ESP32S3_DATA_CACHE_64KB: y
      CONFIG_SPIRAM_FETCH_INSTRUCTIONS: y
      CONFIG_SPIRAM_RODATA: y
    advanced:
      loop_task_stack_size: 16384

esphome:
  platformio_options:
    board_build.arduino.memory_type: qio_opi
    board_build.flash_mode: dio
  project:
    version: dev

opentherm_slave:
  id: ot_hub
  in_pin:
    number: GPIO15
    inverted: true
  out_pin:
    number: GPIO13
    inverted: false

uart:
  rx_pin:
    number: GPIO43
    inverted: False
  tx_pin:
    number: GPIO44
    inverted: False

psram:
  mode: octal
  speed: 80MHz

ch422g:
  - id: ch422g_hub

i2c:
  sda: GPIO08
  scl: GPIO09
  scan: False
  frequency: 400kHz

display:
  - platform: mipi_rgb
    model: WAVESHARE-5-1024X600
    id: my_display
    auto_clear_enabled: false

output:
  - platform: ledc
    pin: GPIO16
    id: backlight

globals:
  - id: is_idled
    type: bool

touchscreen:
  - platform: gt911
    address: 0x5D
    id: my_touchscreen
    interrupt_pin: GPIO4
    reset_pin:
      ch422g: ch422g_hub
      number: 1
    on_release:
      - if:
          condition:
            lambda: 'return id(is_idled);'
          then:
            - globals.set:
                id: is_idled
                value: 'false'
            - output.set_level:
                id: backlight
                level: 100%
            - lvgl.widget.hide:
                id: idle_screen_overlay

api:
  on_client_connected:
    - lvgl.widget.update:
        id: nav_status_ha_icon
        text_color: 0x22C55E
  on_client_disconnected:
    - lvgl.widget.update:
        id: nav_status_ha_icon
        text_color: 0xEF4444

interval:
 - interval: 5s
   then: !include openamber/ui/ui_update_loop.yaml

image:
  - file: "openamber/ui/images/water_circuit.png"
    id: img_water_circuit
    type: RGB565
    transparency: alpha_channel
    resize: 420x420
  - file: "openamber/ui/images/icon.png"
    id: openamber_icon
    type: RGB565
    resize: 57x70
    transparency: alpha_channel
  - file: "openamber/ui/images/logo-512x512.png"
    id: openamber_logo
    type: RGB565
    transparency: alpha_channel

font: !include openamber/ui/fonts.yaml

lvgl:
  on_idle:
    - timeout: 60s
      then:
        - globals.set:
            id: is_idled
            value: 'true'
        - output.set_level:
            id: backlight
            level: 50% # 50% turns off the backlight
        - lvgl.widget.show:
            id: idle_screen_overlay
  disp_bg_color: 0x0A2747
  widgets:
    - !include openamber/ui/root_bg.yaml
    - !include openamber/ui/header_bar.yaml
    - !include openamber/ui/page_home.yaml
    - !include openamber/ui/page_service.yaml
    - !include openamber/ui/page_settings.yaml
    - !include openamber/ui/nav_bar.yaml
    - !include openamber/ui/boot_screen.yaml
    - !include openamber/ui/idle_screen_overlay.yaml