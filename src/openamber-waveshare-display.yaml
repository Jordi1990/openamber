substitutions:
  device_model: waveshare-5-1024x600

packages:
 - !include openamber/common/openamber.yaml
 - !include openamber/ui/display_globals.yaml
 - !include openamber/ui/bindings/ui_bindings_package.yaml
 
wifi:
  use_psram: true

esp32:
  variant: esp32s3
  flash_size: 16MB
  cpu_frequency: 240MHZ
  framework:
    sdkconfig_options:
      CONFIG_ESP32S3_DATA_CACHE_64KB: y
      CONFIG_SPIRAM_USE_MALLOC: y
      CONFIG_ESP32S3_DATA_CACHE_LINE_64B: y
      CONFIG_SPIRAM_FETCH_INSTRUCTIONS: y
      CONFIG_SPIRAM_USE_CAPS_ALLOC: n      
      CONFIG_SPIRAM_MALLOC_ALWAYSINTERNAL: "4096"
      CONFIG_SPIRAM_MALLOC_RESERVE_INTERNAL: "65536"
      CONFIG_SPIRAM_TRY_ALLOCATE_WIFI_LWIP: y
      CONFIG_MDNS_TASK_CREATE_FROM_SPIRAM: y
      CONFIG_MDNS_MEMORY_ALLOC_SPIRAM: y
      CONFIG_NVS_ALLOCATE_CACHE_IN_SPIRAM: y
      CONFIG_SPIRAM_RODATA: y
      CONFIG_ESP_TASK_WDT_TIMEOUT_S: "60"
    advanced:
      loop_task_stack_size: 10240
      execute_from_psram: true

esphome:
  project:
    version: dev

# Workaround: native ESP-IDF esphome.build_flags filters out -m... Xtensa compiler options.
# -mauto-litpools is required because ESPHome's generated setup() exceeds the L32R literal range due to large amount of LVGL elements.
native_build_flags:
  cxx_flags:
    - -mauto-litpools

uart:
  rx_pin:
    number: GPIO43
    inverted: False
  tx_pin:
    number: GPIO44
    inverted: False

psram:
  mode: octal
  speed: 80MHz

ch422g:
  - id: ch422g_hub

i2c:
  sda: GPIO08
  scl: GPIO09
  scan: False
  frequency: 400kHz

display:
  - platform: mipi_rgb
    model: WAVESHARE-5-1024X600
    id: my_display
    auto_clear_enabled: false
    dimensions:
      width: 1024
      height: 600
      offset_width: 0
      offset_height: 0
      pad_width: 0
      pad_height: 0

output:
  - platform: ledc
    pin: GPIO15
    id: backlight

switch:
  - platform: gpio
    name: backlight switch
    pin:
      ch422g: ch422g_hub
      number: 2
    restore_mode: ALWAYS_ON
    internal: true

touchscreen:
  - platform: gt911
    address: 0x5D
    id: my_touchscreen
    interrupt_pin: GPIO4
    reset_pin:
      ch422g: ch422g_hub
      number: 1
    on_release:
      - if:
          condition:
            lambda: 'return id(is_idled);'
          then:
            - globals.set:
                id: is_idled
                value: 'false'
            - output.set_level:
                id: backlight
                level: 100%
            - lvgl.widget.hide:
                id: idle_screen_overlay

api:
  on_client_connected:
    - lvgl.widget.update:
        id: nav_status_ha_icon
        text_color: 0x22C55E
  on_client_disconnected:
    - lvgl.widget.update:
        id: nav_status_ha_icon
        text_color: 0xEF4444

interval:
 - interval: 5s
   then: !include openamber/ui/ui_update_loop.yaml
 - interval: 700ms
   then:
    - script.execute: toggle_header_alert_blink

image:
  - platform: file
    file: openamber/ui/images/water_circuit.png
    id: img_water_circuit
    type: RGB565
    transparency: alpha_channel
    resize: 420x420
  - platform: file
    file: openamber/ui/images/icon.png
    id: openamber_icon
    type: RGB565
    resize: 57x70
    transparency: alpha_channel
  - platform: file
    file: openamber/ui/images/dhw_tank.png
    id: img_dhw_tank
    type: RGB565
    transparency: alpha_channel
    resize: 130x260
  - platform: file
    file: openamber/ui/images/logo-512x512.png
    id: openamber_logo
    type: RGB565
    transparency: alpha_channel

sensor:
  - platform: debug
    psram:
      name: "Free PSRAM"
      id: system_psram_free
      disabled_by_default: true

font: !include openamber/ui/fonts.yaml

lvgl:
  buffer_size: 100%
  on_idle:
    - timeout: 60s
      then:
        - globals.set:
            id: is_idled
            value: 'true'
        - output.set_level:
            id: backlight
            level: 50% # 50% turns off the backlight
        - lvgl.widget.show:
            id: idle_screen_overlay
  bottom_layer:
    bg_color: 0x0A2747
  widgets:
    - !include openamber/ui/root_bg.yaml
    - !include openamber/ui/header_bar.yaml
    - !include openamber/ui/page_home.yaml
    - !include openamber/ui/page_service.yaml
    - !include openamber/ui/page_system.yaml
    - !include openamber/ui/page_settings.yaml
    - !include openamber/ui/nav_bar.yaml
    - !include openamber/ui/boot_screen.yaml
    - !include openamber/ui/idle_screen_overlay.yaml

