substitutions:
  device_model: waveshare-p4-7-1024x600

packages:
 - !include openamber/common/openamber.yaml
 - !include openamber/ui/display_globals.yaml
 - !include openamber/ui/bindings/ui_bindings_package.yaml
 
wifi:
  use_psram: true

esp32_ble_tracker:

esp32:
  board: esp32-p4-evboard
  variant: esp32p4
  flash_size: 32MB
  cpu_frequency: 360MHz
  framework:
    sdkconfig_options:
      CONFIG_SPIRAM_USE_MALLOC: y
      CONFIG_NVS_ALLOCATE_CACHE_IN_SPIRAM: y
      CONFIG_SPIRAM_RODATA: y
      CONFIG_ESP_TASK_WDT_TIMEOUT_S: "60"
      CONFIG_SPIRAM_XIP_FROM_PSRAM: "y"
      CONFIG_ESP_HOSTED_MEMPOOL_PREFER_SPIRAM: y
    advanced:
      loop_task_stack_size: 10240
      enable_idf_experimental_features: true

esphome:
  project:
    version: dev

esp32_hosted:
  variant: ESP32C6
  reset_pin: GPIO54
  cmd_pin: GPIO19
  clk_pin: GPIO18
  d0_pin: GPIO14
  d1_pin: GPIO15
  d2_pin: GPIO16
  d3_pin: GPIO17
  active_high: true
  use_psram: true

update:
  - platform: esp32_hosted
    name: ESP-Hosted Firmware
    icon: mdi:chip
    type: http
    source: https://esphome.github.io/esp-hosted-firmware/manifest/esp32c6.json
    update_interval: 6h

uart:
  rx_pin:
    number: GPIO26
    inverted: False
  tx_pin:
    number: GPIO27
    inverted: False

psram:
  mode: hex
  speed: 200MHz

esp_ldo:
  - channel: 3
    voltage: 2.5V

display:
  - platform: mipi_dsi
    model: WAVESHARE-ESP32-P4-WIFI6-TOUCH-LCD-7B
    id: my_display
    reset_pin:
      number: 33
    update_interval: never
    auto_clear_enabled: false
    dimensions:
      width: 1024
      height: 600

output:
  - platform: ledc
    id: backlight
    pin: GPIO32
    inverted: true
    frequency: 1000Hz

i2c:
  - id: bus_a
    sda: GPIO07
    scl: GPIO08
    frequency: 400kHz
    scan: true

touchscreen:
  - platform: gt911
    address: 0x5D
    i2c_id: bus_a
    reset_pin: GPIO23
    update_interval: 50ms
    id: my_touchscreen
    transform:
      swap_xy: false
      mirror_x: true
      mirror_y: true
    on_release:
      - if:
          condition:
            lambda: 'return id(is_idled);'
          then:
            - globals.set:
                id: is_idled
                value: 'false'
            - output.set_level:
                id: backlight
                level: 100%

api:
  on_client_connected:
    - lvgl.widget.update:
        id: nav_status_ha_icon
        text_color: 0x22C55E
  on_client_disconnected:
    - lvgl.widget.update:
        id: nav_status_ha_icon
        text_color: 0xEF4444

interval:
 - interval: 5s
   then: !include openamber/ui/ui_update_loop.yaml

image:
  - platform: file
    file: openamber/ui/images/water_circuit.png
    id: img_water_circuit
    type: RGB565
    transparency: alpha_channel
    resize: 420x420
  - platform: file
    file: openamber/ui/images/icon.png
    id: openamber_icon
    type: RGB565
    resize: 57x70
    transparency: alpha_channel
  - platform: file
    file: openamber/ui/images/dhw_tank.png
    id: img_dhw_tank
    type: RGB565
    transparency: alpha_channel
    resize: 130x260
  - platform: file
    file: openamber/ui/images/logo-512x512.png
    id: openamber_logo
    type: RGB565
    transparency: alpha_channel

sensor:
  - platform: debug
    psram:
      name: "Free PSRAM"
      id: system_psram_free
      disabled_by_default: true

font: !include openamber/ui/fonts.yaml

lvgl:
  rotation: 180
  byte_order: little_endian
  buffer_size: 100%
  on_idle:
    - timeout: 60s
      then:
        - globals.set:
            id: is_idled
            value: 'true'
        - output.set_level:
            id: backlight
            level: 0%
  bottom_layer:
    bg_color: 0x0A2747
  widgets:
    - !include openamber/ui/root_bg.yaml
    - !include openamber/ui/header_bar.yaml
    - !include openamber/ui/page_home.yaml
    - !include openamber/ui/page_service.yaml
    - !include openamber/ui/page_system.yaml
    - !include openamber/ui/page_settings.yaml
    - !include openamber/ui/nav_bar.yaml
    - !include openamber/ui/boot_screen.yaml
