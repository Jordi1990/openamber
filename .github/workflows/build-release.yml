name: Publish release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build-firmware:
    name: Build Firmware
    uses: esphome/workflows/.github/workflows/build.yml@3c4e8446aa1029f1c346a482034b3ee1489077ca  # 2026.4.0
    with:
      files: |
        src/openamber-leejow.yaml
        src/openamber-waveshare-display.yaml
      esphome-version: 2026.4.0
      combined-name: openamber
      release-summary: ${{ github.event_name == 'release' && github.event.release.body || '' }}
      release-url: ${{ github.event_name == 'release' && github.event.release.html_url || '' }}
      release-version: ${{ github.event_name == 'release' && github.event.release.tag_name || '' }}

  upload-to-release:
    name: Upload to Release
    if: github.event_name == 'release'
    uses: esphome/workflows/.github/workflows/upload-to-gh-release.yml@3c4e8446aa1029f1c346a482034b3ee1489077ca  # 2026.4.0
    needs:
      - build-firmware
    with:
      version: ${{ github.event.release.tag_name }}
