name: Build firmware on PR publish

on:
  pull_request:
    types: [ready_for_review]
    paths:
      - src/**
      - .github/workflows/**

jobs:
  build-firmware:
    name: Build Firmware
    uses: ./.github/workflows/build-firmware.yml
    with:
      files: |
        src/openamber-leejow.yaml
        src/openamber-waveshare-display.yaml
      combined-name: openamber-pr-validation
